<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Komşu AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center py-8">
            <h1 class="text-3xl font-black text-blue-600 italic">AKILLI KOMŞU</h1>
            <p class="text-gray-500 text-sm mt-2">Arızayı fotoğrafla, maliyeti öğren.</p>
        </header>

        <div id="dropZone" class="bg-white border-4 border-dashed border-gray-200 rounded-3xl p-8 text-center cursor-pointer hover:border-blue-400 transition" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div id="previewBox" class="hidden mb-4">
                <img id="imagePreview" src="" class="rounded-xl mx-auto max-h-64 shadow-md">
            </div>
            <div id="uploadUI">
                <i class="fa-solid fa-camera-retro text-5xl text-blue-200 mb-4"></i>
                <p class="font-bold text-gray-700">Fotoğraf Yükle</p>
            </div>
        </div>

        <button id="analyzeBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mt-6 shadow-lg hidden">
            ANALİZ ET <i class="fa-solid fa-bolt ml-2"></i>
        </button>

        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin text-blue-600 text-4xl mb-4"><i class="fa-solid fa-circle-notch"></i></div>
            <p class="text-gray-600 font-medium">Yapay Zeka İnceliyor...</p>
        </div>

        <div id="resultBox" class="hidden mt-6 bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
            <h3 class="font-black text-blue-600 mb-4 flex items-center">
                <i class="fa-solid fa-microchip mr-2"></i> TEŞHİS RAPORU
            </h3>
            <div id="aiResponse" class="text-gray-700 leading-relaxed text-sm whitespace-pre-line"></div>
            <button onclick="location.reload()" class="w-full mt-6 text-xs text-gray-400 underline">Yeni Fotoğraf</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const imagePreview = document.getElementById('imagePreview');
        
        // Görüntüyü Küçültme Fonksiyonu (Vercel 413 Hatasını Önler)
        function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const resized = await resizeImage(file);
                imagePreview.src = resized;
                document.getElementById('previewBox').classList.remove('hidden');
                document.getElementById('uploadUI').classList.add('hidden');
                analyzeBtn.classList.remove('hidden');
            }
        };

        analyzeBtn.onclick = async () => {
            analyzeBtn.classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imagePreview.src })
                });

                const data = await response.json();
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('aiResponse').innerText = data.result || "Bir hata oluştu.";
            } catch (err) {
                alert("Bağlantı hatası!");
                location.reload();
            }
        };
    </script>
</body>
</html>
