<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Yönetim Kurulu | Kurumsal Sürüm</title>
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-panel: rgba(15, 18, 25, 0.9);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-light: #e2e8f0;
            --text-muted: #64748b;
            --c-openai: #10a37f;
            --c-gemini: #c255ff;
            --c-claude: #d97757;
            --c-user: #38bdf8;
            
            /* Kurumsal Masa Renkleri: Koyu Maun Ahşap / Deri ve Metal */
            --table-surface: linear-gradient(145deg, #1c1512 0%, #0d0907 100%);
            --table-rim: #2a2d35; /* Kalın mat metal çerçeve */
            --table-inner-glow: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% -20%, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* --- ÜST PANEL --- */
        .header-panel {
            background: var(--bg-panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass); padding: 12px 20px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .info-card { flex: 1; min-width: 150px; }
        .info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 600; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .vote-highlight { color: #fbbf24; font-size: 14px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); font-weight: 700;}

        .vote-actions { display: flex; gap: 8px; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px; font-weight: 700; font-size: 11px;
            cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-yes { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .btn-yes:hover:not(:disabled) { background: #22c55e; color: white; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .btn-no { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .btn-no:hover:not(:disabled) { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- ORTA ALAN & RESMİ MASA --- */
        .stage {
            flex: 1; min-height: 0; 
            display: flex; justify-content: center; align-items: center; position: relative;
            perspective: 1000px; /* Derinlik hissi artırıldı */
            padding: 30px 40px; 
        }
        
        .system-status {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            color: var(--c-user); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); width: 100%; text-align: center; font-weight: 700;
        }

        .table-wrapper {
            position: relative; 
            width: 100%; 
            max-width: 900px; 
            aspect-ratio: 2.2 / 1; /* Daha geniş, resmi dikdörtgen masa oranı */
            transform: rotateX(25deg); /* Masaya üstten/çaprazdan bakış açısı */
            transform-style: preserve-3d;
            max-height: 50vh; 
        }
        
        /* GERÇEKÇİ KURUMSAL MASA (Köşeleri yuvarlatılmış ağır dikdörtgen) */
        .board-table {
            width: 100%; height: 100%; 
            background: var(--table-surface); 
            border: 12px solid var(--table-rim); /* Ağır metalik dış çerçeve */
            border-radius: 60px; /* Kapsül değil, modern dikdörtgen masa köşesi */
            box-shadow: 
                0 40px 60px rgba(0,0,0,0.9), /* Yere düşen dev gölge */
                inset 0 4px 15px var(--table-inner-glow), /* Işık yansıması */
                inset 0 -10px 30px rgba(0,0,0,0.8); /* Masanın kendi iç gölgesi */
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        
        /* Masanın Ortasındaki Dijital Cam/Buzlu Alan */
        .holo-center {
            width: 70%; height: 50%; 
            background: rgba(56, 189, 248, 0.02); 
            border-radius: 30px;
            border: 1px solid rgba(56, 189, 248, 0.1); 
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.03); 
            position: relative;
        }

        /* --- AVATARLAR (Modüller masanın kenarlarına hizalandı) --- */
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; transform: translate(-50%, -50%); z-index: 5; }
        .node-icon {
            width: 45px; height: 45px; border-radius: 12px; background: #0f1117; display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 800; border: 2px solid; box-shadow: 0 10px 20px rgba(0,0,0,0.8); transition: all 0.3s ease;
        }
        .node-name { font-size: 10px; font-weight: 800; letter-spacing: 1px; color: #fff; text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);}

        .n-openai .node-icon { border-color: var(--c-openai); color: var(--c-openai); }
        .n-gemini .node-icon { border-color: var(--c-gemini); color: var(--c-gemini); }
        .n-claude .node-icon { border-color: var(--c-claude); color: var(--c-claude); }
        .n-user .node-icon { border-color: var(--c-user); color: var(--c-user); }

        .n-openai { top: -5px; left: 50%; } 
        .n-user { top: calc(100% + 5px); left: 50%; } 
        .n-gemini { top: 50%; left: -5px; } 
        .n-claude { top: 50%; left: calc(100% + 5px); } 

        .thinking .node-icon { animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px currentColor; } to { box-shadow: 0 0 25px currentColor, inset 0 0 10px currentColor; } }

        /* --- DOSYALAR --- */
        .doc {
            position: absolute; width: 32px; height: 44px; background: rgba(255,255,255,0.95); border-radius: 4px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0; transform: scale(0); transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 6px 15px rgba(0,0,0,0.7); font-size: 16px; border-left: 3px solid #ccc;
        }
        .doc:hover { transform: scale(1.3) translateY(-5px) !important; z-index: 10; box-shadow: 0 12px 25px rgba(0,0,0,0.8);}
        .doc.visible { opacity: 1; transform: scale(1); }

        .d-openai { top: 15%; left: 50%; transform: translateX(-50%); border-left-color: var(--c-openai); }
        .d-gemini { top: 50%; left: 15%; transform: translateY(-50%); border-left-color: var(--c-gemini); }
        .d-claude { top: 50%; right: 15%; transform: translateY(-50%); border-left-color: var(--c-claude); }

        .master-doc {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 55px; height: 70px; background: linear-gradient(135deg, #fbbf24, #d97706);
            border-radius: 5px 10px 10px 5px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; opacity: 0; transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); border-left: 6px solid #b45309; z-index: 2;
        }
        .master-doc:hover { transform: translate(-50%, -50%) scale(1.15) !important; box-shadow: 0 0 40px rgba(251, 191, 36, 0.7);}
        .master-doc.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* --- KULLANICI GİRİŞ ALANI --- */
        .input-area {
            background: var(--bg-panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border-glass); 
            padding: 15px 25px; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 12px;
        }
        .chat-input {
            flex: 1; background: #010409; border: 1px solid var(--border-glass); color: white; padding: 14px 20px; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--c-user); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .send-btn {
            background: var(--c-user); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
        }
        .send-btn:hover { background: #0ea5e9; transform: scale(1.02); }

        /* --- OKUMA PENCERESİ (MODAL) - MADDE İMİ ODAKLI --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.3s; padding: 20px;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: #0f1117; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid var(--border-glass); padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,1); position: relative; max-height: 80dvh; overflow-y: auto;}
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; color: var(--text-muted); cursor: pointer; }
        .close-btn:hover { color: white; }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-glass); text-transform: uppercase; letter-spacing: 1px;}
        .modal-body { font-size: 15px; line-height: 1.7; color: #cbd5e1; white-space: pre-line; }

        /* --- MOBİL İÇİN KESİN UYUM --- */
        @media (max-width: 768px) {
            .header-panel { padding: 10px 15px; gap: 8px; }
            .info-card { min-width: 100%; }
            .vote-actions { width: 100%; justify-content: space-between; gap: 5px;} .btn { flex: 1; text-align: center; font-size: 10px; padding: 8px;}
            
            .stage { padding: 25px; } 
            
            .table-wrapper { 
                width: 90%; 
                max-width: 400px;
                aspect-ratio: 1 / 1.5; /* Mobilde dikey dikdörtgen masa */
                transform: rotateX(15deg); 
            } 
            .board-table { border-radius: 40px; border-width: 8px; }
            .holo-center { border-radius: 20px; }
            
            .node-icon { width: 36px; height: 36px; font-size: 16px; border-width: 2px;}
            .node-name { font-size: 8px; padding: 2px 5px;}
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="info-card">
            <div class="info-label">Gündem Özeti</div>
            <div class="info-value" id="ui-topic">Bekleniyor...</div>
        </div>
        <div class="info-card">
            <div class="info-label" style="color: #fbbf24;">Oylamaya Sunulan Karar</div>
            <div class="vote-highlight" id="ui-vote-title">Modellerin fikirleri bekleniyor...</div>
        </div>
        <div class="vote-actions">
            <button class="btn btn-yes" id="btn-y" disabled onclick="userVote(true)">Onayla ve Uygula</button>
            <button class="btn btn-no" id="btn-n" disabled onclick="userVote(false)">Reddet</button>
        </div>
    </div>

    <div class="stage">
        <div class="system-status" id="ui-status">Sistem Hazır. Gündemi Belirleyin.</div>
        <div class="table-wrapper">
            <div class="board-table">
                <div class="holo-center">
                    <div class="doc d-openai" id="doc-openai" onclick="openDoc('OpenAI')">📄</div>
                    <div class="doc d-gemini" id="doc-gemini" onclick="openDoc('Gemini')">📄</div>
                    <div class="doc d-claude" id="doc-claude" onclick="openDoc('Claude')">📄</div>
                    <div class="master-doc" id="doc-master" onclick="openDoc('Ortak Karar')">📁</div>
                </div>
                <div class="node n-openai" id="ai-openai"><div class="node-icon">O</div><div class="node-name">OpenAI</div></div>
                <div class="node n-gemini" id="ai-gemini"><div class="node-icon">G</div><div class="node-name">Gemini</div></div>
                <div class="node n-claude" id="ai-claude"><div class="node-icon">C</div><div class="node-name">Claude</div></div>
                <div class="node n-user" id="ai-user"><div class="node-icon">👤</div><div class="node-name">Sen</div></div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" class="chat-input" id="topic-input" placeholder="Gündem maddesini masaya yatır..." onkeypress="if(event.key==='Enter') startProcess()">
        <button class="send-btn" onclick="startProcess()">Fikir Üret</button>
    </div>

    <div class="modal" id="doc-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modal-title">Başlık</div>
            <div class="modal-body" id="modal-text">İçerik...</div>
        </div>
    </div>

    <script>
        const database = { 'OpenAI': '', 'Gemini': '', 'Claude': '', 'Ortak Karar': '' };
        const aiNodes = ['openai', 'gemini', 'claude'];

        async function startProcess() {
            const fullText = document.getElementById('topic-input').value;
            if (!fullText.trim() || fullText.trim().length < 3) return;

            document.getElementById('ui-topic').innerText = "Özetleniyor...";
            document.getElementById('ui-topic').style.color = "var(--text-muted)";
            document.getElementById('ui-vote-title').innerText = "Pratik fikirler üretiliyor...";
            document.getElementById('ui-vote-title').style.color = "var(--text-muted)";
            document.getElementById('topic-input').value = '';
            document.querySelectorAll('.doc, .master-doc').forEach(el => el.classList.remove('visible'));
            document.getElementById('btn-y').disabled = true;
            document.getElementById('btn-n').disabled = true;

            aiNodes.forEach(id => document.getElementById('ai-' + id).classList.add('thinking'));
            document.getElementById('ui-status').innerText = "Modeller pratik çözüm adımları arıyor...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: fullText })
                });

                if (!response.ok) throw new Error("API hatası.");
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                database['OpenAI'] = data.openai;
                database['Gemini'] = data.gemini;
                database['Claude'] = data.claude;
                database['Ortak Karar'] = data.masterDecision;

                document.getElementById('ui-topic').innerText = `"${data.topicSummary}"`;
                document.getElementById('ui-topic').style.color = "var(--text-light)";

                aiNodes.forEach(id => document.getElementById('ai-' + id).classList.remove('thinking'));
                ['doc-openai', 'doc-gemini', 'doc-claude'].forEach(id => document.getElementById(id).classList.add('visible'));
                document.getElementById('ui-status').innerText = "Pratik fikirler masada. Sentezleniyor...";
                
                setTimeout(() => {
                    document.getElementById('doc-master').classList.add('visible');
                    document.getElementById('ui-status').innerText = "Net aksiyon planı hazır. Karar sizin.";
                    
                    document.getElementById('ui-vote-title').innerText = data.masterTitle;
                    document.getElementById('ui-vote-title').style.color = "#fbbf24";
                    
                    document.getElementById('btn-y').disabled = false;
                    document.getElementById('btn-n').disabled = false;
                }, 1500);

            } catch (error) {
                console.error(error);
                document.getElementById('ui-status').innerText = `HATA: Bağlantı sorunu.`;
                document.getElementById('ui-vote-title').innerText = "İşlem başarısız.";
                document.getElementById('ui-topic').innerText = "Hata.";
                aiNodes.forEach(id => document.getElementById('ai-' + id).classList.remove('thinking'));
            }
        }

        function openDoc(owner) {
            let color = "#fff";
            if(owner === 'OpenAI') color = "var(--c-openai)";
            else if(owner === 'Gemini') color = "var(--c-gemini)";
            else if(owner === 'Claude') color = "var(--c-claude)";
            else color = "#fbbf24";

            document.getElementById('modal-title').style.color = color;
            document.getElementById('modal-title').innerText = owner + " Fikirleri";
            document.getElementById('modal-text').innerText = database[owner];
            document.getElementById('doc-modal').classList.add('show');
        }

        function closeModal() { document.getElementById('doc-modal').classList.remove('show'); }

        function userVote(isYes) {
            if(isYes) {
                alert("EVET: Aksiyon planı onaylandı ve uygulamaya geçiliyor.");
                document.getElementById('ui-status').innerText = "EYLEM PLANI ONAYLANDI.";
            } else {
                alert("HAYIR: Fikirler reddedildi.");
                document.getElementById('ui-status').innerText = "FİKİRLER REDDEDİLDİ. Yeni konu bekleniyor.";
                document.getElementById('ui-vote-title').innerText = "Yeni fikir üretimi bekleniyor...";
                document.getElementById('ui-vote-title').style.color = "var(--text-muted)";
            }
            document.getElementById('doc-master').classList.remove('visible');
            document.getElementById('btn-y').disabled = true;
            document.getElementById('btn-n').disabled = true;
        }
    </script>
</body>
</html>
