<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Analiz</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdOeigm877SXMe7mMtuEMPUeGkY9WcgyIJPbzGJU2HP1CS_eaGcn4O0FnUEoB3JFmDXEHSnxx5Do-pIN&currency=USD&components=buttons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; position: relative; }
        
        /* Yeni Giriş Ekranı Rol Seçimi */
        .role-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #2d3748; background: #0b0f1a; color: #94a3b8; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .role-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(16, 185, 129, 0.1); }

        .auth-container h1 { font-size: 2.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 900; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; color: white; transition: 0.3s; }
        .btn-main { background: var(--primary); }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #2d3748; margin-top: 10px; font-size: 0.8rem; }
        
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 2px solid #1e293b; margin-bottom: 20px; position: relative; }
        video, #photoCanvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #photoCanvas { display: none; z-index: 10; }

        .premium-area { background: rgba(245, 158, 11, 0.08); border: 2px solid var(--premium); border-radius: 25px; padding: 20px; margin-top: 20px; text-align: center; }
        #results { display: none; flex-direction: column; gap: 12px; margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 20px; }
        .report-card { background: #1a202c; border-radius: 15px; padding: 18px; border-top: 4px solid var(--accent); }
        .report-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .report-txt { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; white-space: pre-line; }
        
        .history-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid var(--primary); cursor: pointer; }
        .score-wrapper { margin-top: 20px; margin-bottom: 10px; width: 100%; position: relative; padding-bottom: 20px; }
        .score-bar { height: 14px; width: 100%; border-radius: 7px; background: linear-gradient(to right, #ef4444 0%, #f97316 35%, #eab308 65%, #22c55e 100%); position: relative; }
        .score-marker { position: absolute; top: -10px; width: 30px; height: 30px; background: #fff; border: 3px solid #1e293b; border-radius: 50%; transform: translateX(-50%); transition: left 1s ease-out; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: #000; z-index: 2; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--primary); position: relative; }
        
        .streak-badge { display:none; background:rgba(249, 115, 22, 0.15); color:#f97316; padding:8px 15px; border-radius:20px; font-weight:900; font-size:0.9rem; border:1px solid #f97316; }
        .partner-box { background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        
        .bell-container, .friends-btn { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .notif-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notif-dropdown, .friends-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 280px; background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 10px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .friend-link { display: block; padding: 10px; background: #0b0f1a; border-radius: 10px; margin-bottom: 5px; color: var(--primary); font-weight: bold; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--primary); margin-bottom:15px;">Analiz Detayı</h3>
        <div id="modalBody" class="report-txt"></div>
        <button class="btn btn-outline" onclick="document.getElementById('detailModal').style.display='none'">KAPAT</button>
    </div>
</div>

<div class="app-card">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <div style="display: flex; align-items: center;">
            <span onclick="changeLang('tr')" style="font-size: 1.8rem; cursor: pointer; margin-right: 15px;">🇹🇷</span>
            <span onclick="changeLang('en')" style="font-size: 1.8rem; cursor: pointer;">🇺🇸</span>
        </div>
        <div id="streakBadge" class="streak-badge">
            🔥 <span id="streakCount">0</span> <span id="txtStreak">Seri</span>
        </div>
        <div style="display: flex;">
            <div class="bell-container" onclick="toggleNotifications()" id="bellIcon" style="display:none;">
                <span class="bell-icon">🔔</span>
                <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Bildirimler</h4>
                    <div id="notifList"></div>
                </div>
            </div>
            <div class="friends-btn" id="friendListBtn" onclick="toggleFriends()" style="display:none;">
                👤
                <div class="friends-dropdown" id="friendsDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Takip Ettiklerin</h4>
                    <div id="friendsListContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginView" class="auth-container">
        <h1>BIO-CHEF</h1>
        <div class="role-box">
            <button class="role-btn active" id="btnLClient" onclick="setRole('Danışan')">DANIŞAN</button>
            <button class="role-btn" id="btnLDoc" onclick="setRole('Diyetisyen')">DİYETİSYEN</button>
        </div>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" style="border:none;" onclick="doReset()">Şifremi Unuttum?</button>
        <button class="btn btn-outline" onclick="toggleView('regView')">Kayıt Ol</button>
    </div>

    <div id="regView" class="auth-container" style="display:none;">
        <h1>KAYIT OL</h1>
        <div class="role-box">
            <button class="role-btn active" onclick="setRole('Danışan')">DANIŞAN</button>
            <button class="role-btn" onclick="setRole('Diyetisyen')">DİYETİSYEN</button>
        </div>
        <input type="email" id="rEmail" placeholder="E-posta">
        <input type="text" id="rUser" placeholder="Kullanıcı Adı">
        <input type="password" id="rPass" placeholder="Şifre">
        <button class="btn btn-sub" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="mainView" style="display:none;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="clock" style="font-size: 2.2rem; font-weight: 800; color: var(--accent);">00:00:00</div>
            <div id="uMail" class="user-tag"></div> 
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ" onchange="saveProfileData()">
            <input type="number" id="uWeight" placeholder="KİLO" onchange="saveProfileData()">
        </div>
        <select id="uGoal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>
        <div class="cam-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="photoCanvas"></canvas>
        </div>
        <button class="btn btn-main" id="btnAnalyze" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        <button class="btn btn-sub" id="btnReset" style="display:none;" onclick="resetCamera()">🔄 YENİDEN ANALİZ ET</button>
        
        <div id="results"></div>
        <button class="btn btn-main" id="btnPdf" style="display:none; background: #ef4444; margin-top:15px;" onclick="downloadPDF()">📄 PDF OLARAK KAYDET</button>

        <button class="btn btn-outline" onclick="toggleHistory()" style="margin-top:25px;">📚 GEÇMİŞ ANALİZLERİM</button>
        <div id="historyPanel" style="display:none; margin-top:15px; padding:15px; border-radius:15px; border: 1px solid #2d3748;">
            <h3 style="text-align:center; color:var(--primary); margin-bottom:10px;">Son Taramalarınız</h3>
            <div id="historyList"></div>
        </div>

        <button class="btn btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="togglePartner()">👫 KANKA / ÇİFT ARENASI</button>
        <div id="partnerPanel" class="partner-box" style="display:none;">
            <h3>Partnerini Denetle! 🚨</h3>
            <input type="text" id="partnerUser" placeholder="Kullanıcı Adı">
            <button class="btn btn-sub" onclick="sendFriendRequest()">➕ ARKADAŞ EKLE</button>
            <button class="btn btn-sub" style="background: var(--danger);" onclick="checkPartner()">🔍 DURUMUNU SORGULA</button>
            <div id="partnerResult" style="margin-top:15px; font-weight:bold;"></div>
            <div id="partnerHistoryList" style="text-align: left; margin-top: 10px;"></div>
        </div>

        <div class="premium-area">
            <button class="btn btn-sub" style="background: var(--premium); color: black;" onclick="handlePlanClick()">📅 HAFTALIK PLANINIZI ÇIKARIN</button>
            <div id="premiumLockInfo">
                <div class="premium-title">PREMIUM ÜYE | 0.99 $</div>
                <div id="paypal-button-container"></div>
            </div>
        </div>

        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>
</div>

<script>
    let currentRole = 'Danışan';
    let currentLang = 'tr';
    const firebaseConfig = {
        apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
        authDomain: "voice2post-9e8ca.firebaseapp.com",
        projectId: "voice2post-9e8ca",
        storageBucket: "voice2post-9e8ca.firebasestorage.app",
        messagingSenderId: "511446656614",
        appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore(); 

    function setRole(role) { currentRole = role; document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(role.toUpperCase()))); }
    function toggleView(id) { ['loginView','regView','mainView'].forEach(v => document.getElementById(v).style.display = (v===id?'block':'none')); }

    auth.onAuthStateChanged(user => {
        if (user) {
            toggleView('mainView');
            document.getElementById('uMail').innerText = "@" + (user.displayName || user.email.split('@')[0]);
            loadSavedProfile();
            showStreak();
            document.getElementById('bellIcon').style.display = 'flex'; 
            document.getElementById('friendListBtn').style.display = 'flex'; 
            listenNotifications(); listenFriends();
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
        } else { toggleView('loginView'); }
    });

    function saveProfileData() {
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        localStorage.setItem('uAge', age);
        localStorage.setItem('uWeight', weight);
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).set({ age, weight }, { merge: true });
    }

    function loadSavedProfile() {
        document.getElementById('uAge').value = localStorage.getItem('uAge') || "";
        document.getElementById('uWeight').value = localStorage.getItem('uWeight') || "";
    }

    async function runAI(mode) {
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        if(!age || !weight) return alert("Bilgileri girin.");

        const video = document.getElementById('video');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        
        // Fotoğrafı Çek ve Ekranı Dondur
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        canvas.style.display = 'block';
        video.style.display = 'none';

        document.getElementById('btnAnalyze').style.display = 'none';
        document.getElementById('btnReset').style.display = 'block';

        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<p style="text-align:center;">🔍 İnceleniyor...</p>`;
        resDiv.style.display = 'flex';
        resDiv.scrollIntoView();

        try {
            const img = canvas.toDataURL('image/jpeg', 0.7);
            const r = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}`, lang: currentLang })
            });
            const d = await r.json();
            resDiv.innerHTML = '';
            
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
            let score = 5;
            sections.forEach((txt, i) => {
                const card = document.createElement('div'); card.className = 'report-card';
                let content = txt.trim();
                if(mode === 'yemek' && i === 0) {
                    const match = content.match(/\[SKOR:\s*(\d+)\]/i);
                    if(match) { score = parseInt(match[1]); content = content.replace(match[0], '').trim(); updateStreak(score); }
                    card.innerHTML = `<div class="report-tag">HEDEF SKORU 🎯</div><div class="report-txt">${content}</div>
                    <div class="score-wrapper"><div class="score-bar"><div class="score-marker" style="left:${score*10}%">${score}</div></div></div>`;
                } else { card.innerHTML = `<div class="report-tag">ANALİZ</div><div class="report-txt">${content}</div>`; }
                resDiv.appendChild(card);
            });
            document.getElementById('btnPdf').style.display = 'block';
            if(mode === 'yemek') saveHistory(score, d.analysis);
        } catch(e) { resDiv.innerHTML = "Hata oluştu."; }
    }

    function resetCamera() {
        document.getElementById('photoCanvas').style.display = 'none';
        document.getElementById('video').style.display = 'block';
        document.getElementById('btnAnalyze').style.display = 'block';
        document.getElementById('btnReset').style.display = 'none';
        document.getElementById('results').innerHTML = '';
    }

    function saveHistory(score, raw) {
        let me = auth.currentUser.displayName.toLowerCase();
        let date = new Date().toLocaleString();
        let summary = raw.substring(0, 50) + "...";
        db.collection('partner_data').doc(me).update({ 
            score, lastMeal: summary, 
            history: firebase.firestore.FieldValue.arrayUnion({ summary, date, score, full: raw })
        });
        let arr = JSON.parse(localStorage.getItem('hist_'+auth.currentUser.uid) || '[]');
        arr.unshift({ summary, date, score, full: raw });
        localStorage.setItem('hist_'+auth.currentUser.uid, JSON.stringify(arr.slice(0,10)));
    }

    function toggleHistory() {
        const p = document.getElementById('historyPanel');
        p.style.display = (p.style.display === 'none' ? 'block' : 'none');
        const list = document.getElementById('historyList');
        let arr = JSON.parse(localStorage.getItem('hist_'+auth.currentUser.uid) || '[]');
        list.innerHTML = arr.map((h, i) => `<div class="history-box" onclick="showModal(${i})"><b>${h.date}</b><br>${h.summary}<br><b>Skor: ${h.score}/10</b></div>`).join('');
    }

    function showModal(i) {
        let arr = JSON.parse(localStorage.getItem('hist_'+auth.currentUser.uid) || '[]');
        document.getElementById('modalBody').innerText = arr[i].full;
        document.getElementById('detailModal').style.display = 'flex';
    }

    async function checkPartner() {
        const u = document.getElementById('partnerUser').value.toLowerCase();
        const doc = await db.collection('partner_data').doc(u).get();
        const res = document.getElementById('partnerResult');
        const hList = document.getElementById('partnerHistoryList');
        if(doc.exists) {
            let d = doc.data();
            res.innerText = (d.score < 7 ? "🚨 YAKALANDI! " : "✅ Sadık! ") + "Skor: " + d.score + "/10";
            hList.innerHTML = (d.history || []).slice(-5).reverse().map(h => `
                <div class="history-box" style="border-left-color: var(--danger);">
                    <b>${h.date}</b><br>Skor: ${h.score}/10<br>${h.summary}
                </div>`).join('');
            document.getElementById('partnerPanel').scrollIntoView();
        }
    }

    function sendFriendRequest() {
        db.collection('notifications').add({ toUser: document.getElementById('partnerUser').value.toLowerCase(), fromUser: auth.currentUser.displayName.toLowerCase(), type: 'friend_request' });
        alert("Gönderildi.");
    }

    function listenFriends() {
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).onSnapshot(doc => {
            const container = document.getElementById('friendsListContainer');
            container.innerHTML = (doc.data()?.friends || []).map(f => `<div class="friend-link" onclick="checkSpec('${f}')">@${f}</div>`).join('');
        });
    }

    function checkSpec(u) { document.getElementById('partnerUser').value = u; checkPartner(); toggleFriends(); }
    function toggleNotifications() { let d = document.getElementById('notifDropdown'); d.style.display = (d.style.display==='none'?'block':'none'); }
    function toggleFriends() { let d = document.getElementById('friendsDropdown'); d.style.display = (d.style.display==='none'?'block':'none'); }
    function updateStreak(s) { 
        let d = JSON.parse(localStorage.getItem('streak_'+auth.currentUser.uid) || '{"count":0,"last":""}');
        let t = new Date().toLocaleDateString();
        if(s >= 7) { if(d.last !== t) d.count++; d.last = t; } else { d.count = 0; }
        localStorage.setItem('streak_'+auth.currentUser.uid, JSON.stringify(d)); showStreak();
    }
    function showStreak() { let d = JSON.parse(localStorage.getItem('streak_'+auth.currentUser.uid) || '{"count":0}'); if(d.count > 0) { document.getElementById('streakBadge').style.display='block'; document.getElementById('streakCount').innerText = d.count; } }
    setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    async function doLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert(e.message); } }
    async function doRegister() { 
        const u = document.getElementById('rUser').value.trim().toLowerCase();
        try { 
            const cred = await auth.createUserWithEmailAndPassword(document.getElementById('rEmail').value, document.getElementById('rPass').value);
            await cred.user.updateProfile({ displayName: u });
            await db.collection('partner_data').doc(u).set({ username: u, role: currentRole });
            location.reload(); 
        } catch(e) { alert(e.message); } 
    }
    function downloadPDF() { html2pdf().from(document.getElementById('results')).save(); }
    function doReset() { auth.sendPasswordResetEmail(document.getElementById('lEmail').value).then(() => alert("Gönderildi.")); }
</script>
</body>
</html>
