<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Analiz</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdOeigm877SXMe7mMtuEMPUeGkY9WcgyIJPbzGJU2HP1CS_eaGcn4O0FnUEoB3JFmDXEHSnxx5Do-pIN&currency=USD&components=buttons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; position: relative; }
        .auth-container h1 { font-size: 2.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 900; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; color: white; transition: 0.3s; }
        .btn-main { background: var(--primary); }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #2d3748; margin-top: 10px; font-size: 0.8rem; }
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 2px solid #1e293b; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .premium-area { background: rgba(245, 158, 11, 0.08); border: 2px solid var(--premium); border-radius: 25px; padding: 20px; margin-top: 20px; text-align: center; }
        .premium-title { font-weight: 900; color: var(--premium); font-size: 1.1rem; margin-bottom: 15px; }
        #paypal-button-container { margin-top: 10px; min-height: 150px; }

        #results { display: none; flex-direction: column; gap: 12px; margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 20px; }
        .report-card { background: #1a202c; border-radius: 15px; padding: 18px; border-top: 4px solid var(--accent); }
        .report-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .report-txt { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; white-space: pre-line; }

        .history-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid var(--primary); }

        .score-wrapper { margin-top: 20px; margin-bottom: 10px; width: 100%; position: relative; padding-bottom: 20px; }
        .score-bar { height: 14px; width: 100%; border-radius: 7px; background: linear-gradient(to right, #ef4444 0%, #f97316 35%, #eab308 65%, #22c55e 100%); position: relative; }
        .score-marker { position: absolute; top: -10px; width: 30px; height: 30px; background: #fff; border: 3px solid #1e293b; border-radius: 50%; transform: translateX(-50%); transition: left 1s ease-out; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: #000; z-index: 2; }
        .score-marker::after { content: '📍'; position: absolute; bottom: -20px; font-size: 1rem; }

        .streak-badge { display:none; background:rgba(249, 115, 22, 0.15); color:#f97316; padding:8px 15px; border-radius:20px; font-weight:900; font-size:0.9rem; border:1px solid #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .partner-box { background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }

        .bell-container { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .bell-icon { font-size: 1.5rem; }
        .notif-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notif-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 280px; background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 10px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-height: 300px; overflow-y: auto; }
        .notif-item { background: #0b0f1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.8rem; color: #cbd5e1; border-left: 3px solid var(--accent); }
        .notif-btn { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-top: 5px; font-weight:bold; }
        
        .user-tag { font-size: 1.1rem; font-weight: 900; color: var(--primary); margin-top: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Yeni Arkadaş Listesi Stili */
        .friends-btn { font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; margin-left: 10px; }
        .friends-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 250px; background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 10px; z-index: 101; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .friend-link { display: block; padding: 10px; background: #0b0f1a; border-radius: 10px; margin-bottom: 5px; color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .friend-link:hover { background: #161b2a; }
    </style>
</head>
<body>

<div class="app-card">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <div style="display: flex; align-items: center;">
            <span onclick="changeLang('tr')" style="font-size: 1.8rem; cursor: pointer; margin-right: 15px;" title="Türkçe">🇹🇷</span>
            <span onclick="changeLang('en')" style="font-size: 1.8rem; cursor: pointer;" title="English">🇺🇸</span>
        </div>
        <div id="streakBadge" class="streak-badge" style="margin-left:10px;">
            🔥 <span id="streakCount">0</span> <span id="txtStreak">Seri</span>
        </div>
        
        <div style="display: flex; position: relative;">
            <div class="bell-container" onclick="toggleNotifications()" id="bellIcon" style="display:none;">
                <span class="bell-icon">🔔</span>
                <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Bildirimler</h4>
                    <div id="notifList"><p style="text-align:center; font-size:0.8rem;">Bildirim yok.</p></div>
                </div>
            </div>

            <div class="friends-btn" id="friendListBtn" onclick="toggleFriends()" style="display:none;">
                👤
                <div class="friends-dropdown" id="friendsDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Takip Ettiklerin</h4>
                    <div id="friendsListContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginView" class="auth-container">
        <h1 id="txtL1">BIO-CHEF</h1>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" id="txtL4" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" id="txtL5" style="border:none;" onclick="doReset()">Şifremi Unuttum?</button>
        <button class="btn btn-outline" id="txtL6" onclick="toggleView('regView')">Kayıt Ol</button>
    </div>

    <div id="regView" class="auth-container" style="display:none;">
        <h1 id="txtR7">KAYIT OL</h1>
        <input type="email" id="rEmail" placeholder="E-posta">
        <input type="text" id="rUser" placeholder="Kullanıcı Adı (Örn: fit_chef)">
        <input type="password" id="rPass" placeholder="Şifre">
        <button class="btn btn-sub" id="txtR8" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" id="txtR9" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="mainView" style="display:none;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="clock" style="font-size: 2.2rem; font-weight: 800; color: var(--accent);">00:00:00</div>
            <div id="uMail" class="user-tag"></div> 
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ">
            <input type="number" id="uWeight" placeholder="KİLO">
        </div>
        <select id="uGoal">
            <option id="opt1" value="Kilo Vermek">Kilo Vermek (-)</option>
            <option id="opt2" value="Kilo Almak">Kilo Almak (+)</option>
            <option id="opt3" value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>

        <div class="cam-box"><video id="video" autoplay playsinline onclick="this.play()"></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <button class="btn btn-main" id="btnAnalyzeText" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        
        <div id="results"></div>
        <button class="btn btn-main" id="btnPdf" style="display:none; background: #ef4444; margin-top:15px;" onclick="downloadPDF()">📄 PDF OLARAK KAYDET</button>

        <button class="btn btn-outline" id="btnHistToggle" onclick="toggleHistory()" style="margin-top:25px;">📚 GEÇMİŞ ANALİZLERİM</button>
        <div id="historyPanel" style="display:none; margin-top:15px; padding:15px; border-radius:15px; border: 1px solid #2d3748;">
            <h3 id="txtHistTitle" style="text-align:center; color:var(--primary); margin-bottom:10px;">Son Taramalarınız</h3>
            <div id="historyList"></div>
        </div>

        <button class="btn btn-outline" id="btnPartnerToggle" style="border-color: var(--danger); color: var(--danger);" onclick="togglePartner()">👫 KANKA / ÇİFT ARENASI</button>
        <div id="partnerPanel" class="partner-box" style="display:none;">
            <h3 id="txtPartTitle" style="color:var(--danger); margin-bottom:10px;">Partnerini Denetle! 🚨</h3>
            <input type="text" id="partnerUser" placeholder="Kullanıcı Adı Girin" style="background: rgba(0,0,0,0.5);">
            <button class="btn btn-sub" id="btnAddFriend" style="background: var(--accent); margin-bottom:5px;" onclick="sendFriendRequest()">➕ ARKADAŞ EKLE İSTEĞİ AT</button>
            <button class="btn btn-sub" id="btnCheckPart" style="background: var(--danger);" onclick="checkPartner()">🔍 DURUMUNU SORGULA</button>
            <div id="partnerResult" style="margin-top:15px; font-weight:bold; white-space:pre-line;"></div>
        </div>

        <div class="premium-area">
            <button class="btn btn-sub" id="txtBtnPlan" style="margin-top:0; background: var(--premium); color: black;" onclick="handlePlanClick()">📅 HAFTALIK PLANINIZI ÇIKARIN</button>
            <div id="premiumLockInfo" style="margin-top: 15px;">
                <div class="premium-title" id="txtPrem">PREMIUM ÜYE | 0.99 $</div>
                <div id="paypal-button-container"></div>
            </div>
        </div>

        <button class="btn btn-outline" id="txtOut" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>
</div>

<script>
    let currentLang = 'tr';
    const langData = {
        tr: {
            appTitle: "BIO-CHEF", emailHolder: "E-posta", passHolder: "Şifre", btnLogin: "GİRİŞ YAP", btnReset: "Şifremi Unuttum?", btnReg: "Kayıt Ol",
            regTitle: "KAYIT OL", btnCreate: "HESABI OLUŞTUR", btnBack: "Geri Dön",
            ageHolder: "YAŞ", weightHolder: "KİLO",
            g1: "Kilo Vermek (-)", g2: "Kilo Almak (+)", g3: "Kiloyu Korumak (=)",
            btnAna: "📸 ANALİZ ET", btnPlan: "📅 HAFTALIK PLANINIZI ÇIKARIN", premTitle: "PREMIUM ÜYE | 0.99 $", btnOut: "GÜVENLİ ÇIKIŞ",
            errMail: "Mail veya Kullanıcı Adı eksik.", errInfo: "Bilgileri girin.", errPlan: "Haftalık plan için aşağıdan Premium üyeliğinizi başlatın.", errMsg: "Hata!",
            errUserTaken: "Bu kullanıcı adı zaten alınmış! Lütfen başka bir ad seçin.", 
            loading: "🔍 İnceleniyor...", 
            headersYemek: ["HEDEF SKORU 🎯", "AÇLIK KRONOMETRESİ ⏳", "ÜRÜN ÖZETİ", "BESİN DEĞERLERİ", "HEDEF ANALİZİ", "NET TAVSİYE"],
            headersPlan: ["PAZARTESİ", "SALI", "ÇARŞAMBA", "PERŞEMBE", "CUMA", "CUMARTESİ", "PAZAR"],
            payDesc: "Bio-Chef Pro Haftalık Plan Erişimi", paySucc: "Ödeme Başarılı! VIP özellikler aktif edildi.",
            btnPdfTxt: "📄 PDF OLARAK KAYDET", btnHistTxt: "📚 GEÇMİŞ ANALİZLERİM", histTitle: "Son Taramalarınız", noHist: "Henüz geçmiş yok.",
            markerInfo: "Sen", streakTxt: "Seri",
            btnPartToggle: "👫 KANKA / ÇİFT ARENASI", partTitle: "Partnerini Denetle! 🚨", partInput: "Kullanıcı Adı Girin", btnPartCheck: "🔍 DURUMUNU SORGULA",
            partErr: "Lütfen partner kullanıcı adı girin.", partNoData: "Önce ona arkadaşlık isteği atmalı ve onun kabul etmesini beklemelisin!",
            partCatch: "🚨 YAKALANDI! Partnerin gizlice kötü besleniyor!\nSkoru: ", partGood: "✅ Partnerin diyete sadık!\nSkoru: "
        },
        en: {
            appTitle: "BIO-CHEF", emailHolder: "Email", passHolder: "Password", btnLogin: "LOGIN", btnReset: "Forgot Password?", btnReg: "Sign Up",
            regTitle: "SIGN UP", btnCreate: "CREATE ACCOUNT", btnBack: "Go Back",
            ageHolder: "AGE", weightHolder: "WEIGHT",
            g1: "Lose Weight (-)", g2: "Gain Weight (+)", g3: "Maintain Weight (=)",
            btnAna: "📸 ANALYZE", btnPlan: "📅 GET WEEKLY PLAN", premTitle: "PREMIUM MEMBER | $0.99", btnOut: "SECURE LOGOUT",
            errMail: "Missing email or username.", errInfo: "Enter info.", errPlan: "Start Premium below for weekly plan.", errMsg: "Error!",
            errUserTaken: "This username is already taken! Please choose another one.",
            loading: "🔍 Analyzing...", 
            headersYemek: ["GOAL SCORE 🎯", "HUNGER STOPWATCH ⏳", "PRODUCT SUMMARY", "NUTRITION FACTS", "GOAL ANALYSIS", "NET ADVICE"],
            headersPlan: ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"],
            payDesc: "Bio-Chef Pro Weekly Plan Access", paySucc: "Payment Successful! VIP features activated.",
            btnPdfTxt: "📄 DOWNLOAD AS PDF", btnHistTxt: "📚 MY HISTORY", histTitle: "Recent Scans", noHist: "No history yet.",
            markerInfo: "You", streakTxt: "Streak",
            btnPartToggle: "👫 BUDDY / COUPLE ARENA", partTitle: "Inspect Your Partner! 🚨", partInput: "Enter Username", btnPartCheck: "🔍 CHECK STATUS",
            partErr: "Please enter partner username.", partNoData: "You must send a friend request first and wait for approval!",
            partCatch: "🚨 CAUGHT! Your partner is eating bad secretly!\nScore: ", partGood: "✅ Your partner is staying fit!\nScore: "
        }
    };

    function changeLang(l) {
        currentLang = l;
        document.getElementById('txtL1').innerText = langData[l].appTitle;
        document.getElementById('lEmail').placeholder = langData[l].emailHolder;
        document.getElementById('lPass').placeholder = langData[l].passHolder;
        document.getElementById('txtL4').innerText = langData[l].btnLogin;
        document.getElementById('txtL5').innerText = langData[l].btnReset;
        document.getElementById('txtL6').innerText = langData[l].btnReg;
        document.getElementById('txtR7').innerText = langData[l].regTitle;
        document.getElementById('rEmail').placeholder = langData[l].emailHolder;
        document.getElementById('rPass').placeholder = langData[l].passHolder;
        document.getElementById('txtR8').innerText = langData[l].btnCreate;
        document.getElementById('txtR9').innerText = langData[l].btnBack;
        document.getElementById('uAge').placeholder = langData[l].ageHolder;
        document.getElementById('uWeight').placeholder = langData[l].weightHolder;
        document.getElementById('opt1').innerText = langData[l].g1;
        document.getElementById('opt2').innerText = langData[l].g2;
        document.getElementById('opt3').innerText = langData[l].g3;
        document.getElementById('btnAnalyzeText').innerText = langData[l].btnAna;
        document.getElementById('txtBtnPlan').innerText = langData[l].btnPlan;
        document.getElementById('txtPrem').innerText = langData[l].premTitle;
        document.getElementById('txtOut').innerText = langData[l].btnOut;
        document.getElementById('btnPdf').innerText = langData[l].btnPdfTxt;
        document.getElementById('btnHistToggle').innerText = langData[l].btnHistTxt;
        document.getElementById('txtHistTitle').innerText = langData[l].histTitle;
        document.getElementById('txtStreak').innerText = langData[l].streakTxt; 
        document.getElementById('btnPartnerToggle').innerText = langData[l].btnPartToggle;
        document.getElementById('txtPartTitle').innerText = langData[l].partTitle;
        document.getElementById('partnerUser').placeholder = langData[l].partInput; 
        document.getElementById('btnCheckPart').innerText = langData[l].btnPartCheck;
    }

    const firebaseConfig = {
        apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
        authDomain: "voice2post-9e8ca.firebaseapp.com",
        projectId: "voice2post-9e8ca",
        storageBucket: "voice2post-9e8ca.firebasestorage.app",
        messagingSenderId: "511446656614",
        appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore(); 
    let isVip = false;

    function toggleView(id) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('regView').style.display = 'none';
        document.getElementById('mainView').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    auth.onAuthStateChanged(user => {
        if (user) {
            toggleView('mainView');
            let displayString = user.displayName ? "@" + user.displayName : "@" + user.email.split('@')[0];
            document.getElementById('uMail').innerText = displayString;
            
            isVip = localStorage.getItem('vip_' + user.uid) === 'true';
            if(!isVip) { document.getElementById('premiumLockInfo').style.display = 'block'; initPayPal(); } 
            else { document.getElementById('premiumLockInfo').style.display = 'none'; }
            
            showStreak(); 
            document.getElementById('bellIcon').style.display = 'flex'; 
            document.getElementById('friendListBtn').style.display = 'flex'; 
            listenNotifications(); 
            listenFriends();
            
            let activeUser = user.displayName ? user.displayName.toLowerCase() : user.email.split('@')[0].toLowerCase();
            db.collection('partner_data').doc(activeUser).set({ username: activeUser }, { merge: true });
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
        } else { 
            toggleView('loginView'); 
            document.getElementById('bellIcon').style.display = 'none';
            document.getElementById('friendListBtn').style.display = 'none';
        }
    });

    function toggleNotifications() {
        const drop = document.getElementById('notifDropdown');
        const fDrop = document.getElementById('friendsDropdown');
        fDrop.style.display = 'none';
        drop.style.display = drop.style.display === 'none' ? 'block' : 'none';
    }

    function toggleFriends() {
        const fDrop = document.getElementById('friendsDropdown');
        const nDrop = document.getElementById('notifDropdown');
        nDrop.style.display = 'none';
        fDrop.style.display = fDrop.style.display === 'none' ? 'block' : 'none';
    }

    function listenFriends() {
        let activeUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
        db.collection('partner_data').doc(activeUser).onSnapshot(doc => {
            const listDiv = document.getElementById('friendsListContainer');
            listDiv.innerHTML = '';
            if(doc.exists && doc.data().friends) {
                doc.data().friends.forEach(f => {
                    listDiv.innerHTML += `<div class="friend-link" onclick="checkSpecificPartner('${f}')">@${f}</div>`;
                });
            } else {
                listDiv.innerHTML = '<p style="text-align:center; font-size:0.7rem; color:#94a3b8;">Takip edilen yok.</p>';
            }
        });
    }

    function checkSpecificPartner(username) {
        document.getElementById('partnerUser').value = username;
        togglePartner(); // Paneli aç
        if (document.getElementById('partnerPanel').style.display === 'none') togglePartner();
        checkPartner(); // Sorgula
        toggleFriends(); // Menüyü kapat
    }

    function listenNotifications() {
        let activeUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
        db.collection('notifications').where('toUser', '==', activeUser)
          .onSnapshot(snap => {
              const listDiv = document.getElementById('notifList');
              const badge = document.getElementById('notifBadge');
              listDiv.innerHTML = '';
              let count = 0;
              snap.forEach(doc => {
                  count++;
                  let data = doc.data();
                  let itemHtml = `<div class="notif-item">`;
                  if(data.type === 'friend_request') {
                      itemHtml += `🤝 <b>@${data.fromUser}</b> seni takip etmek istiyor.<br>
                      <button class="notif-btn" onclick="acceptFriend('${data.fromUser}', '${doc.id}')">Kabul Et</button>`;
                  } else {
                      itemHtml += `${data.message} <br><button class="notif-btn" style="background:#ef4444;" onclick="deleteNotif('${doc.id}')">Sil</button>`;
                  }
                  itemHtml += `</div>`;
                  listDiv.innerHTML += itemHtml;
              });
              if(count > 0) { badge.style.display = 'flex'; badge.innerText = count; } 
              else { badge.style.display = 'none'; listDiv.innerHTML = '<p style="text-align:center; font-size:0.8rem;">Bildirim yok.</p>'; }
          });
    }

    function sendFriendRequest() {
        const pUser = document.getElementById('partnerUser').value.trim().toLowerCase();
        let myUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
        if(!pUser || pUser === myUser) return alert(langData[currentLang].partErr);
        db.collection('notifications').add({
            toUser: pUser, fromUser: myUser, type: 'friend_request', timestamp: new Date().getTime()
        }).then(() => alert("Arkadaşlık isteği gönderildi!"))
          .catch(() => alert("İstek gönderilemedi."));
    }

    function acceptFriend(friendUser, notifId) {
        let myUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
        db.collection('partner_data').doc(myUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(friendUser) });
        db.collection('partner_data').doc(friendUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(myUser) });
        deleteNotif(notifId);
        alert("Arkadaş eklendi!");
    }

    function deleteNotif(id) { db.collection('notifications').doc(id).delete(); }

    function showStreak() {
        if(!auth.currentUser) return;
        let streakData = JSON.parse(localStorage.getItem('streak_' + auth.currentUser.uid) || '{"count":0}');
        let badge = document.getElementById('streakBadge');
        if(streakData.count > 0) { badge.style.display = 'block'; document.getElementById('streakCount').innerText = streakData.count; } 
        else { badge.style.display = 'none'; }
    }

    function updateStreak(score) {
        if(!auth.currentUser) return;
        let uid = auth.currentUser.uid;
        let streakData = JSON.parse(localStorage.getItem('streak_' + uid) || '{"count":0, "lastDate":""}');
        let today = new Date().toLocaleDateString();
        let yesterdayObj = new Date(); yesterdayObj.setDate(yesterdayObj.getDate() - 1);
        let yesterday = yesterdayObj.toLocaleDateString();
        if(score >= 7) {
            if(streakData.lastDate === yesterday) { streakData.count++; streakData.lastDate = today; } 
            else if(streakData.lastDate !== today) { streakData.count = 1; streakData.lastDate = today; }
        } else { streakData.count = 0; streakData.lastDate = today; }
        localStorage.setItem('streak_' + uid, JSON.stringify(streakData));
        showStreak();
    }

    function initPayPal() {
        paypal.Buttons({
            style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
            createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: '0.99', currency_code: 'USD' }, description: langData[currentLang].payDesc }] }),
            onApprove: (d, a) => a.order.capture().then(det => { localStorage.setItem('vip_' + auth.currentUser.uid, 'true'); alert(langData[currentLang].paySucc); location.reload(); })
        }).render('#paypal-button-container');
    }

    async function doLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert(e.message); } }
    
    async function doRegister() { 
        const uName = document.getElementById('rUser').value.trim();
        const email = document.getElementById('rEmail').value;
        const pass = document.getElementById('rPass').value;
        if(!uName || !email || !pass) return alert("Lütfen tüm alanları doldurun.");
        const uNameLower = uName.toLowerCase();
        try { 
            const userCheck = await db.collection('partner_data').doc(uNameLower).get();
            if (userCheck.exists) return alert(langData[currentLang].errUserTaken);
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await cred.user.updateProfile({ displayName: uName });
            await db.collection('partner_data').doc(uNameLower).set({ username: uNameLower }, { merge: true });
            alert("Hesap başarıyla oluşturuldu!");
            location.reload(); 
        } catch(e) { alert(e.message); } 
    }

    async function doReset() { const email = document.getElementById('lEmail').value; if(!email) return alert("E-posta girin."); try { await auth.sendPasswordResetEmail(email); alert("Link gönderildi."); } catch(e) { alert(e.message); } }
    function handlePlanClick() { if(!isVip) return alert(langData[currentLang].errPlan); runAI('plan'); }

    async function runAI(mode) {
        const resDiv = document.getElementById('results');
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        if(!age || !weight) return alert(langData[currentLang].errInfo);
        document.getElementById('btnPdf').style.display = 'none'; 
        resDiv.innerHTML = `<p style="text-align:center;">${langData[currentLang].loading}</p>`;
        resDiv.style.display = 'flex';
        let img = "";
        if(mode === 'yemek') {
            const vid = document.getElementById('video');
            const canv = document.createElement('canvas');
            canv.width = 640; canv.height = 480;
            canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
            img = canv.toDataURL('image/jpeg', 0.7);
            vid.pause(); 
        }
        try {
            const r = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}`, lang: currentLang })
            });
            const d = await r.json();
            resDiv.innerHTML = '';
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
            const headers = mode === 'plan' ? langData[currentLang].headersPlan : langData[currentLang].headersYemek;
            let historySummary = "Analiz";
            let currentScore = 5;
            sections.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'report-card';
                let cardContent = text.trim();
                if (mode === 'yemek' && i === 0) {
                    const scoreMatch = cardContent.match(/\[SKOR:\s*(\d+)\]/i);
                    if (scoreMatch) {
                        currentScore = parseInt(scoreMatch[1]);
                        if(currentScore > 10) currentScore = 10;
                        cardContent = cardContent.replace(scoreMatch[0], '').trim();
                        updateStreak(currentScore);
                    }
                    let leftPos = (currentScore / 10) * 100;
                    let scoreBarHtml = `<div class="score-wrapper"><div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#94a3b8; margin-bottom:5px;"><span>Kötü (0)</span><span>Orta</span><span>Mükemmel (10)</span></div><div class="score-bar"><div class="score-marker" style="left: ${leftPos}%;">${currentScore}</div></div></div>`;
                    card.innerHTML = `<div class="report-tag">${headers[i]}</div><div class="report-txt">${cardContent}</div>${scoreBarHtml}`;
                    historySummary = `Skor: ${currentScore}/10 - ` + cardContent.substring(0, 30) + "...";
                } else {
                    card.innerHTML = `<div class="report-tag">${headers[i] || 'DETAY / DETAIL'}</div><div class="report-txt">${cardContent}</div>`;
                }
                resDiv.appendChild(card);
            });
            document.getElementById('btnPdf').style.display = 'block';
            if (auth.currentUser && mode === 'yemek') {
                let histKey = 'history_' + auth.currentUser.uid;
                let histArray = JSON.parse(localStorage.getItem(histKey) || '[]');
                histArray.unshift({ summary: historySummary, date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString() });
                if(histArray.length > 10) histArray.pop(); 
                localStorage.setItem(histKey, JSON.stringify(histArray));
                let myUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
                db.collection('partner_data').doc(myUser).set({ lastMeal: historySummary, score: currentScore, time: new Date().toLocaleTimeString() }, { merge: true });
                if (currentScore < 3 || currentScore >= 7) {
                    db.collection('partner_data').doc(myUser).get().then(doc => {
                        if(doc.exists && doc.data().friends) {
                            let msg = currentScore < 3 ? `🚨 Partnerin @${myUser} kötü beslendi (Skor: ${currentScore})!` : `✅ Partnerin @${myUser} harika beslendi (Skor: ${currentScore})!`;
                            doc.data().friends.forEach(friendUser => {
                                db.collection('notifications').add({ toUser: friendUser, fromUser: 'Sistem', type: 'alert', message: msg, timestamp: new Date().getTime() });
                            });
                        }
                    });
                }
            }
            setTimeout(() => { resDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200);
        } catch (e) { alert(langData[currentLang].errMsg); }
    }

    function downloadPDF() {
        const element = document.getElementById('results');
        const opt = { margin: 0.5, filename: 'BioChef_Rapor.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    function toggleHistory() {
        const panel = document.getElementById('historyPanel');
        const listDiv = document.getElementById('historyList');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
            if(!auth.currentUser) return;
            let histKey = 'history_' + auth.currentUser.uid;
            let histArray = JSON.parse(localStorage.getItem(histKey) || '[]');
            listDiv.innerHTML = '';
            if (histArray.length === 0) { listDiv.innerHTML = `<p style="text-align:center; color:#94a3b8;">${langData[currentLang].noHist}</p>`; } 
            else { histArray.forEach((data) => { listDiv.innerHTML += `<div class="history-box"><b>🗓️ ${data.date}</b><br>${data.summary}</div>`; }); }
        } else { panel.style.display = 'none'; }
    }

    function togglePartner() {
        const panel = document.getElementById('partnerPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function checkPartner() {
        const pUser = document.getElementById('partnerUser').value.trim().toLowerCase();
        const resDiv = document.getElementById('partnerResult');
        if(!pUser || !auth.currentUser) return alert(langData[currentLang].partErr);
        resDiv.innerHTML = "Sorgulanıyor...";
        let myUser = auth.currentUser.displayName ? auth.currentUser.displayName.toLowerCase() : auth.currentUser.email.split('@')[0].toLowerCase();
        db.collection('partner_data').doc(myUser).get().then((myDoc) => {
            if(myDoc.exists && myDoc.data().friends && myDoc.data().friends.includes(pUser)) {
                db.collection('partner_data').doc(pUser).get().then((doc) => {
                    if (doc.exists && doc.data().lastMeal) {
                        const data = doc.data();
                        if(data.score < 7) { resDiv.style.color = "var(--danger)"; resDiv.innerText = langData[currentLang].partCatch + data.score + "/10!\nSon Yemek: " + data.lastMeal + "\nSaat: " + data.time; } 
                        else { resDiv.style.color = "var(--primary)"; resDiv.innerText = langData[currentLang].partGood + data.score + "/10!\nSon Yemek: " + data.lastMeal + "\nSaat: " + data.time; }
                    } else { resDiv.style.color = "#94a3b8"; resDiv.innerText = "Bu kullanıcı henüz analiz yapmamış."; }
                });
            } else { resDiv.style.color = "#94a3b8"; resDiv.innerText = langData[currentLang].partNoData; }
        }).catch(() => { resDiv.innerText = "Hata!"; });
    }
</script>
