<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Analiz</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; --danger: #ef4444; --neutral: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; position: relative; }
        .auth-container h1 { font-size: 2.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 900; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; color: white; transition: 0.3s; }
        .btn-main { background: var(--primary); }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #2d3748; margin-top: 10px; font-size: 0.8rem; }
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 2px solid #1e293b; margin-bottom: 20px; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .freeze-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 185, 129, 0.2); backdrop-filter: blur(4px); z-index: 5; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 1.2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #results { display: none; flex-direction: column; gap: 12px; margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 20px; }
        .report-card { background: #1a202c; border-radius: 15px; padding: 18px; border-top: 4px solid var(--accent); position: relative; }
        .report-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .report-txt { font-size: 0.9rem; line-height: 1.8; color: #cbd5e1; white-space: pre-line; }
        .score-container { margin-top: 15px; }
        .score-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; color: #94a3b8; font-weight: bold; }
        .score-bar-bg { height: 12px; width: 100%; background: linear-gradient(to right, #ef4444, #f59e0b, #10b981); border-radius: 6px; position: relative; }
        .score-pointer { position: absolute; top: -5px; width: 22px; height: 22px; background: #fff; border: 3px solid var(--card); border-radius: 50%; transform: translateX(-50%); transition: left 1s ease-in-out; box-shadow: 0 0 10px rgba(255,255,255,0.5); z-index: 10; }
        .bell-container, .friends-btn { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; position: relative; }
        .notif-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notif-dropdown, .friends-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 280px; background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 15px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .notif-item { background: #0b0f1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--accent); color: #cbd5e1; display:flex; justify-content: space-between; align-items: center;}
        .notif-btn-del { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 0.6rem; font-weight:bold;}
        .role-selector { display: flex; background: #0b0f1a; border-radius: 15px; margin-bottom: 15px; padding: 5px; border: 1px solid #2d3748; }
        .role-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .role-btn.active { background: var(--primary); color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); margin: auto; padding: 20px; border-radius: 25px; max-width: 400px; border: 1px solid var(--primary); }
        .history-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid var(--primary); cursor: pointer; }
        .side-by-side { display: flex; gap: 10px; margin-top: 10px; }
        .side-by-side .btn { flex: 1; margin: 0; font-size: 0.75rem; }
        .split-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-neutral { background: var(--neutral) !important; color: white !important; font-size: 0.75rem; padding: 12px; border: 1px solid #2d3748 !important; }
        .dashboard { display: flex; justify-content: space-around; background: rgba(16, 185, 129, 0.1); border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid var(--primary); }
        .dash-item { text-align: center; }
        .dash-val { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        .dash-lab { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }
        .patient-card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid var(--primary); padding: 15px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="laraModal" class="modal">
    <div class="modal-content">
        <h3 id="txtLaraTitle" style="color:var(--accent); text-align:center; margin-bottom:15px;">🤖 YZ Diyetisyen: LARA</h3>
        <div id="laraChatDisplay" class="chat-box" style="display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto; margin-bottom:15px;"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="laraInput" placeholder="..." style="margin-bottom:0;">
            <button class="btn btn-main" onclick="askLara()" style="width:60px; padding:0;">🚀</button>
        </div>
        <button class="btn btn-outline" onclick="document.getElementById('laraModal').style.display='none'">Kapat</button>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3 id="detModalTitle" style="color:var(--primary); margin-bottom:15px; text-align:center;">Analiz Detayı</h3>
        <div id="modalBody" class="report-txt" style="max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px;"></div>
        <button class="btn btn-sub" style="margin-top:15px;" onclick="document.getElementById('detailModal').style.display='none'">Kapat</button>
    </div>
</div>

<div class="app-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <div style="display:flex; gap:10px;">
            <span onclick="changeLang('tr')" style="font-size: 1.8rem; cursor: pointer;">🇹🇷</span>
            <span onclick="changeLang('en')" style="font-size: 1.8rem; cursor: pointer;">🇺🇸</span>
        </div>
        <div id="streakBadge" class="streak-badge">🔥 <span id="streakCount">0</span> Seri</div>
        <div style="display: flex; gap:10px;">
            <div class="bell-container" onclick="toggleNotifications()" id="bellIcon" style="display:none;">
                🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown"><h4 id="txtNotifTitle" style="color:white; margin-bottom:10px; text-align:center;">Bildirimler</h4><div id="notifList"></div></div>
            </div>
            <div class="friends-btn" onclick="toggleFriends()" id="friendListBtn" style="display:none;">
                👤<div class="friends-dropdown" id="friendsDropdown"><h4 id="txtFriendsTitle" style="color:white; margin-bottom:10px; text-align:center;">Takip Ettiklerin</h4><div id="friendsListContainer"></div></div>
            </div>
        </div>
    </div>

    <div id="loginView" class="auth-container">
        <h1 id="txtAppName">BIO-CHEF</h1>
        <div class="role-selector">
            <button class="role-btn active" id="btnRoleUser" onclick="setRole('user', this)">DANIŞAN</button>
            <button class="role-btn" id="btnRoleDietician" onclick="setRole('dietician', this)">DİYETİSYEN</button>
        </div>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" id="btnIn" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" onclick="toggleView('regView')">Kayıt Ol</button>
    </div>

    <div id="regView" class="auth-container" style="display:none;">
        <h1>KAYIT OL</h1>
        <div class="role-selector">
            <button class="role-btn active" onclick="setRole('user', this)">DANIŞAN</button>
            <button class="role-btn" onclick="setRole('dietician', this)">DİYETİSYEN</button>
        </div>
        <input type="email" id="rEmail" placeholder="E-posta">
        <input type="text" id="rUser" placeholder="Kullanıcı Adı">
        <input type="password" id="rPass" placeholder="Şifre">
        <button class="btn btn-sub" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="dieticianView" style="display:none;">
        <h2 style="color:var(--primary); text-align:center;">Diyetisyen Portalı</h2>
        <div id="dMail" class="user-tag" style="text-align:center;"></div>
        <div style="margin-top:15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;">
            <input type="text" id="myDietCodeInput" maxlength="8" placeholder="Örn: DIET9900" style="background:#000;">
            <button class="btn btn-main" onclick="saveDieticianCode()">KODU KAYDET</button>
            <div id="currentCodeDisplay" style="margin-top:10px; text-align:center; font-weight:bold; color:var(--premium);"></div>
        </div>
        <h3 style="margin-top:20px; border-bottom:1px solid #2d3748; padding-bottom:5px;">Bağlı Hastalarım</h3>
        <div id="patientList"></div>
        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>

    <div id="mainView" style="display:none;">
        <div style="text-align: center; margin-bottom: 10px;">
            <div id="clock" style="font-size: 2rem; font-weight: 800; color: var(--accent);">00:00:00</div>
            <div id="uMail" class="user-tag"></div> 
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ" onchange="saveUserData()">
            <input type="number" id="uWeight" placeholder="KİLO" onchange="saveUserData()">
        </div>
        <select id="uGoal" onchange="saveUserData()">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>
        
        <div class="cam-box"><video id="video" autoplay playsinline></video><div id="freezeLayer" class="freeze-overlay">🔍 İNCELENİYOR...</div></div>

        <button class="btn btn-main" id="btnAna" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        <button class="btn btn-sub" id="btnRetry" style="display:none;" onclick="resetCamera()">🔄 YENİDEN ANALİZ</button>

        <div id="dailyDashboard" class="dashboard" style="display:none;">
            <div class="dash-item"><div id="dashScore" class="dash-val">0</div><div id="txtDashS" class="dash-lab">Günlük Skor</div></div>
            <div class="dash-item"><div id="dashCount" class="dash-val">0</div><div id="txtDashC" class="dash-lab">Öğün Sayısı</div></div>
        </div>

        <div id="results"></div>

        <button class="btn btn-outline" onclick="toggleHistory()" id="btnHist">📚 GEÇMİŞ ANALİZLERİM</button>
        <div id="historyPanel" style="display:none; margin-top:10px;"><div id="historyList"></div></div>

        <button class="btn btn-outline" style="border-color: var(--neutral); color: var(--text); background: var(--neutral);" onclick="togglePartner()" id="btnDost">👫 DİYET DOSTU</button>
        <div id="partnerPanel" class="partner-box" style="display:none;">
            <input type="text" id="partnerUser" placeholder="Kullanıcı Adı">
            <div class="side-by-side">
                <button class="btn btn-main" onclick="sendFriendRequest()">EKLE</button>
                <button class="btn btn-sub" style="background:var(--primary); margin-top:0;" onclick="checkPartner()">SORGULA</button>
            </div>
            <div id="partnerResult" style="margin-top:15px;"></div>
        </div>

        <div class="split-btns">
            <button class="btn btn-neutral" onclick="document.getElementById('sportQuestionsModal').style.display='block'">🏃‍♂️ SPOR</button>
            <button class="btn btn-neutral" onclick="document.getElementById('laraModal').style.display='block'">🤖 LARA</button>
        </div>
        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA", authDomain: "voice2post-9e8ca.firebaseapp.com", projectId: "voice2post-9e8ca", storageBucket: "voice2post-9e8ca.firebasestorage.app", messagingSenderId: "511446656614", appId: "1:511446656614:web:32101ee70299543c716fa7" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();

    let currentLang = 'tr'; let userRole = 'user';
    const langData = {
        tr: { headers: ["YEMEK ADI 🍽️","BESİN DEĞERLERİ 📊","NET TAVSİYE 💡","ÜRÜN ÖZETİ 🔍","SKOR 🎯"], notif: "Bildirimler", followers: "Takip Ettiklerin", hist: "GEÇMİŞ ANALİZLERİM", dashS: "Günlük Skor", dashC: "Öğün Sayısı" },
        en: { headers: ["MEAL NAME 🍽️","NUTRITION 📊","ADVICE 💡","SUMMARY 🔍","SCORE 🎯"], notif: "Notifications", followers: "Following", hist: "ANALYSIS HISTORY", dashS: "Daily Score", dashC: "Meal Count" }
    };

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection('partner_data').doc(user.displayName.toLowerCase()).get().then(doc => {
                const data = doc.data() || {};
                if(data.role === 'dietician') {
                    toggleView('dieticianView'); document.getElementById('dMail').innerText = "@" + user.displayName; handleDieticianPortal(user.displayName.toLowerCase());
                } else {
                    toggleView('mainView'); document.getElementById('uMail').innerText = "@" + user.displayName;
                    setupUser(user); startCamera(); listenNotifications(); listenFriends(); showStreak(); checkDieticianLink(); updateDashboard();
                }
            });
        } else { toggleView('loginView'); }
    });

    function startCamera() {
        const vid = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => { vid.srcObject = s; vid.play(); })
            .catch(e => { alert("Kamera erişimi reddedildi."); });
    }

    async function runAI(mode) {
        const resDiv = document.getElementById('results'); const vid = document.getElementById('video');
        vid.pause(); document.getElementById('freezeLayer').style.display = 'flex'; document.getElementById('btnAna').style.display = 'none';
        const canv = document.createElement('canvas'); canv.width = 640; canv.height = 480;
        canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
        let img = canv.toDataURL('image/jpeg', 0.7);

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Hedef:${document.getElementById('uGoal').value}`, lang: currentLang })
            });
            const d = await r.json();
            resDiv.innerHTML = ''; resDiv.style.display = 'flex';
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 2);
            const headers = langData[currentLang].headers;
            let finalScore = 5; let mealName = "Yemek";

            sections.forEach((txt, i) => {
                const card = document.createElement('div'); card.className = 'report-card';
                let content = txt.trim(); if (i === 0) mealName = content.substring(0,30);
                if (content.includes('[SKOR:')) {
                    const match = content.match(/\[SKOR:\s*(\d+)\]/);
                    if(match) {
                        finalScore = parseInt(match[1]); let left = (finalScore/10)*100;
                        card.innerHTML = `<div class="report-tag">${headers[i]}</div><div class="report-txt">${content.replace(match[0], '')}</div>
                        <div class="score-container"><div class="score-bar-bg"><div class="score-pointer" style="left:${left}%"></div></div><div style="text-align:center; margin-top:5px; font-weight:900; color:var(--primary);">${finalScore}/10</div></div>`;
                    }
                } else { card.innerHTML = `<div class="report-tag">${headers[i] || 'DETAY'}</div><div class="report-txt">${content}</div>`; }
                resDiv.appendChild(card);
            });
            document.getElementById('btnRetry').style.display = 'block'; document.getElementById('freezeLayer').style.display = 'none';
            saveHistory(finalScore, d.analysis, mealName); updateDashboard(); resDiv.scrollIntoView({ behavior: 'smooth' });
        } catch(e) { resetCamera(); }
    }

    function saveHistory(s, r, m) {
        const me = auth.currentUser.displayName.toLowerCase(); const dateStr = new Date().toLocaleString(); const unix = Date.now();
        db.collection('partner_data').doc(me).set({ score: s, lastMealName: m }, { merge: true });
        db.collection('partner_data').doc(me).collection('history').add({ score: s, fullText: r, date: dateStr, unix: unix, mealName: m });
        let arr = JSON.parse(localStorage.getItem('history_' + auth.currentUser.uid) || '[]');
        arr.unshift({ summary: s, date: dateStr, detail: r, meal: m, unix: unix });
        localStorage.setItem('history_' + auth.currentUser.uid, JSON.stringify(arr.slice(0, 50)));
    }

    function toggleHistory() {
        const p = document.getElementById('historyPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(p.style.display === 'block') {
            let arr = JSON.parse(localStorage.getItem('history_' + auth.currentUser.uid) || '[]');
            const now = Date.now(); const last24 = arr.filter(h => (now - h.unix) < 86400000);
            document.getElementById('historyList').innerHTML = last24.map(h => `
                <div class="history-box" onclick="openDetail(\`${h.detail.replace(/`/g, "'")}\`)">
                    <div class="history-meta">🕒 ${h.date} | ⭐ Puan: ${h.summary}/10</div>
                    <div class="history-meal">🍽️ ${h.meal}</div>
                </div>`).join('');
        }
    }

    function checkPartner() {
        const u = document.getElementById('partnerUser').value.trim().toLowerCase();
        db.collection('partner_data').doc(u).collection('history').orderBy('unix', 'desc').limit(1).get().then(snap => {
            const res = document.getElementById('partnerResult');
            if(!snap.empty) {
                const d = snap.docs[0].data();
                res.innerHTML = `<div class="history-box" style="margin-top:0;" onclick="openDetail(\`${d.fullText.replace(/`/g, "'")}\`)">
                    <div class="history-meta">🕒 ${d.date} | ⭐ Puan: ${d.score}/10</div>
                    <div class="history-meal">🍽️ ${d.mealName}</div></div>`;
            } else { res.innerText = "Veri bulunamadı."; }
        });
    }

    function showPatientHistory(p) {
        db.collection('partner_data').doc(p).collection('history').orderBy('unix', 'desc').limit(10).get().then(snap => {
            let html = `<div style="text-align:center; border-bottom:1px solid var(--primary); margin-bottom:10px;"><h3>@${p} Analizleri</h3></div>`;
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="history-box" onclick="openDetail(\`${d.fullText.replace(/`/g, "'")}\`)">🕒 ${d.date}<br>🍽️ ${d.mealName} (Skor: ${d.score})</div>`;
            });
            document.getElementById('modalBody').innerHTML = html; document.getElementById('detailModal').style.display = 'block';
        });
    }

    function setupUser(user) {
        const saved = JSON.parse(localStorage.getItem('userData_' + user.uid) || '{}');
        if(saved.age) document.getElementById('uAge').value = saved.age;
        if(saved.weight) document.getElementById('uWeight').value = saved.weight;
        if(saved.goal) document.getElementById('uGoal').value = saved.goal;
        document.getElementById('bellIcon').style.display = 'flex'; document.getElementById('friendListBtn').style.display = 'flex';
    }

    function saveUserData() { 
        if(!auth.currentUser) return;
        const d = { age: document.getElementById('uAge').value, weight: document.getElementById('uWeight').value, goal: document.getElementById('uGoal').value };
        localStorage.setItem('userData_'+auth.currentUser.uid, JSON.stringify(d));
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).set(d, {merge:true});
    }

    function listenNotifications() {
        db.collection('notifications').where('toUser', '==', auth.currentUser.displayName.toLowerCase()).onSnapshot(snap => {
            const list = document.getElementById('notifList'); document.getElementById('notifBadge').innerText = snap.size;
            document.getElementById('notifBadge').style.display = snap.size > 0 ? 'flex' : 'none'; list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="notif-item"><span>${d.message}</span><button class="notif-btn-del" onclick="deleteNotif('${doc.id}')">SİL</button></div>`;
            });
        });
    }

    function listenFriends() {
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).onSnapshot(doc => {
            if(doc.exists && doc.data().friends) {
                document.getElementById('friendsListContainer').innerHTML = doc.data().friends.map(f => `<div class="friend-pill" onclick="checkSpecific('${f}')">@${f}</div>`).join('');
            }
        });
    }

    function checkSpecific(u) { document.getElementById('partnerUser').value = u; checkPartner(); toggleFriends(); document.getElementById('partnerPanel').style.display = 'block'; document.getElementById('partnerPanel').scrollIntoView({ behavior: 'smooth' }); }
    function deleteNotif(id) { db.collection('notifications').doc(id).delete(); }
    function openDetail(txt) { document.getElementById('modalBody').innerHTML = `<div style="white-space:pre-line;">${txt}</div>`; document.getElementById('detailModal').style.display = 'block'; }
    function resetCamera() { document.getElementById('video').play(); document.getElementById('freezeLayer').style.display = 'none'; document.getElementById('results').style.display = 'none'; document.getElementById('btnAna').style.display = 'block'; document.getElementById('btnRetry').style.display = 'none'; }
    function toggleView(id) { document.querySelectorAll('.auth-container, #mainView, #dieticianView').forEach(v => v.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    async function doLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert("Hata"); } }
    async function doRegister() { const u = document.getElementById('rUser').value.trim(); const cred = await auth.createUserWithEmailAndPassword(document.getElementById('rEmail').value, document.getElementById('rPass').value); await cred.user.updateProfile({ displayName: u }); await db.collection('partner_data').doc(u.toLowerCase()).set({ username: u.toLowerCase(), role: userRole }, { merge: true }); location.reload(); }
    function toggleNotifications() { const d = document.getElementById('notifDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function toggleFriends() { const d = document.getElementById('friendsDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function togglePartner() { const p = document.getElementById('partnerPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    async function saveDieticianCode() { const u = auth.currentUser.displayName.toLowerCase(); const c = document.getElementById('myDietCodeInput').value.trim().toUpperCase(); await db.collection('dieticians').doc(u).set({ code: c }, { merge: true }); alert("Kaydedildi."); }
    function setRole(r, b) { userRole = r; document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); }
    async function connectToDietician() { const c = document.getElementById('dietCodeInput').value.trim().toUpperCase(); const me = auth.currentUser.displayName.toLowerCase(); const q = await db.collection('dieticians').where('code', '==', c).get(); if(q.empty) return alert("Hatalı."); const dID = q.docs[0].id; await db.collection('dieticians').doc(dID).update({ patients: firebase.firestore.FieldValue.arrayUnion(me) }); await db.collection('partner_data').doc(me).update({ linkedDietician: dID }); alert("Bağlandınız."); checkDieticianLink(); }
    function checkDieticianLink() { db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).get().then(doc => { if(doc.exists && doc.data().linkedDietician) { document.getElementById('dietStatus').innerText = "Bağlı: @" + doc.data().linkedDietician; document.getElementById('dietConnect').style.display = 'none'; } }); }
    function updateDashboard() { let arr = JSON.parse(localStorage.getItem('history_' + auth.currentUser.uid) || '[]'); const today = new Date().toLocaleDateString(); const todaysMeals = arr.filter(h => new Date(h.unix).toLocaleDateString() === today); if(todaysMeals.length > 0) { let avg = todaysMeals.reduce((acc, curr) => acc + curr.summary, 0) / todaysMeals.length; document.getElementById('dailyDashboard').style.display = 'flex'; document.getElementById('dashScore').innerText = avg.toFixed(1); document.getElementById('dashCount').innerText = todaysMeals.length; } }
    function changeLang(l) { currentLang = l; }
    setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
