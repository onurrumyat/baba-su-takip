<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Komuta Merkezi | Dev Masa</title>
    <style>
        :root {
            --bg-main: #05070a;
            --bg-panel: rgba(13, 17, 23, 0.85);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-light: #e6edf3;
            --text-muted: #7d8590;
            --c-openai: #10a37f;
            --c-gemini: #c255ff;
            --c-claude: #d97757;
            --c-user: #00f2ff;
            --table-surface: linear-gradient(135deg, #11141c 0%, #090b0f 100%);
            --table-rim: #1f2430;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100dvh; /* Ekrana kesin sığma garantisi */
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* --- ÜST PANEL --- */
        .header-panel {
            background: var(--bg-panel); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-glass); padding: 10px 15px;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; z-index: 10;
        }
        .info-card { flex: 1; min-width: 150px; }
        .info-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .info-value { font-size: 12px; font-weight: 600; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .vote-highlight { color: #fbbf24; font-size: 13px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); font-weight: 700;}

        .vote-actions { display: flex; gap: 6px; }
        .btn {
            padding: 6px 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 10px;
            cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-yes { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.5); }
        .btn-yes:hover:not(:disabled) { background: #22c55e; color: white; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .btn-no { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.5); }
        .btn-no:hover:not(:disabled) { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- ORTA ALAN: DEV MASA EKRANI KAPLIYOR --- */
        .stage {
            flex: 1; min-height: 0; 
            display: flex; justify-content: center; align-items: center; position: relative;
            perspective: 1200px;
            /* Avatarların kenarlardan kesilmemesi için gereken MİNİMUM boşluk */
            padding: 45px 50px; 
        }
        
        .system-status {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: var(--c-user); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.7); width: 100%; text-align: center; font-weight: 700;
        }

        .table-wrapper {
            position: relative; 
            width: 100%; /* Masa genişliği köklendi */
            max-width: 850px; /* Çok daha büyük bir tavan sınır */
            aspect-ratio: 2 / 1; /* Yatayda geniş dev masa */
            transform: rotateX(15deg); 
            transform-style: preserve-3d;
            max-height: 55vh; /* Dikeyde panelleri ezmemesi için sınır */
        }
        
        .board-table {
            width: 100%; height: 100%; background: var(--table-surface); border: 5px solid var(--table-rim);
            border-radius: 500px; box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .holo-center {
            width: 65%; height: 55%; background: rgba(0, 242, 255, 0.03); border-radius: 500px;
            border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.08); position: relative;
        }

        /* --- AVATARLAR --- */
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 6px; transform: translate(-50%, -50%); z-index: 5; }
        .node-icon {
            width: 42px; height: 42px; border-radius: 10px; background: #0a0e14; display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: 800; border: 2px solid; box-shadow: 0 8px 15px rgba(0,0,0,0.8); transition: all 0.3s ease;
        }
        .node-name { font-size: 9px; font-weight: 800; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 6px;}

        .n-openai .node-icon { border-color: var(--c-openai); color: var(--c-openai); }
        .n-gemini .node-icon { border-color: var(--c-gemini); color: var(--c-gemini); }
        .n-claude .node-icon { border-color: var(--c-claude); color: var(--c-claude); }
        .n-user .node-icon { border-color: var(--c-user); color: var(--c-user); }

        .n-openai { top: 0; left: 50%; } 
        .n-user { top: 100%; left: 50%; } 
        .n-gemini { top: 50%; left: 0; } 
        .n-claude { top: 50%; left: 100%; } 

        .thinking .node-icon { animation: glow 1.2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px currentColor; } to { box-shadow: 0 0 20px currentColor, inset 0 0 10px currentColor; } }

        /* --- DOSYALAR --- */
        .doc {
            position: absolute; width: 28px; height: 38px; background: rgba(255,255,255,0.95); border-radius: 3px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0; transform: scale(0); transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 5px 12px rgba(0,0,0,0.6); font-size: 14px;
        }
        .doc:hover { transform: scale(1.3) translateY(-5px) !important; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.7);}
        .doc.visible { opacity: 1; transform: scale(1); }

        .d-openai { top: 18%; left: 50%; transform: translateX(-50%); }
        .d-gemini { top: 50%; left: 18%; transform: translateY(-50%); }
        .d-claude { top: 50%; right: 18%; transform: translateY(-50%); }

        .master-doc {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 50px; height: 65px; background: linear-gradient(135deg, #fbbf24, #d97706);
            border-radius: 4px 8px 8px 4px; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; opacity: 0; transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.4); border-left: 5px solid #b45309; z-index: 2;
        }
        .master-doc:hover { transform: translate(-50%, -50%) scale(1.15) !important; box-shadow: 0 0 35px rgba(251, 191, 36, 0.7);}
        .master-doc.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* --- KULLANICI GİRİŞ ALANI --- */
        .input-area {
            background: var(--bg-panel); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid var(--border-glass); 
            padding: 12px 20px; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; gap: 10px;
        }
        .chat-input {
            flex: 1; background: #010409; border: 1px solid var(--border-glass); color: white; padding: 12px 18px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--c-user); box-shadow: 0 0 12px rgba(0, 242, 255, 0.2); }
        .send-btn {
            background: var(--c-user); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
        }
        .send-btn:hover { background: #00c4cc; transform: scale(1.02); }

        /* --- OKUMA PENCERESİ (MODAL) --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.3s; padding: 20px;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: #0d1117; width: 100%; max-width: 450px; border-radius: 12px; border: 1px solid var(--border-glass); padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,1); position: relative; max-height: 80dvh; overflow-y: auto;}
        .close-btn { position: absolute; top: 8px; right: 12px; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        .close-btn:hover { color: white; }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-glass); text-transform: uppercase; letter-spacing: 1px;}
        .modal-body { font-size: 14px; line-height: 1.6; color: #c9d1d9; white-space: pre-line; }

        /* --- MOBİL İÇİN KÖKLENMİŞ GENİŞLİK --- */
        @media (max-width: 768px) {
            .header-panel { padding: 8px 12px; gap: 6px; }
            .info-card { min-width: 100%; }
            .vote-actions { width: 100%; justify-content: space-between; gap: 5px;} .btn { flex: 1; text-align: center;}
            
            .stage { padding: 30px; } /* Avatarlar için güvenli boşluk */
            
            .table-wrapper { 
                width: 90%; /* Mobilde ekranı iyice kaplar */
                max-width: 400px;
                aspect-ratio: 1 / 1.3; 
                transform: rotateX(8deg); 
            } 
            
            .node-icon { width: 34px; height: 34px; font-size: 14px; border-width: 2px;}
            .node-name { font-size: 8px; padding: 2px 5px;}
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="info-card">
            <div class="info-label">Gündem Özeti</div>
            <div class="info-value" id="ui-topic">Bekleniyor...</div>
        </div>
        <div class="info-card">
            <div class="info-label" style="color: #fbbf24;">Oylamaya Sunulan Karar</div>
            <div class="vote-highlight" id="ui-vote-title">Modellerin analizi bekleniyor...</div>
        </div>
        <div class="vote-actions">
            <button class="btn btn-yes" id="btn-y" disabled onclick="userVote(true)">Evet (Onayla)</button>
            <button class="btn btn-no" id="btn-n" disabled onclick="userVote(false)">Hayır (Reddet)</button>
        </div>
    </div>

    <div class="stage">
        <div class="system-status" id="ui-status">Sistem Hazır. Gündemi Belirleyin.</div>
        <div class="table-wrapper">
            <div class="board-table">
                <div class="holo-center">
                    <div class="doc d-openai" id="doc-openai" onclick="openDoc('OpenAI')">📄</div>
                    <div class="doc d-gemini" id="doc-gemini" onclick="openDoc('Gemini')">📄</div>
                    <div class="doc d-claude" id="doc-claude" onclick="openDoc('Claude')">📄</div>
                    <div class="master-doc" id="doc-master" onclick="openDoc('Ortak Karar')">📁</div>
                </div>
                <div class="node n-openai" id="ai-openai"><div class="node-icon">O</div><div class="node-name">OpenAI</div></div>
                <div class="node n-gemini" id="ai-gemini"><div class="node-icon">G</div><div class="node-name">Gemini</div></div>
                <div class="node n-claude" id="ai-claude"><div class="node-icon">C</div><div class="node-name">Claude</div></div>
                <div class="node n-user" id="ai-user"><div class="node-icon">👤</div><div class="node-name">Sen</div></div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" class="chat-input" id="topic-input" placeholder="Gündem maddesini masaya yatır..." onkeypress="if(event.key==='Enter') startProcess()">
        <button class="send-btn" onclick="startProcess()">Masaya İlet</button>
    </div>

    <div class="modal" id="doc-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modal-title">Başlık</div>
            <div class="modal-body" id="modal-text">İçerik...</div>
        </div>
    </div>

    <script>
        const database = { 'OpenAI': '', 'Gemini': '', 'Claude': '', 'Ortak Karar': '' };
        const aiNodes = ['openai', 'gemini', 'claude'];

        async function startProcess() {
            const fullText = document.getElementById('topic-input').value;
            if (!fullText.trim() || fullText.trim().length < 3) return;

            const words = fullText.split(' ');
            const summary = words.length > 3 ? words.slice(0, 3).join(' ') + "..." : fullText;
            document.getElementById('ui-topic').innerText = `"${summary}"`;
            document.getElementById('ui-vote-title').innerText = "Vercel API'den analiz bekleniyor...";
            document.getElementById('ui-vote-title').style.color = "var(--text-muted)";
            document.getElementById('topic-input').value = '';
            document.querySelectorAll('.doc, .master-doc').forEach(el => el.classList.remove('visible'));
            document.getElementById('btn-y').disabled = true;
            document.getElementById('btn-n').disabled = true;

            aiNodes.forEach(id => document.getElementById('ai-' + id).classList.add('thinking'));
            document.getElementById('ui-status').innerText = "Modeller analiz yapıyor...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: fullText })
                });

                if (!response.ok) throw new Error("API hatası.");
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                database['OpenAI'] = data.openai;
                database['Gemini'] = data.gemini;
                database['Claude'] = data.claude;
                database['Ortak Karar'] = data.masterDecision;

                aiNodes.forEach(id => document.getElementById('ai-' + id).classList.remove('thinking'));
                ['doc-openai', 'doc-gemini', 'doc-claude'].forEach(id => document.getElementById(id).classList.add('visible'));
                document.getElementById('ui-status').innerText = "Raporlar ulaştı. Sentezleniyor...";
                
                setTimeout(() => {
                    document.getElementById('doc-master').classList.add('visible');
                    document.getElementById('ui-status').innerText = "Akıllı sentez hazır. Protokolü oylayın.";
                    
                    document.getElementById('ui-vote-title').innerText = data.masterTitle;
                    document.getElementById('ui-vote-title').style.color = "#fbbf24";
                    
                    document.getElementById('btn-y').disabled = false;
                    document.getElementById('btn-n').disabled = false;
                }, 1500);

            } catch (error) {
                console.error(error);
                document.getElementById('ui-status').innerText = `HATA: Bağlantı sorunu.`;
                document.getElementById('ui-vote-title').innerText = "Analiz başarısız.";
                aiNodes.forEach(id => document.getElementById('ai-' + id).classList.remove('thinking'));
            }
        }

        function openDoc(owner) {
            let color = "#fff";
            if(owner === 'OpenAI') color = "var(--c-openai)";
            else if(owner === 'Gemini') color = "var(--c-gemini)";
            else if(owner === 'Claude') color = "var(--c-claude)";
            else color = "#fbbf24";

            document.getElementById('modal-title').style.color = color;
            document.getElementById('modal-title').innerText = owner + " Raporu";
            document.getElementById('modal-text').innerText = database[owner];
            document.getElementById('doc-modal').classList.add('show');
        }

        function closeModal() { document.getElementById('doc-modal').classList.remove('show'); }

        function userVote(isYes) {
            if(isYes) {
                alert("EVET oyu verdiniz. Protokol onaylandı.");
                document.getElementById('ui-status').innerText = "PROTOKOL ONAYLANDI.";
            } else {
                alert("HAYIR oyu verdiniz. Protokol reddedildi.");
                document.getElementById('ui-status').innerText = "PROTOKOL REDDEDİLDİ. Yeni yönerge bekleniyor.";
                document.getElementById('ui-vote-title').innerText = "Alternatif çözüm bekleniyor...";
                document.getElementById('ui-vote-title').style.color = "var(--text-muted)";
            }
            document.getElementById('doc-master').classList.remove('visible');
            document.getElementById('btn-y').disabled = true;
            document.getElementById('btn-n').disabled = true;
        }
    </script>
</body>
</html>
