<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Analiz</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdOeigm877SXMe7mMtuEMPUeGkY9WcgyIJPbzGJU2HP1CS_eaGcn4O0FnUEoB3JFmDXEHSnxx5Do-pIN&currency=USD&components=buttons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; --danger: #ef4444; --dietitian: #8b5cf6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; position: relative; }
        .auth-container h1 { font-size: 2.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 900; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; color: white; transition: 0.3s; }
        .btn-main { background: var(--primary); }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-dietitian { background: var(--dietitian); margin-top: 10px; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #2d3748; margin-top: 10px; font-size: 0.8rem; }
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 2px solid #1e293b; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .premium-area { background: rgba(245, 158, 11, 0.08); border: 2px solid var(--premium); border-radius: 25px; padding: 20px; margin-top: 20px; text-align: center; }
        .premium-title { font-weight: 900; color: var(--premium); font-size: 1.1rem; margin-bottom: 15px; }
        #results { display: none; flex-direction: column; gap: 12px; margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 20px; }
        .report-card { background: #1a202c; border-radius: 15px; padding: 18px; border-top: 4px solid var(--accent); }
        .report-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .report-txt { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; white-space: pre-line; }
        .history-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid var(--primary); cursor: pointer; transition: 0.2s; }
        .history-box:hover { background: rgba(255,255,255,0.1); }
        .score-wrapper { margin-top: 20px; margin-bottom: 10px; width: 100%; position: relative; padding-bottom: 20px; }
        .score-bar { height: 14px; width: 100%; border-radius: 7px; background: linear-gradient(to right, #ef4444 0%, #f97316 35%, #eab308 65%, #22c55e 100%); position: relative; }
        .score-marker { position: absolute; top: -10px; width: 30px; height: 30px; background: #fff; border: 3px solid #1e293b; border-radius: 50%; transform: translateX(-50%); transition: left 1s ease-out; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: #000; z-index: 2; }
        .streak-badge { display:none; background:rgba(249, 115, 22, 0.15); color:#f97316; padding:8px 15px; border-radius:20px; font-weight:900; font-size:0.9rem; border:1px solid #f97316; }
        .partner-box { background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        .bell-container, .friends-btn { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; position: relative; margin-left: 10px; }
        .notif-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notif-dropdown, .friends-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 280px; background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 10px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-height: 400px; overflow-y: auto; }
        .role-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .role-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #2d3748; background: #0b0f1a; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .role-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(16, 185, 129, 0.1); }
        .detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); border-radius: 25px; padding: 25px; max-width: 400px; margin: auto; }
    </style>
</head>
<body>

<div id="detailModal" class="detail-modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--primary); margin-bottom:15px;">Analiz Detayı</h2>
        <div id="modalBody" class="report-txt"></div>
        <button class="btn btn-main" style="margin-top:20px;" onclick="closeModal()">Kapat</button>
    </div>
</div>

<div class="app-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <div style="display: flex; align-items: center;">
            <span onclick="changeLang('tr')" style="font-size: 1.8rem; cursor: pointer; margin-right: 15px;">🇹🇷</span>
            <span onclick="changeLang('en')" style="font-size: 1.8rem; cursor: pointer;">🇺🇸</span>
        </div>
        <div id="streakBadge" class="streak-badge">🔥 <span id="streakCount">0</span> <span id="txtStreak">Seri</span></div>
        <div style="display: flex;">
            <div class="bell-container" onclick="toggleDropdown('notifDropdown')" id="bellIcon" style="display:none;">
                <span class="bell-icon">🔔</span><span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Bildirimler</h4>
                    <div id="notifList"></div>
                </div>
            </div>
            <div class="friends-btn" id="friendListBtn" onclick="toggleDropdown('friendsDropdown')" style="display:none;">
                👤
                <div class="friends-dropdown" id="friendsDropdown">
                    <h4 style="color:white; margin-bottom:10px; text-align:center;">Takip Ettiklerin</h4>
                    <div id="friendsListContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginView" class="auth-container">
        <h1>BIO-CHEF</h1>
        <div class="role-selector">
            <button class="role-btn active" id="btnRoleUserL" onclick="setRole('user')">Danışan</button>
            <button class="role-btn" id="btnRoleDietL" onclick="setRole('dietitian')">Diyetisyen</button>
        </div>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" onclick="doReset()">Şifremi Unuttum?</button>
        <button class="btn btn-outline" onclick="toggleView('regView')">Kayıt Ol</button>
    </div>

    <div id="regView" class="auth-container" style="display:none;">
        <h1>KAYIT OL</h1>
        <div class="role-selector">
            <button class="role-btn active" id="btnRoleUserR" onclick="setRole('user')">Danışan</button>
            <button class="role-btn" id="btnRoleDietR" onclick="setRole('dietitian')">Diyetisyen</button>
        </div>
        <input type="email" id="rEmail" placeholder="E-posta">
        <input type="text" id="rUser" placeholder="Kullanıcı Adı">
        <input type="password" id="rPass" placeholder="Şifre">
        <button class="btn btn-sub" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="mainView" style="display:none;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="clock" style="font-size: 2.2rem; font-weight: 800; color: var(--accent);">00:00:00</div>
            <div id="uMail" class="user-tag"></div>
            <div id="dietStatus" style="font-size:0.7rem; color:#94a3b8;"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ" onchange="saveBio()">
            <input type="number" id="uWeight" placeholder="KİLO" onchange="saveBio()">
        </div>
        <select id="uGoal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>
        <div class="cam-box"><video id="video" autoplay playsinline></video></div>
        <button class="btn btn-main" id="btnAnalyzeText" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        
        <div id="results"></div>
        <button class="btn btn-sub" id="btnRetry" style="display:none;" onclick="resetAnalysis()">🔄 YENİDEN ANALİZ ET</button>
        <button class="btn btn-main" id="btnPdf" style="display:none; background: var(--danger); margin-top:10px;" onclick="downloadPDF()">📄 PDF KAYDET</button>

        <button class="btn btn-outline" onclick="toggleHistory()" style="margin-top:25px;">📚 GEÇMİŞ ANALİZLERİM</button>
        <div id="historyPanel" style="display:none; margin-top:15px; border-radius:15px; border: 1px solid #2d3748; padding:15px;">
            <div id="historyList"></div>
        </div>

        <button class="btn btn-outline" id="btnPartnerSection" style="border-color: var(--danger); color: var(--danger);" onclick="togglePartner()">👫 PARTNER DENETLE</button>
        <div id="partnerPanel" class="partner-box" style="display:none;">
            <input type="text" id="partnerUser" placeholder="Kullanıcı Adı">
            <button class="btn btn-sub" style="margin-bottom:5px;" onclick="sendFriendRequest()">➕ TAKİP İSTEĞİ</button>
            <button class="btn btn-sub" style="background: var(--danger);" onclick="checkPartner()">🔍 DURUMU SORGULA</button>
            <div id="partnerResult" style="margin-top:15px;"></div>
        </div>

        <button class="btn btn-dietitian" onclick="toggleDietConnect()">🩺 DİYETİSYENE BAĞLAN</button>
        <div id="dietConnectPanel" style="display:none; margin-top:10px; border: 1px dashed var(--dietitian); padding:10px; border-radius:15px;">
            <input type="text" id="dietSearch" placeholder="Diyetisyen Adı">
            <button class="btn btn-dietitian" onclick="connectToDiet()">İSTEK GÖNDER</button>
        </div>

        <div class="premium-area">
            <button class="btn btn-sub" style="background: var(--premium); color: black;" onclick="handlePlanClick()">📅 HAFTALIK PLAN AL</button>
            <div id="paypal-button-container"></div>
        </div>
        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>

    <div id="dietitianView" style="display:none;">
        <h2 style="color:var(--dietitian); text-align:center;">DİYETİSYEN PORTALI</h2>
        <div id="clientList" style="margin-top:20px;"></div>
        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();" style="margin-top:20px;">ÇIKIŞ</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA", authDomain: "voice2post-9e8ca.firebaseapp.com", projectId: "voice2post-9e8ca", storageBucket: "voice2post-9e8ca.firebasestorage.app", messagingSenderId: "511446656614", appId: "1:511446656614:web:32101ee70299543c716fa7" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();
    let currentRole = 'user'; let isVip = false;

    function setRole(r) {
        currentRole = r;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        if(r === 'user') { document.getElementById('btnRoleUserL').classList.add('active'); document.getElementById('btnRoleUserR').classList.add('active'); }
        else { document.getElementById('btnRoleDietL').classList.add('active'); document.getElementById('btnRoleDietR').classList.add('active'); }
    }

    function toggleView(id) { 
        document.getElementById('loginView').style.display = 'none'; document.getElementById('regView').style.display = 'none'; 
        document.getElementById('mainView').style.display = 'none'; document.getElementById('dietitianView').style.display = 'none';
        document.getElementById(id).style.display = 'block'; 
    }

    auth.onAuthStateChanged(async user => {
        if(user) {
            const doc = await db.collection('partner_data').doc(user.displayName.toLowerCase()).get();
            const data = doc.data();
            if(data && data.role === 'dietitian') {
                toggleView('dietitianView'); listenClients(user.displayName.toLowerCase());
            } else {
                toggleView('mainView');
                document.getElementById('uMail').innerText = "@" + user.displayName;
                document.getElementById('uAge').value = data?.age || "";
                document.getElementById('uWeight').value = data?.weight || "";
                if(data?.myDietitian) document.getElementById('dietStatus').innerText = "🩺 Diyetisyen: @" + data.myDietitian;
                isVip = localStorage.getItem('vip_'+user.uid) === 'true';
                if(!isVip) initPayPal();
                document.getElementById('bellIcon').style.display = 'flex';
                document.getElementById('friendListBtn').style.display = 'flex';
                listenNotifications(); listenFriends(); showStreak();
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
            }
        } else { toggleView('loginView'); }
    });

    async function doRegister() {
        const u = document.getElementById('rUser').value.trim(); const e = document.getElementById('rEmail').value; const p = document.getElementById('rPass').value;
        if(!u || !e || !p) return alert("Eksik.");
        try {
            const check = await db.collection('partner_data').doc(u.toLowerCase()).get();
            if(check.exists) return alert("Bu kullanıcı adı alınmış!");
            const cred = await auth.createUserWithEmailAndPassword(e, p);
            await cred.user.updateProfile({ displayName: u });
            await db.collection('partner_data').doc(u.toLowerCase()).set({ username: u.toLowerCase(), role: currentRole, friends: [], history: [] });
            location.reload();
        } catch(err) { alert(err.message); }
    }

    async function doLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert(e.message); } }

    function saveBio() {
        const age = document.getElementById('uAge').value; const weight = document.getElementById('uWeight').value;
        if(auth.currentUser) db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).update({ age, weight });
    }

    async function runAI(mode) {
        const resDiv = document.getElementById('results');
        const age = document.getElementById('uAge').value; const weight = document.getElementById('uWeight').value;
        if(!age || !weight) return alert("Yaş ve Kilo girin!");
        
        resDiv.innerHTML = `<p style="text-align:center;">🔍 Analiz Ediliyor...</p>`;
        resDiv.style.display = 'flex';
        
        let img = "";
        const vid = document.getElementById('video');
        const canv = document.createElement('canvas'); canv.width = 640; canv.height = 480;
        canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
        img = canv.toDataURL('image/jpeg', 0.7);

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}`, lang: 'tr' })
            });
            const d = await r.json(); resDiv.innerHTML = '';
            
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
            let score = 0; let product = "Bilinmeyen Yemek";

            sections.forEach((txt, i) => {
                const card = document.createElement('div'); card.className = 'report-card';
                let content = txt.trim();
                
                if(mode === 'yemek' && i === 0) {
                    const match = content.match(/\[SKOR:\s*(\d+)\]/i);
                    if(match) { 
                        score = parseInt(match[1]); content = content.replace(match[0], '').trim(); 
                        card.innerHTML = `<div class="report-tag">HEDEF SKORU 🎯</div><div class="report-txt">${content}</div>
                        <div class="score-wrapper"><div class="score-bar"><div class="score-marker" style="left:${(score/10)*100}%">${score}</div></div></div>`;
                    }
                } else {
                    if(i === 2) product = content.substring(0, 30);
                    card.innerHTML = `<div class="report-tag">DETAY</div><div class="report-txt">${content}</div>`;
                }
                resDiv.appendChild(card);
            });

            document.getElementById('btnRetry').style.display = 'block';
            document.getElementById('btnPdf').style.display = 'block';
            saveHistory(score, product, d.analysis);
            resDiv.scrollIntoView({ behavior: 'smooth' });
        } catch(e) { alert("Hata oluştu."); }
    }

    function saveHistory(score, product, full) {
        const me = auth.currentUser.displayName.toLowerCase();
        const entry = { score, product, full, date: new Date().toLocaleString(), timestamp: Date.now() };
        db.collection('partner_data').doc(me).update({
            lastMeal: product, score: score, time: new Date().toLocaleTimeString(),
            history: firebase.firestore.FieldValue.arrayUnion(entry)
        });
    }

    function toggleHistory() {
        const p = document.getElementById('historyPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(p.style.display === 'block') renderHistory();
    }

    async function renderHistory() {
        const doc = await db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).get();
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const hist = doc.data().history || [];
        hist.reverse().forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-box';
            div.innerHTML = `<b>🍴 ${h.product}</b><br><small>📅 ${h.date} | ⭐ Skor: ${h.score}</small>`;
            div.onclick = () => showDetail(h.full);
            list.appendChild(div);
        });
    }

    function showDetail(txt) {
        document.getElementById('modalBody').innerText = txt;
        document.getElementById('detailModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

    function togglePartner() {
        const p = document.getElementById('partnerPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    async function checkPartner() {
        const u = document.getElementById('partnerUser').value.trim().toLowerCase();
        const res = document.getElementById('partnerResult');
        const doc = await db.collection('partner_data').doc(u).get();
        if(doc.exists) {
            const d = doc.data();
            let html = `<h3>@${u} Geçmişi</h3>`;
            const hist = d.history || [];
            hist.slice(-5).reverse().forEach(h => {
                html += `<div class="history-box" style="cursor:default"><b>${h.product}</b><br><small>${h.date} | Skor: ${h.score}</small></div>`;
            });
            res.innerHTML = html;
        } else { res.innerText = "Kullanıcı bulunamadı."; }
    }

    function resetAnalysis() {
        document.getElementById('results').innerHTML = '';
        document.getElementById('btnRetry').style.display = 'none';
        document.getElementById('btnPdf').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function toggleDropdown(id) {
        const d = document.getElementById(id);
        document.querySelectorAll('.notif-dropdown, .friends-dropdown').forEach(el => { if(el.id !== id) el.style.display = 'none'; });
        d.style.display = d.style.display === 'none' ? 'block' : 'none';
    }

    function listenFriends() {
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).onSnapshot(doc => {
            const container = document.getElementById('friendsListContainer');
            container.innerHTML = '';
            (doc.data()?.friends || []).forEach(f => {
                const dv = document.createElement('div');
                dv.className = 'friend-link';
                dv.innerText = "@" + f;
                dv.style = "padding:10px; cursor:pointer; color:var(--primary); font-weight:bold;";
                dv.onclick = () => {
                    document.getElementById('partnerUser').value = f;
                    document.getElementById('partnerPanel').style.display = 'block';
                    document.getElementById('btnPartnerSection').scrollIntoView({ behavior: 'smooth' });
                    checkPartner();
                    toggleDropdown('friendsDropdown');
                };
                container.appendChild(dv);
            });
        });
    }

    function listenNotifications() {
        db.collection('notifications').where('toUser', '==', auth.currentUser.displayName.toLowerCase()).onSnapshot(snap => {
            const list = document.getElementById('notifList');
            const badge = document.getElementById('notifBadge');
            list.innerHTML = ''; let c = 0;
            snap.forEach(doc => {
                c++; const d = doc.data();
                list.innerHTML += `<div class="notif-item">🤝 @${d.fromUser} isteği.<br><button class="notif-btn" onclick="acceptFriend('${d.fromUser}','${doc.id}')">Kabul Et</button></div>`;
            });
            badge.style.display = c > 0 ? 'flex' : 'none'; badge.innerText = c;
        });
    }

    function acceptFriend(u, id) {
        const me = auth.currentUser.displayName.toLowerCase();
        db.collection('partner_data').doc(me).update({ friends: firebase.firestore.FieldValue.arrayUnion(u) });
        db.collection('partner_data').doc(u).update({ friends: firebase.firestore.FieldValue.arrayUnion(me) });
        db.collection('notifications').doc(id).delete();
    }

    function sendFriendRequest() {
        const u = document.getElementById('partnerUser').value.trim().toLowerCase();
        if(!u) return;
        db.collection('notifications').add({ toUser: u, fromUser: auth.currentUser.displayName.toLowerCase(), type: 'friend_request' });
        alert("İstek gönderildi.");
    }

    function toggleDietConnect() { document.getElementById('dietConnectPanel').style.display = 'block'; }
    function connectToDiet() {
        const d = document.getElementById('dietSearch').value.trim().toLowerCase();
        db.collection('notifications').add({ toUser: d, fromUser: auth.currentUser.displayName.toLowerCase(), type: 'diet_request' });
        alert("Diyetisyene istek gönderildi.");
    }

    function listenClients(dietId) {
        db.collection('partner_data').where('myDietitian', '==', dietId).onSnapshot(snap => {
            const list = document.getElementById('clientList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="report-card" style="margin-bottom:10px;"><b>@${d.username}</b><br>Son: ${d.lastMeal || 'Yok'} | Skor: ${d.score}/10</div>`;
            });
        });
    }

    function initPayPal() {
        if(window.paypal) {
            paypal.Buttons({
                createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: '0.99' } }] }),
                onApprove: (d, a) => a.order.capture().then(() => { localStorage.setItem('vip_' + auth.currentUser.uid, 'true'); location.reload(); })
            }).render('#paypal-button-container');
        }
    }

    function showStreak() {
        let d = JSON.parse(localStorage.getItem('streak_'+auth.currentUser.uid) || '{"count":0}');
        if(d.count > 0) { document.getElementById('streakBadge').style.display = 'block'; document.getElementById('streakCount').innerText = d.count; }
    }

    function updateStreak(s) {
        let d = JSON.parse(localStorage.getItem('streak_'+auth.currentUser.uid) || '{"count":0, "last":""}');
        let t = new Date().toLocaleDateString();
        if(s >= 7) { if(d.last !== t) d.count++; d.last = t; } else { d.count = 0; }
        localStorage.setItem('streak_'+auth.currentUser.uid, JSON.stringify(d));
    }

    function handlePlanClick() { if(!isVip) alert("Premium gereklidir."); else runAI('plan'); }
    function downloadPDF() { html2pdf().from(document.getElementById('results')).save(); }
    function doReset() { auth.sendPasswordResetEmail(document.getElementById('lEmail').value).then(() => alert("Reset linki gönderildi.")); }
    setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
