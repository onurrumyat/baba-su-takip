<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Komşu | AI Teşhis Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-lg mx-auto p-4 flex items-center justify-between">
            <h1 class="text-xl font-bold text-blue-600"><i class="fa-solid fa-house-chimney-wrench mr-2"></i>Akıllı Komşu</h1>
            <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </nav>

    <main class="max-w-lg mx-auto p-6">
        
        <section id="uploadSection" class="space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-extrabold text-slate-800">Sorunu Tespit Edelim</h2>
                <p class="text-slate-500 mt-2 text-sm">Arızalı bölgenin net bir fotoğrafını yükleyin.</p>
            </div>

            <div id="dropZone" class="relative group border-4 border-dashed border-slate-200 rounded-3xl p-10 text-center hover:border-blue-400 transition-all cursor-pointer bg-white shadow-sm" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="previewContainer" class="hidden absolute inset-0 p-2">
                    <img id="imagePreview" src="#" class="w-full h-full object-cover rounded-2xl shadow-lg">
                </div>

                <div id="uploadContent">
                    <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-camera text-3xl text-blue-500"></i>
                    </div>
                    <p class="font-bold text-slate-700">Fotoğraf Seç veya Sürükle</p>
                    <p class="text-xs text-slate-400 mt-1">PNG, JPG (Max 5MB)</p>
                </div>
            </div>

            <button id="analyzeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all disabled:bg-slate-300 disabled:shadow-none hidden">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Analiz Etmeye Başla
            </button>
        </section>

        <section id="loadingState" class="hidden py-20 text-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="text-slate-600 font-medium">Yapay zeka fotoğrafı inceliyor...</p>
            <p class="text-xs text-slate-400 mt-1 italic">Bu işlem 5-10 saniye sürebilir.</p>
        </section>

        <section id="resultSection" class="hidden space-y-4 animate-in fade-in duration-500">
            <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-green-100 rounded-lg text-green-600 font-bold text-sm">AI ANALİZİ</div>
                    <div class="h-[1px] flex-1 bg-slate-100"></div>
                </div>

                <div id="aiOutput" class="prose prose-slate text-slate-700 leading-relaxed whitespace-pre-line">
                    </div>
            </div>

            <button onclick="location.reload()" class="w-full text-slate-500 font-medium py-2">
                <i class="fa-solid fa-rotate-left mr-2"></i> Yeni Fotoğraf Yükle
            </button>
        </section>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const uploadContent = document.getElementById('uploadContent');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const aiOutput = document.getElementById('aiOutput');

        // Dosya seçildiğinde önizleme yap
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadContent.classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // Analiz Butonuna Tıklandığında
        analyzeBtn.addEventListener('click', async () => {
            const base64Image = imagePreview.src;
            
            // Görünümü değiştir
            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');

            try {
                // Vercel'deki API endpoint'ine istek at
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();

                if (data.result) {
                    // Markdown-like temizlik (Gelen yanıttaki ** gibi işaretleri basitçe yönetebilirsin)
                    aiOutput.innerText = data.result;
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('resultSection').classList.remove('hidden');
                } else {
                    alert("Hata: AI yanıt vermedi.");
                    location.reload();
                }
            } catch (error) {
                console.error("Hata:", error);
                alert("Sistemle bağlantı kurulamadı.");
                location.reload();
            }
        });
    </script>
</body>
</html>
