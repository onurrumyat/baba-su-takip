<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | AI Sağlık Girişimi</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --accent: #38bdf8; --text: #f8fafc; --muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        
        .container { width: 100%; max-width: 440px; background: var(--card); border-radius: 28px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); height: fit-content; }
        
        /* Saat ve Tarih */
        .header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #334155; }
        #clock { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        #date { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }

        /* Formlar */
        #setup, #dashboard { display: none; flex-direction: column; gap: 15px; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--muted); text-transform: uppercase; margin-left: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; color: white; outline: none; font-size: 0.9rem; }

        /* Dashboard */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; }
        .cam-view { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #334155; position: relative; margin-top: 5px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 0.85rem; }
        .btn-green { background: var(--primary); }
        .btn-blue { background: var(--accent); }
        .btn:disabled { opacity: 0.5; }

        /* Sade Analiz Kartları */
        #results { display: none; flex-direction: column; gap: 8px; margin-top: 15px; }
        .analysis-card { background: #0f172a; padding: 12px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .card-tag { font-size: 0.65rem; font-weight: 900; color: var(--accent); margin-bottom: 3px; }
        .card-txt { font-size: 0.85rem; line-height: 1.4; color: #cbd5e1; }
        
        #loading { display: none; text-align: center; font-size: 0.8rem; color: var(--accent); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="date">Yükleniyor...</div>
        <div id="clock">00:00:00</div>
    </div>

    <div id="setup">
        <h3 style="text-align:center; margin-bottom:10px;">Profil Bilgileri</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="input-box"><label>Yaş</label><input type="number" id="age" placeholder="25"></div>
            <div class="input-box"><label>Kilo</label><input type="number" id="weight" placeholder="75"></div>
        </div>
        <div class="input-box"><label>Cinsiyet</label><select id="gender"><option value="Erkek">Erkek</option><option value="Kadın">Kadın</option></select></div>
        <div class="input-box"><label>Hedef</label><select id="goal"><option value="Kilo Vermek">Kilo Vermek (-)</option><option value="Kilo Almak">Kilo Almak (+)</option></select></div>
        <button class="btn btn-green" onclick="save()">SİSTEMİ AKTİF ET</button>
    </div>

    <div id="dashboard">
        <div class="stats-row">
            <div class="input-box"><label>Adım Sayısı</label><input type="number" id="steps" value="5000"></div>
            <div class="input-box"><label>Modun</label><select id="mood"><option>Normal</option><option>Yorgun</option><option>Stresli</option></select></div>
        </div>

        <div class="cam-view"><video id="video" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <div id="loading">✨ AI ANALİZ YAPIYOR...</div>
        <div id="results"></div>

        <div class="action-btns">
            <button class="btn btn-green" id="b1" onclick="startAI('yemek')">📸 YEMEK</button>
            <button class="btn btn-blue" id="b2" onclick="startAI('buzdolabi')">❄️ DOLAP</button>
        </div>
        <p style="text-align:center; font-size:0.6rem; color:var(--muted); margin-top:15px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Verileri Sıfırla</p>
    </div>
</div>

<script>
    // Saat ve Tarih
    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('tr-TR');
        document.getElementById('date').innerText = n.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});
    }
    setInterval(updateClock, 1000); updateClock();

    // Veri Yönetimi
    let user = JSON.parse(localStorage.getItem('bio_v4'));
    if(user) showDashboard(); else document.getElementById('setup').style.display = 'flex';

    function save() {
        user = { age: document.getElementById('age').value, weight: document.getElementById('weight').value, gender: document.getElementById('gender').value, goal: document.getElementById('goal').value };
        if(!user.age || !user.weight) return alert("Eksik bilgi!");
        localStorage.setItem('bio_v4', JSON.stringify(user));
        showDashboard();
    }

    function showDashboard() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
    }

    // AI Analiz Akışı
    async function startAI(mode) {
        const b1 = document.getElementById('b1'); const b2 = document.getElementById('b2');
        const loader = document.getElementById('loading'); const resDiv = document.getElementById('results');
        
        b1.disabled = b2.disabled = true; loader.style.display = 'block'; resDiv.style.display = 'none';

        const vid = document.getElementById('video'); const canv = document.getElementById('canvas');
        canv.width = vid.videoWidth; canv.height = vid.videoHeight;
        canv.getContext('2d').drawImage(vid, 0, 0);
        const img = canv.toDataURL('image/jpeg');

        const userStr = `${user.age} yaş, ${user.weight}kg, ${user.gender}, Hedef: ${user.goal}, Adım: ${document.getElementById('steps').value}, Saat: ${new Date().toLocaleTimeString()}, Mod: ${document.getElementById('mood').value}`;

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: userStr })
            });
            const d = await r.json();
            
            // Şablonu Oluştur ve Göster
            resDiv.innerHTML = ''; resDiv.style.display = 'flex';
            const blocks = d.analysis.split(/\d\./).filter(t => t.trim().length > 5);
            const tags = ["ANALİZ", "SAĞLIK ETKİSİ", "HEDEF DURUMU", "TAVSİYE"];

            blocks.forEach((txt, i) => {
                const card = document.createElement('div'); card.className = 'analysis-card';
                card.innerHTML = `<div class="card-tag">${tags[i] || 'BİLGİ'}</div><div class="card-txt">${txt.trim()}</div>`;
                resDiv.appendChild(card);
            });

            // Sesli okuma
            const s = new SpeechSynthesisUtterance(d.analysis); s.lang = 'tr-TR'; window.speechSynthesis.speak(s);

        } catch (e) { alert("Hata: " + e.message); }
        finally { b1.disabled = b2.disabled = false; loader.style.display = 'none'; }
    }
</script>

</body>
</html>
