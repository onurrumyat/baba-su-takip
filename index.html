<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Beslenme</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; }
        
        .auth-container h1 { font-size: 2.5rem; text-align: center; margin-bottom: 20px; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; color: transparent; font-weight: 900; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; outline: none; transition: 0.3s; text-align: center; font-size: 1rem; }
        
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; color: white; font-size: 1rem; }
        .btn-main { background: var(--primary); margin-top: 10px; }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid #2d3748; color: #94a3b8; margin-top: 10px; font-size: 0.8rem; }
        
        .header { text-align: center; margin-bottom: 20px; }
        #clock { font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 3px solid #1e293b; margin-bottom: 20px; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .premium-box { background: rgba(245, 158, 11, 0.1); border: 1px dashed var(--premium); border-radius: 20px; padding: 15px; margin-top: 15px; text-align: center; }
        .btn-premium { background: var(--premium); color: #000; font-weight: 800; }
        .lock-notice { color: var(--premium); font-size: 0.8rem; margin-top: 10px; font-weight: bold; display: none; }

        #results { display: none; flex-direction: column; gap: 15px; margin-top: 25px; }
        .day-card { background: #1e293b; border-radius: 20px; padding: 18px; border-left: 5px solid var(--accent); animation: slideIn 0.5s ease forwards; }
        .day-title { font-size: 0.8rem; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .day-content { font-size: 0.95rem; line-height: 1.6; color: #e2e8f0; white-space: pre-line; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-card">
    <div id="loginView" class="auth-container">
        <h1>BIO-CHEF</h1>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" style="border:none; margin-top:5px;" onclick="doReset()">Şifremi Unuttum?</button>
        <button class="btn btn-outline" onclick="toggleView('regView')">Hesabın yok mu? Kayıt Ol</button>
    </div>

    <div id="regView" class="auth-container" style="display:none;">
        <h1>KAYIT OL</h1>
        <input type="email" id="rEmail" placeholder="E-posta Seç">
        <input type="password" id="rPass" placeholder="Şifre Belirle">
        <button class="btn btn-sub" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="mainView" style="display:none;">
        <div class="header">
            <div id="clock">00:00:00</div>
            <p id="uMail" style="font-size:0.7rem; color:#64748b;"></p>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ">
            <input type="number" id="uWeight" placeholder="KİLO">
        </div>
        <select id="uGoal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>

        <div class="cam-box"><video id="video" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <button class="btn btn-main" id="btnAnalyze" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        
        <div class="premium-box">
            <button class="btn btn-sub" style="margin-top:0;" onclick="handlePlanClick()">📅 HAFTALIK BESİN PLANI</button>
            <div id="lockNotice" class="lock-notice">⚠️ PREMIUM ÜYELİK GEREKTİRİR!</div>
            <button id="btnBuy" class="btn btn-premium" style="margin-top:10px;" onclick="buyPremium()">PREMIUM ÜYE | 0.99 $</button>
        </div>

        <div id="results"></div>

        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">GÜVENLİ ÇIKIŞ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
        authDomain: "voice2post-9e8ca.firebaseapp.com",
        projectId: "voice2post-9e8ca",
        storageBucket: "voice2post-9e8ca.firebasestorage.app",
        messagingSenderId: "511446656614",
        appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let isVip = false;

    function toggleView(id) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('regView').style.display = 'none';
        document.getElementById('mainView').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    auth.onAuthStateChanged(user => {
        if (user) {
            toggleView('mainView');
            document.getElementById('uMail').innerText = user.email;
            isVip = localStorage.getItem('vip_' + user.uid) === 'true';
            document.getElementById('btnBuy').style.display = isVip ? 'none' : 'block';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
        } else {
            toggleView('loginView');
        }
    });

    async function doLogin() {
        try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert(e.message); }
    }
    async function doRegister() {
        try { await auth.createUserWithEmailAndPassword(document.getElementById('rEmail').value, document.getElementById('rPass').value); } catch(e) { alert(e.message); }
    }
    
    // ŞİFRE SIFIRLAMA FONKSİYONU
    async function doReset() {
        const email = document.getElementById('lEmail').value;
        if(!email) return alert("Lütfen mail adresinizi yazın.");
        try { await auth.sendPasswordResetEmail(email); alert("Şifre sıfırlama linki e-postanıza gönderildi."); } catch(e) { alert(e.message); }
    }

    function buyPremium() {
        if(confirm("0.99$ ödeme onaylıyor musunuz?")) {
            localStorage.setItem('vip_' + auth.currentUser.uid, 'true');
            isVip = true;
            document.getElementById('btnBuy').style.display = 'none';
            document.getElementById('lockNotice').style.display = 'none';
            alert("TEBRİKLER! ARTIK PREMIUM ÜYESİSİNİZ.");
        }
    }

    function handlePlanClick() {
        if(!isVip) { document.getElementById('lockNotice').style.display = 'block'; return; }
        runAI('plan');
    }

    async function runAI(mode) {
        const resDiv = document.getElementById('results');
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        if(!age || !weight) return alert("Lütfen bilgileri girin!");

        resDiv.innerHTML = '<p style="text-align:center;">🧠 İşleniyor...</p>';
        resDiv.style.display = 'flex';

        let img = "";
        if(mode === 'yemek') {
            const vid = document.getElementById('video');
            const canv = document.createElement('canvas');
            canv.width = 640; canv.height = 480;
            canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
            img = canv.toDataURL('image/jpeg', 0.7);
        }

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}` })
            });
            const d = await r.json();
            resDiv.innerHTML = '';

            const sections = d.analysis.split(/GÜN:|1\.|2\.|3\.|4\./).filter(s => s.trim().length > 5);
            const titles = mode === 'plan' ? ["PAZARTESİ", "SALI", "ÇARŞAMBA", "PERŞEMBE", "CUMA", "CUMARTESİ", "PAZAR"] : ["ÖZET", "BESİN TABLOSU", "HEDEF ANALİZİ", "TAVSİYE"];

            sections.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `<div class="day-title">${titles[i] || 'DETAY'}</div><div class="day-content">${text.trim().replace(/:/g, ': ')}</div>`;
                resDiv.appendChild(card);
            });
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(d.analysis));
        } catch (e) { alert("Hata!"); }
    }
</script>
</body>
</html>
