<style>
/* ─── TOKENS ───────────────────────────────────────────────── */
:root {
  --bg:       #080b12;
  --surface:  #0e1320;
  --elevated: #141a2b;
  --border:   rgba(255,255,255,0.07);
  --green:    #00e887;
  --blue:     #38b2f8;
  --amber:    #f5a623;
  --red:      #ff4757;
  --text:     #eef2ff;
  --muted:    #64748b;
  --radius:   20px;
  --radius-sm:12px;
  --glow-g:   0 0 30px rgba(0,232,135,0.18);
  --glow-b:   0 0 30px rgba(56,178,248,0.18);
}

/* ─── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 16px 80px;
  background-image:
    radial-gradient(ellipse 60% 50% at 80% -10%, rgba(0,232,135,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at -10% 80%, rgba(56,178,248,0.06) 0%, transparent 60%);
}

/* ─── SHELL ────────────────────────────────────────────────── */
.shell {
  width: 100%;
  max-width: 440px;
  background: var(--surface);
  border-radius: 32px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  position: relative;
}

.shell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,232,135,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ─── TOPBAR ───────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.lang-switcher { display: flex; gap: 6px; }
.lang-btn {
  font-size: 1.25rem;
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--elevated);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.lang-btn:hover { border-color: var(--green); transform: translateY(-1px); }

.topbar-right { display: flex; gap: 8px; align-items: center; }

/* ─── STREAK ───────────────────────────────────────────────── */
.streak {
  display: none;
  align-items: center;
  gap: 5px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--amber);
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.25);
  padding: 6px 12px;
  border-radius: 50px;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe { 0%,100% { opacity:1; } 50% { opacity:.75; } }

/* ─── ICON BUTTON ──────────────────────────────────────────── */
.icon-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--elevated);
  border: 1px solid var(--border);
  font-size: 1.1rem;
  cursor: pointer;
  position: relative;
  transition: all .2s;
}
.icon-btn:hover { border-color: rgba(255,255,255,0.15); }
.icon-btn.visible { display: flex; }

.badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--red);
  color: #fff;
  font-size: 0.55rem;
  font-weight: 700;
  width: 15px; height: 15px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--surface);
}
.badge.show { display: flex; }

/* ─── DROPDOWN ─────────────────────────────────────────────── */
.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 270px;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  z-index: 200;
  box-shadow: 0 20px 40px rgba(0,0,0,0.7);
  max-height: 280px;
  overflow-y: auto;
}
.dropdown.open { display: block; }
.dropdown h4 {
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  text-align: center;
}
.notif-item {
  background: var(--bg);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: #94a3b8;
  border-left: 2px solid var(--blue);
  line-height: 1.5;
}
.notif-accept {
  display: inline-block;
  margin-top: 6px;
  background: var(--green);
  color: #000;
  border: none;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
}
.friend-link {
  display: block;
  padding: 9px 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  color: var(--green);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  border: 1px solid transparent;
  transition: .2s;
}
.friend-link:hover { border-color: var(--green); }

/* ─── CONTENT AREA ─────────────────────────────────────────── */
.content { padding: 28px 24px; position: relative; z-index: 1; }

/* ─── LOGO / WORDMARK ──────────────────────────────────────── */
.wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.6rem;
  text-align: center;
  letter-spacing: -0.03em;
  margin-bottom: 28px;
  background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ─── FORM FIELDS ──────────────────────────────────────────── */
.field {
  width: 100%;
  padding: 15px 18px;
  border-radius: var(--radius-sm);
  background: var(--elevated);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  margin-bottom: 10px;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
  text-align: center;
  appearance: none;
}
.field:focus { border-color: var(--green); box-shadow: var(--glow-g); }
.field::placeholder { color: var(--muted); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ─── BUTTONS ──────────────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: .03em;
  cursor: pointer;
  transition: all .25s;
  outline: none;
  margin-top: 8px;
}
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, var(--green) 0%, #00c472 100%);
  color: #000;
  box-shadow: 0 8px 24px rgba(0,232,135,0.25);
}
.btn-primary:hover { box-shadow: 0 12px 32px rgba(0,232,135,0.38); transform: translateY(-1px); }

.btn-blue {
  background: linear-gradient(135deg, var(--blue) 0%, #2196f3 100%);
  color: #fff;
  box-shadow: 0 8px 24px rgba(56,178,248,0.2);
}
.btn-blue:hover { box-shadow: 0 12px 28px rgba(56,178,248,0.33); transform: translateY(-1px); }

.btn-amber {
  background: linear-gradient(135deg, var(--amber) 0%, #e0850c 100%);
  color: #000;
  box-shadow: 0 8px 24px rgba(245,166,35,0.25);
}
.btn-amber:hover { transform: translateY(-1px); }

.btn-danger {
  background: linear-gradient(135deg, var(--red), #c0392b);
  color: #fff;
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 0.82rem;
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

/* ─── CLOCK / USER TAG ─────────────────────────────────────── */
.hero-header { text-align: center; margin-bottom: 24px; }
.clock-display {
  font-family: 'Syne', sans-serif;
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--blue);
}
.user-tag {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--green);
  font-size: 0.95rem;
  margin-top: 4px;
  letter-spacing: .02em;
}

/* ─── CAMERA ───────────────────────────────────────────────── */
.cam-frame {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 16px;
  background: #000;
  position: relative;
}
.cam-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  box-shadow: inset 0 0 0 1px rgba(0,232,135,0.08);
  pointer-events: none;
}
video { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ─── RESULTS ──────────────────────────────────────────────── */
#results {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

.rcard {
  background: var(--elevated);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  border-top: 3px solid var(--blue);
  position: relative;
  overflow: hidden;
}
.rcard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--blue), transparent);
  opacity: 0.4;
}
.rtag {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
}
.rtxt {
  font-size: 0.875rem;
  line-height: 1.7;
  color: #94a3b8;
  white-space: pre-line;
}

/* ─── SCORE BAR ────────────────────────────────────────────── */
.score-wrap { padding: 12px 0 24px; }
.score-track {
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(to right, #ff4757 0%, #f97316 35%, #eab308 65%, #00e887 100%);
  position: relative;
}
.score-pin {
  position: absolute;
  top: -11px;
  width: 32px; height: 32px;
  background: #fff;
  border: 3px solid var(--bg);
  border-radius: 50%;
  transform: translateX(-50%);
  transition: left 1.2s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  font-weight: 800;
  color: #000;
  z-index: 2;
}
.score-pin::after {
  content: '▾';
  position: absolute;
  bottom: -18px;
  font-size: 1rem;
  color: #fff;
}

/* ─── HISTORY ──────────────────────────────────────────────── */
.history-item {
  background: var(--elevated);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  font-size: 0.82rem;
  border-left: 2px solid var(--green);
  color: #94a3b8;
}
.history-item b { color: var(--text); font-size: 0.78rem; display: block; margin-bottom: 3px; }

/* ─── SECTION PANEL ────────────────────────────────────────── */
.panel {
  display: none;
  margin-top: 12px;
  padding: 20px;
  background: var(--elevated);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.panel.open { display: block; }
.panel-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--green);
  text-align: center;
  margin-bottom: 14px;
}

/* ─── PARTNER BOX ──────────────────────────────────────────── */
.partner-panel {
  display: none;
  margin-top: 12px;
  background: rgba(255,71,87,0.05);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: var(--radius);
  padding: 20px;
}
.partner-panel.open { display: block; }
.partner-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--red);
  text-align: center;
  margin-bottom: 14px;
}
#partnerResult {
  margin-top: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-align: center;
  color: var(--text);
}

/* ─── PREMIUM ──────────────────────────────────────────────── */
.premium-box {
  margin-top: 20px;
  background: rgba(245,166,35,0.06);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.premium-label {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 14px;
}
#paypal-button-container { margin-top: 12px; min-height: 130px; }

/* ─── DIVIDER ──────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ─── LOADING PULSE ────────────────────────────────────────── */
.loading-pulse {
  text-align: center;
  padding: 20px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--muted);
  font-size: 0.85rem;
  letter-spacing: .05em;
  animation: breathe 1.5s ease-in-out infinite;
}

/* ─── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ─── VIEW TRANSITIONS ─────────────────────────────────────── */
.view { animation: fadeUp .35s ease-out; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

async function doRegister() {
  const u = document.getElementById('rUser').value.trim();
  const e = document.getElementById('rEmail').value;
  const p = document.getElementById('rPass').value;
  if (!u || !e || !p) return alert('Eksik bilgi.');
  try {
    const check = await db.collection('partner_data').doc(u.toLowerCase()).get();
    if (check.exists) return alert(L[currentLang].errUserTaken);
    const cred = await auth.createUserWithEmailAndPassword(e, p);
    await cred.user.updateProfile({ displayName: u });
    await db.collection('partner_data').doc(u.toLowerCase()).set({ username: u.toLowerCase() }, { merge: true });
    location.reload();
  } catch(err) { alert(err.message); }
}

/* ─── NOTIFICATIONS ─────────────────────────────────────────── */
function toggleNotifications() {
  document.getElementById('friendsDropdown').classList.remove('open');
  document.getElementById('notifDropdown').classList.toggle('open');
}
function toggleFriends() {
  document.getElementById('notifDropdown').classList.remove('open');
  document.getElementById('friendsDropdown').classList.toggle('open');
}

function listenNotifications() {
  const me = (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]).toLowerCase();
  db.collection('notifications').where('toUser','==',me).onSnapshot(snap => {
    const list  = document.getElementById('notifList');
    const badge = document.getElementById('notifBadge');
    list.innerHTML = '';
    let c = 0;
    snap.forEach(doc => {
      c++;
      const d = doc.data();
      let html = '<div class="notif-item">';
      if (d.type === 'friend_request') {
        html += `🤝 @${d.fromUser} takip etmek istiyor.<br>
          <button class="notif-accept" onclick="acceptFriend('${d.fromUser}','${doc.id}')">Kabul Et</button>`;
      } else {
        html += `${d.message}<br>
          <button class="notif-accept" onclick="deleteNotif('${doc.id}')">Sil</button>`;
      }
      html += '</div>';
      list.innerHTML += html;
    });
    badge.innerText = c;
    badge.classList.toggle('show', c > 0);
    if (c === 0) list.innerHTML = '<p style="text-align:center;font-size:0.75rem;color:var(--muted);">Bildirim yok.</p>';
  });
}

function acceptFriend(u, id) {
  const me = auth.currentUser.displayName.toLowerCase();
  db.collection('partner_data').doc(me).update({ friends: firebase.firestore.FieldValue.arrayUnion(u) });
  db.collection('partner_data').doc(u).update({ friends: firebase.firestore.FieldValue.arrayUnion(me) });
  db.collection('notifications').doc(id).delete();
}

function deleteNotif(id) { db.collection('notifications').doc(id).delete(); }

function listenFriends() {
  const me = (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]).toLowerCase();
  db.collection('partner_data').doc(me).onSnapshot(doc => {
    const container = document.getElementById('friendsListContainer');
    container.innerHTML = '';
    if (doc.exists && doc.data().friends && doc.data().friends.length) {
      doc.data().friends.forEach(f => {
        container.innerHTML += `<div class="friend-link" onclick="checkSpecific('${f}')">@${f}</div>`;
      });
    } else {
      container.innerHTML = '<p style="text-align:center;font-size:0.75rem;color:var(--muted);">Takip yok.</p>';
    }
  });
}

function checkSpecific(u) {
  document.getElementById('partnerUser').value = u;
  document.getElementById('partnerPanel').classList.add('open');
  checkPartner();
  toggleFriends();
}

function sendFriendRequest() {
  const u  = document.getElementById('partnerUser').value.trim().toLowerCase();
  const me = auth.currentUser.displayName.toLowerCase();
  if (!u || u === me) return alert(L[currentLang].partErr);
  db.collection('notifications').add({ toUser:u, fromUser:me, type:'friend_request', timestamp:Date.now() });
  alert('İstek gönderildi.');
}

function checkPartner() {
  const u   = document.getElementById('partnerUser').value.trim().toLowerCase();
  const res = document.getElementById('partnerResult');
  db.collection('partner_data').doc(u).get().then(doc => {
    if (doc.exists && doc.data().score !== undefined) {
      const s = doc.data().score;
      res.innerText = (s < 7 ? L[currentLang].partCatch : L[currentLang].partGood) + s + '/10';
      res.style.color = s < 7 ? 'var(--red)' : 'var(--green)';
    } else {
      res.innerText = L[currentLang].partNoData;
      res.style.color = 'var(--muted)';
    }
  });
}

/* ─── AI ANALYSIS ────────────────────────────────────────────── */
async function runAI(mode) {
  const resDiv = document.getElementById('results');
  const age    = document.getElementById('uAge').value;
  const weight = document.getElementById('uWeight').value;
  if (!age || !weight) return alert(L[currentLang].errInfo);

  resDiv.innerHTML = `<div class="loading-pulse">${L[currentLang].loading}</div>`;
  resDiv.style.display = 'flex';

  let img = '';
  if (mode === 'yemek') {
    const vid  = document.getElementById('video');
    const canv = document.createElement('canvas');
    canv.width = 640; canv.height = 480;
    canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
    img = canv.toDataURL('image/jpeg', 0.7);
  }

  try {
    const r = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        mode, image: img,
        user_data:`Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}`,
        lang: currentLang
      })
    });
    const data = await r.json();
    resDiv.innerHTML = '';

    const sections = data.analysis.split(/\d\./).filter(s => s.trim().length > 5);
    const heads    = mode === 'plan' ? L[currentLang].headersPlan : L[currentLang].headersYemek;
    let score = 5;

    sections.forEach((txt, i) => {
      const card = document.createElement('div');
      card.className = 'rcard';
      let content = txt.trim();

      if (mode === 'yemek' && i === 0) {
        const match = content.match(/\[SKOR:\s*(\d+)\]/i);
        if (match) {
          score = parseInt(match[1]);
          content = content.replace(match[0], '').trim();
          updateStreak(score);
        }
        const pct = (score / 10) * 100;
        card.innerHTML = `
          <div class="rtag">${heads[i] || 'DETAY'}</div>
          <div class="rtxt">${content}</div>
          <div class="score-wrap">
            <div class="score-track">
              <div class="score-pin" style="left:${pct}%">${score}</div>
            </div>
          </div>`;
      } else {
        card.innerHTML = `
          <div class="rtag">${heads[i] || 'DETAY'}</div>
          <div class="rtxt">${content}</div>`;
      }
      resDiv.appendChild(card);
    });

    document.getElementById('btnPdf').style.display = 'block';
    if (mode === 'yemek') saveHistory(score, data.analysis);
  } catch(e) {
    resDiv.innerHTML = `<div class="loading-pulse" style="color:var(--red);">Bir hata oluştu.</div>`;
  }
}

/* ─── HISTORY ────────────────────────────────────────────────── */
function saveHistory(score, raw) {
  const me  = (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]).toLowerCase();
  db.collection('partner_data').doc(me).set(
    { score, lastMeal: raw.substring(0,50), time: new Date().toLocaleTimeString() },
    { merge: true }
  );
  const key = 'history_' + auth.currentUser.uid;
  const arr = JSON.parse(localStorage.getItem(key) || '[]');
  arr.unshift({ summary:`Skor: ${score}/10`, date: new Date().toLocaleString() });
  localStorage.setItem(key, JSON.stringify(arr.slice(0, 10)));
}

function toggleHistory() {
  const p = document.getElementById('historyPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    const arr  = JSON.parse(localStorage.getItem('history_' + auth.currentUser.uid) || '[]');
    const list = document.getElementById('historyList');
    list.innerHTML = arr.length
      ? arr.map(h => `<div class="history-item"><b>${h.date}</b>${h.summary}</div>`).join('')
      : `<p style="color:var(--muted); font-size:0.82rem; text-align:center;">${L[currentLang].noHist}</p>`;
  }
}

/* ─── STREAK ─────────────────────────────────────────────────── */
function showStreak() {
  const d = JSON.parse(localStorage.getItem('streak_' + auth.currentUser.uid) || '{"count":0}');
  if (d.count > 0) {
    const badge = document.getElementById('streakBadge');
    badge.style.display = 'flex';
    document.getElementById('streakCount').innerText = d.count;
  }
}

function updateStreak(s) {
  const key = 'streak_' + auth.currentUser.uid;
  const d   = JSON.parse(localStorage.getItem(key) || '{"count":0,"last":""}');
  const t   = new Date().toLocaleDateString();
  if (s >= 7) { if (d.last !== t) d.count++; d.last = t; } else { d.count = 0; }
  localStorage.setItem(key, JSON.stringify(d));
  showStreak();
}
