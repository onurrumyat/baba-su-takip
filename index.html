<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Komuta Merkezi | Kusursuz Kurul</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0b10; --bg-panel: rgba(15, 18, 25, 0.95); --border-glass: rgba(255, 255, 255, 0.1);
            --text-light: #e2e8f0; --text-muted: #64748b;
            --c-openai: #10a37f; --c-gemini: #c255ff; --c-claude: #d97757; --c-user: #38bdf8;
            --table-surface: linear-gradient(135deg, #161821 0%, #0b0c10 100%); --table-rim: #1f222e;
            --holo-color: rgba(56, 189, 248, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--bg-main); background-image: radial-gradient(circle at 50% -20%, rgba(56, 189, 248, 0.05) 0%, transparent 70%); color: var(--text-light); font-family: 'Segoe UI', system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.5s; }

        /* KRİZ, GECE VE SAKİN MODLARI */
        body.crisis-mode { background-color: #1a0505; background-image: radial-gradient(circle at 50% -20%, rgba(255, 0, 0, 0.15) 0%, transparent 70%); animation: crisisPulse 2s infinite; }
        body.crisis-mode .board-table { box-shadow: 0 30px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,0,0,0.2); border-color: #3a1515;}
        @keyframes crisisPulse { 0%, 100% { background-color: #1a0505; } 50% { background-color: #2a0505; } }

        body.night-mode { background-color: #020617; background-image: none; }
        body.night-mode .board-table { box-shadow: 0 40px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(14, 165, 233, 0.1); border-color: #0f172a;}
        
        .rain-container { position: absolute; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; display: none; }
        body.relax-mode .rain-container { display: block; }
        .rain-drop { position: absolute; background: linear-gradient(transparent, rgba(255,255,255,0.4)); width: 1px; height: 50px; animation: rainFall linear infinite; }
        @keyframes rainFall { to { transform: translateY(100vh); } }

        /* ÜST PANEL */
        #main-app { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .header-panel { background: var(--bg-panel); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-glass); padding: 10px 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; z-index: 10; }
        .header-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;}
        .tools-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s;}
        .tools-btn:hover { background: rgba(255,255,255,0.1); }
        .tools-btn.active { background: var(--c-user); color: #000; border-color: var(--c-user);}
        .projects-btn { background: rgba(56, 189, 248, 0.1); color: var(--c-user); border: 1px solid var(--c-user); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        
        .live-btn { background: #c255ff; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; animation: pulseLive 2s infinite alternate;}
        .live-btn.active { background: white; color: #c255ff; box-shadow: 0 0 15px #c255ff; }
        @keyframes pulseLive { from{box-shadow: 0 0 0px #c255ff;} to{box-shadow: 0 0 10px #c255ff;} }

        .crisis-checkbox { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ef4444; font-weight: bold; cursor: pointer;}
        .night-checkbox { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #38bdf8; font-weight: bold; cursor: pointer;}
        .relax-checkbox { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a78bfa; font-weight: bold; cursor: pointer;}
        .board-select { width: 140px; background: #010409; color: white; border: 1px solid var(--border-glass); padding: 6px; border-radius: 6px; font-size: 11px; outline: none;}

        .info-card { flex: 1; min-width: 120px; }
        .info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .vote-highlight { color: #fbbf24; font-size: 13px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); font-weight: 700; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        
        .vote-actions { display: flex; gap: 6px; flex-wrap: wrap;}
        .btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 10px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-yes { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); } .btn-yes:hover:not(:disabled) { background: #22c55e; color: white; }
        .btn-no { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); } .btn-no:hover:not(:disabled) { background: #ef4444; color: white; }
        .btn-pdf { background: #fbbf24; color: #000; display: none; } .btn-pdf:hover { background: #d97706; color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- ORTA ALAN VE MASA --- */
        .stage { flex: 1; min-height: 0; display: flex; justify-content: center; align-items: center; position: relative; perspective: 1000px; padding: 30px; }
        .system-status { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: var(--c-user); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; z-index: 20; text-align: center; white-space:nowrap;}
        
        .table-wrapper { position: relative; width: 100%; max-width: 650px; aspect-ratio: 2 / 1.2; transform: rotateX(15deg); transform-style: preserve-3d; }
        .board-table { width: 100%; height: 100%; background: var(--table-surface); border: 8px solid var(--table-rim); border-radius: 500px; box-shadow: 0 25px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; position: relative; transition: 0.5s; }
        .table-wrapper.wood-mode .board-table { background: linear-gradient(135deg, #4f2e1e 0%, #2e180d 50%, #1a0c05 100%); border-color: #2b1408; box-shadow: 0 35px 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.9), inset 0 0 10px rgba(255, 165, 0, 0.1); }

        /* HOLO MERKEZ */
        .holo-center { width: 65%; height: 55%; background: rgba(56, 189, 248, 0.02); border-radius: 500px; border: 1px solid rgba(56, 189, 248, 0.1); position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: 0.3s; z-index: 2;}
        .holo-core { width: 40px; height: 40px; border-radius: 50%; border: 2px dashed var(--holo-color); animation: spinHolo 3s linear infinite; display: none; box-shadow: 0 0 15px var(--holo-color);}
        @keyframes spinHolo { 100% { transform: rotate(360deg); } }
        
        /* CANLI TOPLANTI KONUŞMACI AVATARI */
        .center-speaker { position: absolute; display: none; flex-direction: column; align-items: center; gap: 8px; z-index: 10; animation: centerPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .center-speaker .node-icon { width: 70px; height: 70px; font-size: 30px; border-radius: 15px; border: 3px solid; background: rgba(0,0,0,0.8); animation: speakGlow 0.4s infinite alternate; }
        .center-speaker .node-name { font-size: 12px; padding: 4px 10px; background: rgba(0,0,0,0.9); border-radius: 4px; font-weight:bold;}
        @keyframes centerPop { 0% { transform: scale(0) translateY(30px) rotateX(-15deg); opacity: 0; } 100% { transform: scale(1) translateY(0) rotateX(-15deg); opacity: 1; } }

        /* MÜTHİŞ VERİ GİT-GEL EFEKTİ (LAZERLER) */
        .laser-container { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 3; }
        .laser-line { position: absolute; top: 50%; left: 50%; transform-origin: left center; height: 3px; opacity: 0; }
        
        .ll-openai { background: linear-gradient(90deg, transparent, var(--c-openai), #fff); transform: rotate(-90deg); animation: shootData 0.6s infinite; }
        .ll-user   { background: linear-gradient(90deg, transparent, var(--c-user), #fff); transform: rotate(90deg); animation: shootData 0.9s infinite 0.2s; }
        .ll-gemini { background: linear-gradient(90deg, transparent, var(--c-gemini), #fff); transform: rotate(180deg); animation: shootData 0.7s infinite 0.4s; }
        .ll-claude { background: linear-gradient(90deg, transparent, var(--c-claude), #fff); transform: rotate(0deg); animation: shootData 0.8s infinite 0.1s; }
        
        @keyframes shootData { 
            0% { width: 0px; opacity: 1; left: 50%;} 
            50% { width: 140px; opacity: 1; } 
            100% { width: 240px; opacity: 0; left: 50%;} 
        }

        /* AVATARLARIN SABİT YERLERİ */
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 5; opacity: 0.6; transition: 0.3s;}
        .node-icon { width: 35px; height: 35px; border-radius: 8px; background: #0f1117; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: 800; border: 2px solid; box-shadow: 0 8px 15px rgba(0,0,0,0.8); transform: rotateX(-15deg); transition: 0.3s;}
        .node-name { font-size: 9px; font-weight: 800; letter-spacing: 1px; color: #fff; text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; transform: rotateX(-15deg); margin-top:-5px;}
        
        .n-openai .node-icon { border-color: var(--c-openai); color: var(--c-openai); } 
        .n-gemini .node-icon { border-color: var(--c-gemini); color: var(--c-gemini); } 
        .n-claude .node-icon { border-color: var(--c-claude); color: var(--c-claude); } 
        .n-user .node-icon { border-color: var(--c-user); color: var(--c-user); }
        
        .n-openai { top: 0; left: 50%; transform: translate(-50%, -50%); } 
        .n-user { top: 100%; left: 50%; transform: translate(-50%, -50%); } 
        .n-gemini { top: 50%; left: 0; transform: translate(-50%, -50%); } 
        .n-claude { top: 50%; left: 100%; transform: translate(-50%, -50%); } 
        
        .thinking .node-icon { animation: glow 1s infinite alternate; opacity: 1;}
        @keyframes glow { from { box-shadow: 0 0 5px currentColor; } to { box-shadow: 0 0 20px currentColor, inset 0 0 10px currentColor; } }
        @keyframes speakGlow { from { box-shadow: 0 0 10px currentColor; } to { box-shadow: 0 0 35px currentColor, inset 0 0 15px currentColor; } }
        .hidden-node { opacity: 0 !important; pointer-events: none; }

        /* SİMETRİK ÇIKAN DOSYALAR (MASANIN ORTASI) */
        .doc { position: absolute; width: 26px; height: 36px; background: rgba(255,255,255,0.95); border-radius: 3px; display: flex; justify-content: center; align-items: center; cursor: pointer; opacity: 0; transform: scale(0) translate(-50%, -50%); transition: 0.4s; box-shadow: 0 4px 10px rgba(0,0,0,0.7); font-size: 13px; border-left: 3px solid #ccc; color: black; z-index: 6;}
        .doc:hover { transform: scale(1.3) translate(-40%, -40%) !important; z-index: 10; }
        .doc.visible { opacity: 1; transform: scale(1) translate(-50%, -50%); }
        
        .d-openai { top: 22%; left: 50%; border-left-color: var(--c-openai); }
        .d-gemini { top: 50%; left: 22%; border-left-color: var(--c-gemini); } 
        .d-claude { top: 50%; left: 78%; border-left-color: var(--c-claude); } 
        
        .master-doc { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 45px; height: 60px; background: linear-gradient(135deg, #fbbf24, #d97706); border-radius: 4px 8px 8px 4px; display: flex; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; opacity: 0; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 25px rgba(251, 191, 36, 0.4); border-left: 5px solid #b45309; z-index: 8;}
        .master-doc:hover { transform: translate(-50%, -50%) scale(1.15) !important; z-index: 10; }
        .master-doc.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* YÜKLENEN DIŞ DOSYA (MASANIN KENARI) */
        .uploaded-doc { position: absolute; bottom: 15%; right: 15%; width: 34px; height: 46px; background: #e2e8f0; border-radius: 3px; display: none; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.6); z-index: 5; border-top-right-radius: 10px; }
        .uploaded-doc::before { content: ''; position: absolute; top: 0; right: 0; border-width: 0 10px 10px 0; border-style: solid; border-color: #cbd5e1 transparent transparent #cbd5e1; display: block; width: 0; }
        .uploaded-doc:hover { transform: scale(1.2) translateY(-5px); }
        .uploaded-doc span { font-size: 9px; font-weight: bold; color: #0f1117; z-index: 2; text-transform: uppercase;}
        
        .shredder-box { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 80px; height: 30px; background: #222; border: 2px solid #444; border-radius: 5px; z-index: 20; opacity: 0; transition: 0.3s; display: flex; justify-content: center;}
        .shredder-box.active { opacity: 1; bottom: 20%; }
        .shredder-slot { width: 60px; height: 6px; background: #000; margin-top: 5px; border-radius: 3px; box-shadow: inset 0 0 5px black;}
        .shredding { animation: shredDoc 1.5s forwards ease-in !important; pointer-events: none;}
        @keyframes shredDoc { 0% { top: 50%; transform: translate(-50%, -50%) scale(1); opacity: 1;} 40% { top: 75%; transform: translate(-50%, -50%) scale(0.8); opacity: 1;} 100% { top: 85%; transform: translate(-50%, -20%) scale(0.8); opacity: 0; height: 0;} }

        /* MÜHÜR EFEKTİ */
        .stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(5); opacity: 0; pointer-events: none; z-index: 1000; font-size: 60px; color: #ef4444; border: 6px solid #ef4444; padding: 10px 20px; border-radius: 15px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,0,0,0.5); font-family: Impact, sans-serif; }
        .stamp.animate { animation: stampIn 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes stampIn { to { transform: translate(-50%, -50%) scale(1) rotate(-15deg); opacity: 0.9; } }
        .shake { animation: shakeScreen 0.4s; }
        @keyframes shakeScreen { 0%,100%{transform:translate(0,0);} 20%{transform:translate(-2px,0);} 40%{transform:translate(2px,-2px);} 60%{transform:translate(-2px,2px);} 80%{transform:translate(2px,2px);} }

        /* ALT PANEL (GİRİŞ VE PTT TUŞU) */
        .input-area { background: var(--bg-panel); backdrop-filter: blur(20px); border-top: 1px solid var(--border-glass); padding: 15px; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; position: relative;}
        
        .standard-inputs { display: flex; width: 100%; gap: 8px; align-items: center; justify-content: center;}
        .file-label { cursor: pointer; font-size: 16px; opacity: 0.7; transition: 0.2s;} .file-label:hover { opacity: 1; }
        .chat-input { width: 100%; max-width: 600px; background: #010409; border: 1px solid var(--border-glass); color: white; padding: 12px 15px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        .chat-input:focus { border-color: var(--c-user); }
        .send-btn { background: var(--c-user); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 12px; text-transform: uppercase;}
        
        /* CANLI MÜZAKERE BUTONU (BAS-KONUŞ) */
        .ptt-container { display: none; width: 100%; justify-content: center; margin-top: 5px;}
        .ptt-btn { width: 100%; max-width: 500px; background: #c255ff; color: white; border: none; padding: 18px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(194, 85, 255, 0.4); transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;}
        .ptt-btn.recording { background: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); transform: scale(0.98); }

        /* MODALLAR */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.3s; padding: 15px; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: #0f1117; width: 100%; max-width: 600px; border-radius: 12px; border: 1px solid var(--border-glass); padding: 25px; position: relative; max-height: 85dvh; overflow-y: auto;}
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-glass); }
        .modal-body { font-size: 13px; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; font-family: monospace; }
        .project-item { background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;}
        .project-title { font-weight: bold; color: var(--c-user); font-size: 15px; margin-bottom: 5px;}
        
        #pdf-container { display: none; background: white; color: black; padding: 40px; font-family: Arial, sans-serif; }

        @media (max-width: 768px) {
            .header-panel { padding: 8px; gap: 6px; } .info-card { display: none; } 
            .table-wrapper { aspect-ratio: 1 / 1.4; transform: rotateX(10deg); max-width: 320px;} 
            .board-table { border-width: 6px; } 
            .center-speaker .node-icon { width: 50px; height: 50px; font-size: 20px;}
            .ptt-btn { padding: 15px; font-size: 14px;}
        }
    </style>
</head>
<body>

    <div class="rain-container" id="rain-container"></div>

    <div id="main-app">
        <div class="stamp" id="stamp">ONAYLANDI</div>

        <div class="header-panel">
            <div class="header-left">
                <button class="projects-btn" onclick="openProjects()">📂 Projelerim</button>
                <button class="live-btn" id="btn-live-debate" onclick="toggleLiveDebate()">🗣️ Canlı Müzakere</button>
                <button class="tools-btn" id="board-toggle-btn" onclick="toggleBoardMode()">🪵 Ahşap Masa</button>
                
                <select class="board-select" id="boardType">
                    <option value="genel">Genel Strateji</option>
                    <option value="hukuk">Hukuk & Güvenlik</option>
                    <option value="pazarlama">Pazarlama</option>
                </select>
                <label class="night-checkbox"><input type="checkbox" id="nightModu" onchange="toggleNightMode()">🌙 GECE</label>
                <label class="relax-checkbox"><input type="checkbox" id="relaxModu" onchange="toggleRelaxMode()">☕ SAKİN</label>
            </div>
            
            <div class="info-card">
                <div class="info-label" style="color: #fbbf24;">Gündem: <span id="ui-topic" style="color:#fff; font-weight:normal;">Bekleniyor</span></div>
                <div class="vote-highlight" id="ui-vote-title">Modeller bekleniyor...</div>
            </div>

            <div class="vote-actions">
                <button class="btn btn-yes" id="btn-y" disabled onclick="userVote(true)">Onayla</button>
                <button class="btn btn-no" id="btn-n" disabled onclick="rejectWithShredder()">Reddet</button>
                <button class="btn btn-pdf" id="btn-pdf" onclick="downloadPDF()">📄 PDF</button>
            </div>
        </div>

        <div class="stage">
            <div class="system-status" id="ui-status">Sistem Hazır. Gündemi Belirleyin.</div>
            
            <div class="table-wrapper" id="table-wrapper">
                <div class="board-table">
                    
                    <div class="laser-container" id="lasers">
                        <div class="laser-line ll-openai"></div>
                        <div class="laser-line ll-gemini"></div>
                        <div class="laser-line ll-claude"></div>
                        <div class="laser-line ll-user"></div>
                    </div>

                    <div class="uploaded-doc" id="uploaded-doc" onclick="openDoc('Uploaded')">
                        <span id="uploaded-ext">TXT</span>
                    </div>

                    <div class="holo-center" id="holo-center">
                        <div class="holo-core" id="holo-core"></div>
                        
                        <div id="center-speaker" class="center-speaker">
                            <div class="node-icon" id="center-speaker-icon">O</div>
                            <div class="node-name" id="center-speaker-name">OpenAI</div>
                        </div>

                        <div class="doc d-openai" id="doc-openai" onclick="openDoc('OpenAI')">📄</div>
                        <div class="doc d-gemini" id="doc-gemini" onclick="openDoc('Gemini')">📄</div>
                        <div class="doc d-claude" id="doc-claude" onclick="openDoc('Claude')">📄</div>
                        <div class="master-doc" id="doc-master" onclick="openDoc('Ortak Karar')">📁</div>
                    </div>
                    
                    <div class="shredder-box" id="shredder-box"><div class="shredder-slot"></div></div>
                    
                    <div class="node n-openai" id="ai-openai"><div class="node-icon">O</div><div class="node-name">OpenAI</div></div>
                    <div class="node n-gemini" id="ai-gemini"><div class="node-icon">G</div><div class="node-name">Gemini</div></div>
                    <div class="node n-claude" id="ai-claude"><div class="node-icon">C</div><div class="node-name">Claude</div></div>
                    <div class="node n-user" id="ai-user"><div class="node-icon">👤</div><div class="node-name">Sen</div></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="standard-inputs" id="standard-inputs">
                <label class="file-label" title="Belge Yükle">📎 <input type="file" id="file-upload" accept=".txt,.csv,.json" hidden onchange="handleFileUpload(event)"></label>
                <input type="text" class="chat-input" id="topic-input" placeholder="Gündemi yazın..." onkeypress="if(event.key==='Enter') triggerSend()">
                <button class="send-btn" id="send-btn" onclick="triggerSend()">Kurulu Topla</button>
            </div>
            
            <div class="ptt-container" id="ptt-container">
                <button id="ptt-btn" class="ptt-btn" onmousedown="startPTT(event)" onmouseup="stopPTT(event)" ontouchstart="startPTT(event)" ontouchend="stopPTT(event)">
                    🎙️ Basılı Tut ve Konuş
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="doc-modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('doc-modal')">&times;</span><div class="modal-title" id="modal-title">Başlık</div><div class="modal-body" id="modal-text" style="white-space: pre-wrap;">İçerik...</div></div></div>
    <div class="modal" id="projects-modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('projects-modal')">&times;</span><div class="modal-title" style="color:var(--c-user)">📂 Onaylanmış Projelerim</div><div id="projects-list" style="max-height: 400px; overflow-y: auto;">Kayıt yok.</div></div></div>
    <div id="pdf-container"><h1>Yönetim Kurulu Karar Tutanağı</h1><p><strong>Tarih:</strong> <span id="pdf-date"></span></p><p><strong>Gündem:</strong> <span id="pdf-topic"></span></p><h3>Karar: <span id="pdf-title" style="color:#d97706;"></span></h3><h3>Aksiyon Planı:</h3><p id="pdf-decision"></p></div>

    <script>
        const database = { 'OpenAI': '', 'Gemini': '', 'Claude': '', 'Ortak Karar': '', 'Münazara': '', 'Topic': '', 'Score': ''};
        const aiNodes = ['openai', 'gemini', 'claude', 'user'];
        let uploadedFileText = "";
        let uploadedFileName = "";
        let uploadedFileExt = "";

        // SES VE MÜZAKERE DEĞİŞKENLERİ
        let isLiveMode = false;
        let isRecording = false;
        let conversationHistory = [];
        let synthVoice = window.speechSynthesis;
        let nativeTurkishVoice = null;
        let currentDialogueQueue = [];
        let recognition;
        let finalPttText = "";

        const colors = { 'openai': '#10a37f', 'claude': '#d97757', 'gemini': '#c255ff', 'user': '#38bdf8' };
        const icons = { 'openai': 'O', 'claude': 'C', 'gemini': 'G', 'user': '👤' };
        const displayNames = { 'openai': 'OpenAI', 'claude': 'Claude', 'gemini': 'Gemini', 'user': 'Sen' };

        let lofiAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3'); lofiAudio.loop = true;

        // --- DOĞAL TÜRKÇE SES BULUCU ---
        function setTurkishVoice() {
            let voices = synthVoice.getVoices();
            nativeTurkishVoice = voices.find(v => v.lang.includes('tr') && v.name.includes('Google')) || 
                                 voices.find(v => v.lang.includes('tr') && v.name.includes('Microsoft')) || 
                                 voices.find(v => v.lang === 'tr-TR' || v.lang === 'tr_TR');
        }
        window.onload = () => { setTurkishVoice(); if (synthVoice.onvoiceschanged !== undefined) { synthVoice.onvoiceschanged = setTurkishVoice; } };

        function toggleBoardMode() { document.getElementById('table-wrapper').classList.toggle('wood-mode'); document.getElementById('board-toggle-btn').classList.toggle('active'); }
        function toggleNightMode() { if(document.getElementById('nightModu').checked) { document.body.classList.add('night-mode'); } else { document.body.classList.remove('night-mode'); } }
        function toggleRelaxMode() { 
            if(document.getElementById('relaxModu').checked) { 
                document.body.classList.add('relax-mode'); lofiAudio.play();
                const rc = document.getElementById('rain-container'); rc.innerHTML = '';
                for(let i=0; i<40; i++) { let d = document.createElement('div'); d.className='rain-drop'; d.style.left = Math.random()*100 + '%'; d.style.animationDuration = (Math.random()*0.5 + 0.5) + 's'; d.style.animationDelay = Math.random() + 's'; rc.appendChild(d); }
            } else { 
                document.body.classList.remove('relax-mode'); lofiAudio.pause(); document.getElementById('rain-container').innerHTML = ''; 
            } 
        }

        // --- DIŞ CEPHE DOSYA YÜKLEME ---
        function handleFileUpload(event) { 
            const file = event.target.files[0]; 
            if (!file) return; 
            uploadedFileName = file.name;
            uploadedFileExt = uploadedFileName.split('.').pop().toUpperCase().substring(0,4);
            
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                uploadedFileText = e.target.result; 
                document.getElementById('uploaded-ext').innerText = uploadedFileExt;
                document.getElementById('uploaded-doc').style.display = 'flex'; 
                alert("Belge dış cepheye yerleştirildi.");
            }; 
            reader.readAsText(file); 
        }

        // --- MERKEZ AVATAR GÖSTERİMİ ---
        function showCenterSpeaker(id) {
            let center = document.getElementById('center-speaker');
            let icon = document.getElementById('center-speaker-icon');
            let name = document.getElementById('center-speaker-name');
            
            document.getElementById('holo-core').style.display = 'none';
            aiNodes.forEach(n => { let el = document.getElementById('ai-' + n); if(el) el.classList.remove('hidden-node'); });
            
            let activeNode = document.getElementById('ai-' + id);
            if(activeNode) activeNode.classList.add('hidden-node'); 

            icon.innerText = icons[id]; name.innerText = displayNames[id];
            center.style.color = colors[id]; icon.style.borderColor = colors[id];
            center.style.display = 'flex';
        }
        function hideCenterSpeaker() {
            document.getElementById('center-speaker').style.display = 'none';
            aiNodes.forEach(n => { let el = document.getElementById('ai-' + n); if(el) el.classList.remove('hidden-node'); });
        }

        // --- CANLI MÜZAKERE MODU (TOGGLE) ---
        function toggleLiveDebate() {
            isLiveMode = !isLiveMode;
            let btn = document.getElementById('btn-live-debate');
            let input = document.getElementById('topic-input');
            let sendBtn = document.getElementById('send-btn');
            
            if(isLiveMode) {
                let unlockAudio = new SpeechSynthesisUtterance(' '); unlockAudio.volume = 0; synthVoice.speak(unlockAudio);
                
                btn.classList.add('active'); btn.innerText = "🛑 Toplantıyı Bitir";
                document.getElementById('standard-inputs').style.display = 'none';
                document.getElementById('ptt-container').style.display = 'flex';
                
                document.getElementById('ui-status').innerText = "CANLI SESLİ TOPLANTI AKTİF. LÜTFEN KONUŞUN.";
                conversationHistory = []; 
                ['doc-openai', 'doc-gemini', 'doc-claude', 'doc-master'].forEach(id => document.getElementById(id).classList.remove('visible'));
            } else {
                btn.classList.remove('active'); btn.innerText = "🗣️ Canlı Müzakere";
                document.getElementById('standard-inputs').style.display = 'flex';
                document.getElementById('ptt-container').style.display = 'none';
                document.getElementById('ui-status').innerText = "Sistem Hazır. Gündemi Belirleyin.";
                synthVoice.cancel();
                hideCenterSpeaker();
            }
        }

        // --- SES KAYIT / BAS-KONUŞ (PTT) ---
        function initSpeech() {
            if (!('webkitSpeechRecognition' in window)) { alert("Tarayıcınız desteklemiyor (Chrome kullanın)."); return false; }
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'tr-TR'; recognition.interimResults = true; recognition.continuous = true;
            recognition.onresult = (event) => {
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalPttText += event.results[i][0].transcript + " ";
                    else interimText += event.results[i][0].transcript;
                }
                document.getElementById('topic-input').value = finalPttText + interimText;
            };
            recognition.onerror = (e) => { stopPTT(); };
            recognition.onend = () => {
                if (finalPttText.trim().length > 0) sendLiveMessage(finalPttText);
                else {
                    let typedText = document.getElementById('topic-input').value;
                    if(typedText.trim().length > 0) sendLiveMessage(typedText);
                    else { document.getElementById('ptt-btn').innerText = "🎙️ Basılı Tut ve Konuş"; document.getElementById('ptt-btn').classList.remove('recording'); hideCenterSpeaker(); }
                }
            };
            return true;
        }

        function startPTT(e) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            if(isRecording) return;

            if(synthVoice.speaking) { synthVoice.cancel(); currentDialogueQueue = []; document.getElementById('ui-status').innerText = "SÖZ KESİLDİ. SİZİ DİNLİYORUM..."; }
            if(!recognition) { if(!initSpeech()) return; }

            finalPttText = ""; document.getElementById('topic-input').value = "";
            isRecording = true;
            document.getElementById('ptt-btn').classList.add('recording');
            document.getElementById('ptt-btn').innerText = "🎙️ Dinliyorum... (Konuşun)";
            showCenterSpeaker('user');

            try { recognition.start(); } catch(err) {}
        }

        function stopPTT(e) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            if(!isRecording) return;
            isRecording = false;

            document.getElementById('ptt-btn').classList.remove('recording');
            document.getElementById('ptt-btn').innerText = "⏳ Sesiniz İşleniyor...";
            try { recognition.stop(); } catch(err) {}
        }

        function triggerSend() {
            if(isLiveMode) {
                let text = document.getElementById('topic-input').value;
                if(text.trim().length > 0) sendLiveMessage(text);
            } else {
                startProcess();
            }
        }

        // --- SESLİ CEVAP ÜRETTİRME (API) ---
        async function sendLiveMessage(text) {
            if(!text || text.trim() === "") { document.getElementById('ptt-btn').innerText = "🎙️ Basılı Tut ve Konuş"; hideCenterSpeaker(); return; }
            
            document.getElementById('ui-status').innerText = "YAPAY ZEKALAR TARTIŞIYOR...";
            hideCenterSpeaker(); 
            document.getElementById('holo-core').style.display = 'block';
            document.getElementById('lasers').style.display = 'block'; 

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: text, isLiveDebate: true, history: conversationHistory })
                });

                if (!response.ok) throw new Error("API Yanıt Vermedi");
                const data = await response.json();
                
                document.getElementById('holo-core').style.display = 'none';
                document.getElementById('lasers').style.display = 'none'; 
                
                conversationHistory.push({role: "Başkan", text: text});
                document.getElementById('topic-input').value = ''; 
                
                if(data.liveDialogue && data.liveDialogue.length > 0) {
                    currentDialogueQueue = data.liveDialogue;
                    playNextDebateLine(); 
                } else {
                    document.getElementById('ptt-btn').innerText = "🎙️ Basılı Tut ve Konuş";
                }
            } catch(e) {
                console.error(e); 
                document.getElementById('ui-status').innerText = "HATA OLUŞTU.";
                document.getElementById('ptt-btn').innerText = "🎙️ Basılı Tut ve Konuş"; 
                document.getElementById('holo-core').style.display = 'none';
                document.getElementById('lasers').style.display = 'none';
            }
        }

        function playNextDebateLine() {
            if(currentDialogueQueue.length === 0) {
                document.getElementById('ui-status').innerText = "SIRA SİZDE. KONUŞABİLİRSİNİZ.";
                document.getElementById('ptt-btn').innerText = "🎙️ Basılı Tut ve Konuş";
                hideCenterSpeaker(); return;
            }

            let line = currentDialogueQueue.shift();
            if(!line.text) { playNextDebateLine(); return; }

            let speakerId = line.speaker ? line.speaker.toLowerCase() : 'openai'; 
            conversationHistory.push({role: speakerId, text: line.text});
            
            document.getElementById('ui-status').innerText = `${displayNames[speakerId]} KONUŞUYOR...`;
            showCenterSpeaker(speakerId);

            let utterance = new SpeechSynthesisUtterance(line.text);
            utterance.lang = 'tr-TR';
            
            if(nativeTurkishVoice) { utterance.voice = nativeTurkishVoice; }
            
            if(speakerId === 'claude') { utterance.pitch = 0.9; utterance.rate = 1.0; }
            else if(speakerId === 'gemini') { utterance.pitch = 1.1; utterance.rate = 1.05; }
            else { utterance.pitch = 1.0; utterance.rate = 1.0; }

            utterance.onend = () => { playNextDebateLine(); }; 
            utterance.onerror = (e) => { playNextDebateLine(); }; 
            
            synthVoice.speak(utterance);
        }

        // --- STANDART KURUL MODU (%100 KESİNTİSİZ ŞOV) ---
        async function startProcess(isRevision = false, revNote = "") {
            if(isLiveMode) return;

            let fullText = document.getElementById('topic-input').value;
            if (!isRevision && (!fullText.trim() || fullText.trim().length < 2)) {
                alert("Lütfen geçerli bir konu yazın."); return;
            }
            if (!isRevision) database['Topic'] = fullText;

            document.getElementById('ui-topic').innerText = "Özetleniyor..."; 
            document.getElementById('ui-vote-title').innerText = "Analiz ediliyor...";
            if(!isRevision) document.getElementById('topic-input').value = '';
            
            // Temizlik
            document.querySelectorAll('.doc, .master-doc').forEach(el => el.classList.remove('visible'));
            ['btn-y','btn-n','btn-rev'].forEach(id => document.getElementById(id).disabled = true);
            document.getElementById('btn-pdf').style.display = 'none';

            // EFEKTLER KESİN BAŞLAR
            aiNodes.forEach(id => { let el = document.getElementById('ai-' + id); if(el) el.classList.add('thinking'); });
            document.getElementById('holo-core').style.display = 'block'; 
            document.getElementById('lasers').style.display = 'block'; 
            document.getElementById('ui-status').innerText = "Yapay Zeka Kurulu Analiz Yapıyor...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        topic: database['Topic'], 
                        boardType: document.getElementById('boardType').value,
                        fileText: uploadedFileText, 
                        revisionNote: revNote, 
                        isCrisis: document.getElementById('krizModu').checked, 
                        isNight: document.getElementById('nightModu').checked,
                        isLiveDebate: false
                    })
                });

                if (!response.ok) throw new Error("API Anahtarları Eksik veya Sunucu Yanıt Vermedi.");
                const data = await response.json();

                database['OpenAI'] = data.openai || "Yanıt alınamadı."; 
                database['Gemini'] = data.gemini || "Yanıt alınamadı."; 
                database['Claude'] = data.claude || "Yanıt alınamadı.";
                database['Münazara'] = data.debate || "Münazara yapılamadı."; 
                database['Ortak Karar'] = data.masterDecision || "Karar alınamadı."; 
                database['Title'] = data.masterTitle || "Sentez Raporu";
                database['Score'] = data.score || "85"; 

            } catch (error) {
                console.error(error); 
                // HATA OLSA BİLE SİSTEM ÇÖKMEZ, GÖRSEL ŞOV DEVAM EDER
                database['OpenAI'] = "Sistem Hatası: " + error.message; 
                database['Gemini'] = "Sistem Hatası: " + error.message; 
                database['Claude'] = "Sistem Hatası: " + error.message;
                database['Münazara'] = "Hata oluştu."; 
                database['Ortak Karar'] = "API bağlantısı kurulamadığı için karar oluşturulamadı. Lütfen Vercel ayarlarınızı kontrol edin."; 
                database['Title'] = "SİSTEM BAĞLANTI HATASI";
                database['Score'] = "0"; 
            }

            // EFEKTLERİ DURDUR
            document.getElementById('holo-core').style.display = 'none'; 
            document.getElementById('lasers').style.display = 'none';
            aiNodes.forEach(id => { let el = document.getElementById('ai-' + id); if(el) el.classList.remove('thinking'); });
            
            // DOSYALARI MASAYA KOY
            ['doc-openai', 'doc-gemini', 'doc-claude'].forEach(id => document.getElementById(id).classList.add('visible'));
            
            if (database['Title'] !== "SİSTEM BAĞLANTI HATASI") {
                document.getElementById('ui-status').innerText = "Raporlar ulaştı. Karar sentezleniyor...";
                document.getElementById('ui-topic').innerText = database['Topic'].substring(0, 20) + "...";
            } else {
                document.getElementById('ui-status').innerText = "HATA OLUŞTU (Sahte veri gösteriliyor).";
            }
            
            setTimeout(() => {
                document.getElementById('doc-master').classList.remove('shredding'); 
                document.getElementById('doc-master').classList.add('visible');
                
                if (database['Title'] !== "SİSTEM BAĞLANTI HATASI") {
                    document.getElementById('ui-status').innerText = "Aksiyon planı hazır. Karar sizin.";
                }
                document.getElementById('ui-vote-title').innerText = database['Title'];
                
                let scoreUI = document.getElementById('ui-score');
                scoreUI.innerText = `Verim: %${database['Score']}`; scoreUI.style.display = 'block';
                ['btn-y','btn-n','btn-rev'].forEach(id => document.getElementById(id).disabled = false);
            }, 1500);
        }

        // --- ÖĞÜTÜCÜ VE TEMİZLİK ---
        function rejectWithShredder() {
            document.getElementById('ui-status').innerText = "KARAR REDDEDİLDİ. Dosya imha ediliyor...";
            document.getElementById('ui-vote-title').innerText = "Plan Çöpe Atıldı.";
            ['btn-y','btn-n','btn-rev'].forEach(id => document.getElementById(id).disabled = true);
            document.getElementById('btn-pdf').style.display = 'none';
            document.getElementById('ui-score').style.display = 'none';
            
            ['doc-openai', 'doc-gemini', 'doc-claude'].forEach(id => document.getElementById(id).classList.remove('visible'));
            document.getElementById('uploaded-doc').style.display = 'none'; 
            uploadedFileText = ""; 

            document.getElementById('shredder-box').classList.add('active');
            let masterDoc = document.getElementById('doc-master'); masterDoc.classList.add('shredding');
            
            setTimeout(() => {
                masterDoc.classList.remove('visible'); masterDoc.classList.remove('shredding');
                document.getElementById('shredder-box').classList.remove('active');
                document.getElementById('ui-status').innerText = "Masa Temizlendi. YENİ GÜNDEM BEKLENİYOR.";
            }, 1800);
        }

        function openDoc(owner) {
            let content = "";
            if(owner === 'Uploaded') {
                document.getElementById('modal-title').style.color = "#38bdf8"; 
                document.getElementById('modal-title').innerText = "Eklenen Dosya: " + uploadedFileName;
                document.getElementById('modal-text').innerText = uploadedFileText;
                document.getElementById('doc-modal').classList.add('show');
                return;
            }
            
            content = database[owner];
            if(owner === 'Ortak Karar') {
                document.getElementById('modal-title').style.color = "#fbbf24"; document.getElementById('modal-title').innerText = "Ortak Karar Dosyası";
                let textToType = "MÜNAZARA:\n" + database['Münazara'] + "\n\nAKSİYON PLANI:\n" + content;
                let el = document.getElementById('modal-text'); el.innerHTML = ""; let i = 0;
                clearInterval(window.typeInterval); 
                window.typeInterval = setInterval(() => {
                    if(i < textToType.length) { el.innerHTML += textToType.charAt(i) === '\n' ? '<br>' : textToType.charAt(i); i++;
                    } else { clearInterval(window.typeInterval); }
                }, 30); 
            } else {
                document.getElementById('modal-title').style.color = "#fff"; document.getElementById('modal-text').innerText = content;
                document.getElementById('modal-title').innerText = owner + " Dosyası";
            }
            document.getElementById('doc-modal').classList.add('show');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); clearInterval(window.typeInterval); }

        function saveToProjects() {
            let history = JSON.parse(localStorage.getItem('aiBoardProjects')) || [];
            history.unshift({ date: new Date().toLocaleString('tr-TR'), topic: database['Topic'], title: database['Title'], decision: database['Ortak Karar'] });
            localStorage.setItem('aiBoardProjects', JSON.stringify(history));
        }
        function openProjects() {
            let history = JSON.parse(localStorage.getItem('aiBoardProjects')) || []; let html = "";
            if(history.length === 0) html = "Henüz onaylanmış bir projeniz yok.";
            else { history.forEach(item => { html += `<div class="project-item"><div class="project-title">${item.title}</div><div class="project-date">🗓️ ${item.date} | 📌 ${item.topic}</div><div style="font-size:12px; color:#cbd5e1;">${item.decision.substring(0, 100)}...</div></div>`; }); }
            document.getElementById('projects-list').innerHTML = html; document.getElementById('projects-modal').classList.add('show');
        }

        function requestRevision() { const note = prompt("Hangi kısmı düzeltelim?"); if(note) startProcess(true, note); }

        function userVote(isYes) {
            if(isYes) {
                document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 400);
                let s = document.getElementById('stamp'); s.classList.add('animate'); setTimeout(() => s.classList.remove('animate'), 2000);
                document.getElementById('ui-status').innerText = "KARAR ONAYLANDI VE PROJELERE EKLENDİ.";
                document.getElementById('btn-pdf').style.display = 'inline-block';
                saveToProjects();
            }
            document.getElementById('doc-master').classList.remove('visible');
            document.getElementById('uploaded-doc').style.display = 'none'; 
            uploadedFileText = "";
            ['btn-y','btn-n','btn-rev'].forEach(id => document.getElementById(id).disabled = true);
        }

        function downloadPDF() {
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('tr-TR');
            document.getElementById('pdf-topic').innerText = database['Topic'];
            document.getElementById('pdf-title').innerText = database['Title'];
            document.getElementById('pdf-decision').innerText = database['Ortak Karar'];
            const element = document.getElementById('pdf-container'); element.style.display = 'block';
            html2pdf().from(element).set({ margin: 1, filename: 'Proje_Raporu.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } }).save().then(() => element.style.display = 'none');
        }
    </script>
</body>
</html>
