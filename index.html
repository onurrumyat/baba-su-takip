<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Chef Pro | VIP Ultimate Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdOeigm877SXMe7mMtuEMPUeGkY9WcgyIJPbzGJU2HP1CS_eaGcn4O0FnUEoB3JFmDXEHSnxx5Do-pIN&currency=USD&components=buttons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* TASARIM DEĞİŞKENLERİ */
        :root { 
            --bg: #0b1120; 
            --card: #1e293b; 
            --primary: #10b981; 
            --accent: #3b82f6; 
            --premium: #fbbf24; 
            --text: #f8fafc; 
            --danger: #ef4444; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 15px;
            overflow-x: hidden;
        }

        /* ANA KAPSAYICI */
        .app-card { 
            width: 100%; 
            max-width: 450px; 
            background: var(--card); 
            border-radius: 40px; 
            padding: 25px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            height: fit-content;
        }

        /* DASHBOARD SİSTEMİ */
        .dashboard-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(15, 23, 42, 0.6); 
            padding: 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }
        .dash-item { text-align: center; }
        .dash-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .dash-val { font-size: 1.5rem; font-weight: 900; }
        .avatar-box { font-size: 2.5rem; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* VIP GELECEK KEHANETİ KUTUSU */
        .prediction-teaser {
            background: linear-gradient(45deg, rgba(251, 191, 36, 0.1), rgba(16, 185, 129, 0.1));
            border: 1px solid var(--premium);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .prediction-teaser:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.1); }
        .pred-title { font-size: 0.8rem; font-weight: 900; color: var(--premium); text-transform: uppercase; letter-spacing: 1.5px; }

        /* SKOR ÇUBUĞU VE MARKER (📍) */
        .score-container { margin: 25px 0; width: 100%; position: relative; }
        .score-track { 
            height: 14px; width: 100%; border-radius: 10px; 
            background: linear-gradient(to right, #ef4444, #f97316, #fbbf24, #10b981); 
            position: relative; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .score-marker { 
            position: absolute; 
            top: -10px; 
            width: 34px; 
            height: 34px; 
            background: #fff; 
            border: 4px solid var(--bg); 
            border-radius: 50%; 
            transform: translateX(-50%); 
            transition: left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.9rem; 
            font-weight: 900; 
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 5;
        }
        .score-marker::after { content: '📍'; position: absolute; bottom: -25px; font-size: 1.2rem; }

        /* ANALİZ KARTLARI */
        .report-card { 
            background: rgba(30, 41, 59, 0.8); 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 15px; 
            border-left: 5px solid var(--accent);
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .report-header { font-size: 0.75rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        .report-body { font-size: 0.95rem; line-height: 1.6; color: #e2e8f0; white-space: pre-line; }

        /* VIP KİLİT SİSTEMİ */
        .locked-content { filter: blur(8px); opacity: 0.3; pointer-events: none; user-select: none; }
        .lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .lock-badge { background: var(--premium); color: #000; padding: 8px 16px; border-radius: 12px; font-weight: 900; font-size: 0.75rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }

        /* FORM ELEMANLARI */
        .camera-preview { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 30px; overflow: hidden; border: 2px solid #334155; margin-bottom: 20px; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        input, select { width: 100%; padding: 16px; border-radius: 18px; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 12px; text-align: center; font-size: 1rem; font-weight: 600; }
        .main-btn { width: 100%; padding: 22px; border-radius: 22px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; color: white; }
        .btn-analyze { background: var(--primary); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .btn-analyze:active { transform: scale(0.95); }

        /* BİLDİRİM VE SERİ */
        .top-status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .streak-tag { background: rgba(249, 115, 22, 0.1); border: 1px solid #f97316; color: #f97316; padding: 8px 15px; border-radius: 50px; font-weight: 900; font-size: 0.85rem; }
        .notif-bell { position: relative; cursor: pointer; width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .notif-dot { position: absolute; top: 0; right: 0; background: var(--danger); width: 18px; height: 18px; border-radius: 50%; color: white; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* POPUP VE DROPDOWN */
        .notif-menu { display: none; position: absolute; top: 60px; right: 0; width: 280px; background: #1e293b; border-radius: 20px; padding: 15px; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="app-card">

    <div class="top-status-bar">
        <div id="streakDisplay" style="display:none;" class="streak-tag">🔥 <span id="streakNum">0</span> GÜN SERİ</div>
        <div class="notif-bell" onclick="toggleNotifs()">
            🔔 <span id="notifBadge" style="display:none;" class="notif-dot">0</span>
            <div id="notifBox" class="notif-menu">
                <h4 style="margin-bottom:10px; font-size:0.9rem;">Bildirimler</h4>
                <div id="notifItems" style="max-height: 200px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="view-auth">
        <h1 style="text-align:center; color:var(--primary); font-size: 2.8rem; font-weight: 900; margin-bottom: 30px;">BIO-CHEF</h1>
        
        <div id="login-section">
            <input type="email" id="email-in" placeholder="E-posta">
            <input type="password" id="pass-in" placeholder="Şifre">
            <button class="main-btn btn-analyze" onclick="handleLogin()">GİRİŞ YAP</button>
            <p onclick="toggleAuth(true)" style="text-align:center; margin-top:20px; font-size:0.9rem; color:var(--accent); cursor:pointer; font-weight:700;">Hesabın yok mu? Kayıt Ol</p>
        </div>

        <div id="register-section" style="display:none;">
            <input type="text" id="reg-nick" placeholder="Benzersiz Kullanıcı Adı">
            <input type="email" id="reg-email" placeholder="E-posta Adresi">
            <input type="password" id="reg-pass" placeholder="Güçlü Bir Şifre">
            <button class="main-btn" style="background:var(--accent);" onclick="handleRegister()">KAYIT OL</button>
            <p onclick="toggleAuth(false)" style="text-align:center; margin-top:20px; font-size:0.9rem; cursor:pointer;">Vazgeç ve Geri Dön</p>
        </div>
    </div>

    <div id="view-main" style="display:none;">
        
        <div class="dashboard-bar">
            <div class="dash-item">
                <div class="dash-label">GÜNLÜK ORT.</div>
                <div id="val-avg" class="dash-val" style="color:var(--primary);">-</div>
            </div>
            <div class="dash-item" style="flex:1;">
                <div id="live-clock" style="font-size: 1.4rem; font-weight: 900; color: var(--accent);">00:00:00</div>
                <div id="user-display" style="font-size: 0.8rem; font-weight: 800; color:var(--primary); margin-top:5px;">@user</div>
            </div>
            <div class="dash-item">
                <div class="dash-label">AVATARIN</div>
                <div id="val-avatar" class="avatar-box">👤</div>
            </div>
        </div>

        <div class="prediction-teaser" onclick="scrollToVip()">
            <div class="pred-title">🔮 24 SAATLİK BİYOLOJİK FALIN</div>
            <div id="pred-status-text" style="font-size:0.85rem; color:#cbd5e1; margin-top:5px;">Analiz bekleniyor...</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <input type="number" id="in-age" placeholder="YAŞIN">
            <input type="number" id="in-weight" placeholder="KİLON">
        </div>
        <select id="in-goal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>

        <div class="camera-preview">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <button class="main-btn btn-analyze" onclick="startAnalysis()">📸 ANALİZ ET VE FALIMA BAK</button>

        <div id="analysis-results" style="display:none; flex-direction: column; margin-top: 30px;"></div>

        <div id="vip-panel" style="margin-top:40px; background:rgba(251, 191, 36, 0.05); padding:25px; border-radius:30px; border:2px solid var(--premium); text-align:center;">
            <h2 style="color:var(--premium); margin-bottom:10px;">PREMIUM ÜYELİK</h2>
            <p style="font-size:0.9rem; color:#94a3b8; margin-bottom:20px;">24 Saatlik Kehanetler ve Haftalık Planlar için sadece 0.99$</p>
            <div id="paypal-button-container"></div>
        </div>

        <button class="main-btn" style="background:var(--danger); margin-top:25px; font-size:0.9rem;" onclick="togglePartnerArena()">👫 KANKA / ÇİFT ARENASI</button>
        <div id="partner-arena" style="display:none; margin-top:15px; padding:20px; border:1px dashed var(--danger); border-radius:25px; background: rgba(239, 68, 68, 0.05);">
            <input type="text" id="friend-nick" placeholder="Arkadaşının Kullanıcı Adı">
            <button class="main-btn" style="padding:12px; font-size:0.8rem; background:var(--accent);" onclick="sendRequest()">TAKİP İSTEĞİ GÖNDER</button>
            <div id="friend-data-res" style="margin-top:15px; font-weight:800; color:var(--danger); text-align:center;"></div>
        </div>

        <button onclick="handleLogout()" style="width:100%; margin-top:40px; background:none; border:none; color:#64748b; font-weight:700; cursor:pointer;">GÜVENLİ ÇIKIŞ YAP</button>
    </div>

</div>

<script>
    // --- TEMEL SİSTEM AYARLARI ---
    const firebaseConfig = {
        apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
        authDomain: "voice2post-9e8ca.firebaseapp.com",
        projectId: "voice2post-9e8ca",
        storageBucket: "voice2post-9e8ca.firebasestorage.app",
        messagingSenderId: "511446656614",
        appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let isVipUser = false;

    // --- SAAT VE DASHBOARD GÜNCELLEME ---
    setInterval(() => { 
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); 
    }, 1000);

    // --- AUTH TAKİPÇİSİ ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-main').style.display = 'block';
            document.getElementById('user-display').innerText = "@" + (user.displayName || "şef");
            
            // VIP Durumu Kontrolü
            isVipUser = localStorage.getItem('isVip_' + user.uid) === 'true';
            if(isVipUser) {
                document.getElementById('vip-panel').style.display = 'none';
                document.getElementById('pred-status-text').innerHTML = "✨ Gelecek Enerjin Aktif! Tabağını Göster.";
            } else {
                renderPayPal();
                document.getElementById('pred-status-text').innerHTML = "🔒 Gelecek Kehanetin Kilitli! VIP Ol.";
            }

            loadDailyStats();
            updateStreakDisplay();
            startNotifListener();
            initCamera();
        } else {
            document.getElementById('view-auth').style.display = 'block';
            document.getElementById('view-main').style.display = 'none';
        }
    });

    // --- KAMERA BAŞLATMA ---
    function initCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('webcam').srcObject = stream; })
            .catch(err => console.log("Kamera hatası: ", err));
    }

    // --- ANALİZ VE AI MOTORU ---
    async function startAnalysis() {
        const resultsDiv = document.getElementById('analysis-results');
        const age = document.getElementById('in-age').value;
        const weight = document.getElementById('in-weight').value;
        
        if(!age || !weight) return alert("Lütfen yaş ve kilo bilgilerinizi girin!");

        resultsDiv.innerHTML = "<p style='text-align:center; padding:20px;'>🔮 Kehanet Kapıları Açılıyor, Bekleyin...</p>";
        resultsDiv.style.display = "flex";

        // Fotoğraf Yakala
        const video = document.getElementById('webcam');
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 480;
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        const base64Img = canvas.toDataURL('image/jpeg', 0.8);

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    mode: 'yemek', 
                    image: base64Img, 
                    user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('in-goal').value}`, 
                    lang: 'tr' 
                })
            });
            const data = await response.json();
            resultsDiv.innerHTML = "";

            // AI Yanıtını Parçala
            const parts = data.analysis.split(/\d\./).filter(p => p.trim().length > 5);
            const titles = ["SKOR ANALİZİ 🎯", "TOK TUTMA SÜRESİ ⏳", "ÜRÜN LİSTESİ", "BESİN DEĞERLERİ", "HEDEF UYUMU", "24 SAATLİK KEHANET 🔮", "SON TAVSİYE"];

            parts.forEach((content, index) => {
                const card = document.createElement('div');
                card.className = "report-card";

                // ÖZEL DURUM 1: SKOR ÇUBUĞU (0. İNDİS)
                if(index === 0) {
                    const scoreMatch = content.match(/\[SKOR:\s*(\d+)\]/);
                    if(scoreMatch) {
                        let scoreVal = parseInt(scoreMatch[1]);
                        let percentage = (scoreVal / 10) * 100;
                        card.innerHTML = `
                            <div class="report-header">${titles[index]}</div>
                            <div class="report-body">${content.replace(scoreMatch[0], '')}</div>
                            <div class="score-container">
                                <div class="score-track"><div class="score-marker" style="left:${percentage}%">${scoreVal}</div></div>
                            </div>
                        `;
                        saveScore(scoreVal);
                    }
                } 
                // ÖZEL DURUM 2: VIP GELECEK KEHANETİ (5. İNDİS)
                else if(index === 5) {
                    if(isVipUser) {
                        card.innerHTML = `<div class="report-header" style="color:var(--premium)">${titles[index]}</div><div class="report-body">${content}</div>`;
                    } else {
                        card.innerHTML = `
                            <div class="report-header">${titles[index]}</div>
                            <div class="lock-overlay">
                                <div class="lock-badge" onclick="scrollToVip()">🔒 VIP İLE KEHANETİ AÇ</div>
                            </div>
                            <div class="report-body locked-content">Bu yemekten 4 saat sonra enerjin nasıl olacak? Yarın sabah uyandığında aynada ne göreceksin? Sadece VIP üyeler geleceğini görebilir...</div>
                        `;
                    }
                }
                // GENEL DURUM
                else {
                    card.innerHTML = `<div class="report-header">${titles[index] || 'DETAY'}</div><div class="report-body">${content}</div>`;
                }
                resultsDiv.appendChild(card);
            });

            // Otomatik Kaydırma
            setTimeout(() => { resultsDiv.scrollIntoView({behavior: 'smooth'}); }, 300);

        } catch (err) {
            resultsDiv.innerHTML = "<p style='color:var(--danger); text-align:center;'>Hata! Lütfen tekrar deneyin.</p>";
        }
    }

    // --- MATEMATİKSEL ORTALAMA VE AVATAR MOTORU ---
    function saveScore(score) {
        let uid = auth.currentUser.uid;
        let today = new Date().toLocaleDateString();
        let stats = JSON.parse(localStorage.getItem('stats_' + uid) || '{"date":"","sum":0,"count":0}');
        
        if(stats.date !== today) stats = { date: today, sum: 0, count: 0 };
        
        stats.sum += parseFloat(score);
        stats.count++;
        localStorage.setItem('stats_' + uid, JSON.stringify(stats));
        
        // Seri Takibi
        let streak = JSON.parse(localStorage.getItem('streak_' + uid) || '{"count":0,"last":""}');
        if(score >= 7) {
            if(streak.last !== today) { streak.count++; streak.last = today; }
        } else {
            streak.count = 0;
        }
        localStorage.setItem('streak_' + uid, JSON.stringify(streak));

        loadDailyStats();
        updateStreakDisplay();
    }

    function loadDailyStats() {
        let uid = auth.currentUser.uid;
        let stats = JSON.parse(localStorage.getItem('stats_' + uid) || '{"count":0}');
        const avgDisplay = document.getElementById('val-avg');
        const avatarDisplay = document.getElementById('val-avatar');

        if(stats.count > 0) {
            let avg = (stats.sum / stats.count).toFixed(1);
            avgDisplay.innerText = avg;
            
            if(avg >= 7) { 
                avatarDisplay.innerText = "🦸‍♂️💪"; 
                avgDisplay.style.color = "var(--primary)"; 
            } else if(avg >= 4) { 
                avatarDisplay.innerText = "🧍‍♂️"; 
                avgDisplay.style.color = "var(--premium)"; 
            } else { 
                avatarDisplay.innerText = "🍔🥱"; 
                avgDisplay.style.color = "var(--danger)"; 
            }
        }
    }

    // --- PAYPAL ENTEGRASYONU ---
    function renderPayPal() {
        if(document.getElementById('paypal-button-container').innerHTML !== "") return;
        paypal.Buttons({
            style: { layout: 'vertical', color: 'gold', shape: 'pill' },
            createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '0.99', currency_code: 'USD' } }] }),
            onApprove: (data, actions) => actions.order.capture().then(() => {
                localStorage.setItem('isVip_' + auth.currentUser.uid, 'true');
                alert("Tebrikler! Artık Geleceği Görebilirsin.");
                location.reload();
            })
        }).render('#paypal-button-container');
    }

    // --- YARDIMCI FONKSİYONLAR ---
    function toggleAuth(isReg) {
        document.getElementById('login-section').style.display = isReg ? 'none' : 'block';
        document.getElementById('register-section').style.display = isReg ? 'block' : 'none';
    }

    async function handleRegister() {
        const nick = document.getElementById('reg-nick').value.trim().toLowerCase();
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        
        if(!nick || !email || !pass) return alert("Eksik alanları doldurun!");
        
        const doc = await db.collection('partner_data').doc(nick).get();
        if(doc.exists) return alert("Bu isim kapılmış! Başka bir tane seç.");

        try {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await res.user.updateProfile({ displayName: nick });
            await db.collection('partner_data').doc(nick).set({ username: nick, friends: [] });
            location.reload();
        } catch(e) { alert(e.message); }
    }

    async function handleLogin() {
        try { await auth.signInWithEmailAndPassword(document.getElementById('email-in').value, document.getElementById('pass-in').value); } 
        catch(e) { alert("Hata: " + e.message); }
    }

    function handleLogout() { auth.signOut().then(() => location.reload()); }
    function scrollToVip() { document.getElementById('vip-panel').scrollIntoView({behavior:'smooth'}); }
    function toggleNotifs() { const m = document.getElementById('notifBox'); m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
    function togglePartnerArena() { const a = document.getElementById('partner-arena'); a.style.display = a.style.display === 'none' ? 'block' : 'none'; }

    function updateStreakDisplay() {
        let s = JSON.parse(localStorage.getItem('streak_' + auth.currentUser.uid) || '{"count":0}');
        if(s.count > 0) {
            document.getElementById('streakDisplay').style.display = 'block';
            document.getElementById('streakNum').innerText = s.count;
        }
    }

    function startNotifListener() {
        let nick = auth.currentUser.displayName.toLowerCase();
        db.collection('notifications').where('toUser', '==', nick).onSnapshot(snap => {
            const badge = document.getElementById('notifBadge');
            const items = document.getElementById('notifItems');
            items.innerHTML = ""; let count = 0;
            snap.forEach(doc => {
                count++;
                items.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; font-size:0.75rem;">@${doc.data().fromUser} seni takip etmek istiyor.</div>`;
            });
            if(count > 0) { badge.style.display = 'flex'; badge.innerText = count; }
        });
    }

    function sendRequest() {
        const target = document.getElementById('friend-nick').value.trim().toLowerCase();
        const me = auth.currentUser.displayName.toLowerCase();
        if(!target || target === me) return;
        db.collection('notifications').add({ fromUser: me, toUser: target, type: 'follow' });
        alert("İstek Gönderildi!");
    }
</script>

</body>
</html>
