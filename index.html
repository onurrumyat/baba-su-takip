<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | VIP Analiz</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdOeigm877SXMe7mMtuEMPUeGkY9WcgyIJPbzGJU2HP1CS_eaGcn4O0FnUEoB3JFmDXEHSnxx5Do-pIN&currency=USD&components=buttons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #10b981; --accent: #0ea5e9; --premium: #f59e0b; --text: #f1f5f9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); height: fit-content; position: relative; }
        .auth-container h1 { font-size: 2.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 900; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #0b0f1a; border: 1px solid #2d3748; color: white; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; color: white; transition: 0.3s; }
        .btn-main { background: var(--primary); }
        .btn-sub { background: var(--accent); margin-top: 10px; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #2d3748; margin-top: 10px; font-size: 0.8rem; }
        
        /* Genişleme Hatası Fix CSS */
        .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; overflow: hidden; border: 2px solid #1e293b; margin-bottom: 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        video, #capturedImage { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block; position: absolute; top: 0; left: 0; }
        #capturedImage { display: none; z-index: 5; }

        .premium-area { background: rgba(245, 158, 11, 0.08); border: 2px solid var(--premium); border-radius: 25px; padding: 20px; margin-top: 20px; text-align: center; }
        .premium-title { font-weight: 900; color: var(--premium); font-size: 1.1rem; margin-bottom: 15px; }
        #results { display: none; flex-direction: column; gap: 12px; margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 20px; }
        .report-card { background: #1a202c; border-radius: 15px; padding: 18px; border-top: 4px solid var(--accent); }
        .report-txt { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; white-space: pre-line; }
        .history-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid var(--primary); cursor: pointer; }
        .score-wrapper { margin-top: 20px; margin-bottom: 10px; width: 100%; position: relative; padding-bottom: 20px; }
        .score-bar { height: 14px; width: 100%; border-radius: 7px; background: linear-gradient(to right, #ef4444 0%, #f97316 35%, #eab308 65%, #22c55e 100%); position: relative; }
        .score-marker { position: absolute; top: -10px; width: 30px; height: 30px; background: #fff; border: 3px solid #1e293b; border-radius: 50%; transform: translateX(-50%); transition: left 1s ease-out; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; color: #000; z-index: 2; }
        .streak-badge { display:none; background:rgba(249, 115, 22, 0.15); color:#f97316; padding:8px 15px; border-radius:20px; font-weight:900; font-size:0.9rem; }
        .partner-box { background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        .role-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .role-btn { flex: 1; padding: 10px; border-radius: 10px; background: #0b0f1a; border: 1px solid #2d3748; color: #94a3b8; cursor: pointer; font-size: 0.8rem; }
        .role-btn.active { border-color: var(--primary); color: var(--primary); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border-radius: 30px; padding: 25px; width: 100%; max-width: 380px; border: 2px solid var(--primary); }
        .modal-body { color: #cbd5e1; font-size: 0.95rem; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; }
        .bell-container { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .notif-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 0.6rem; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notif-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 250px; background: #1e293b; border-radius: 15px; padding: 10px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b style="color:var(--primary)">DETAY</b><span style="cursor:pointer" onclick="document.getElementById('detailModal').style.display='none'">✕</span></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<div class="app-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <div style="display:flex; gap:10px;">
            <span onclick="changeLang('tr')" style="font-size: 1.8rem; cursor: pointer;">🇹🇷</span>
            <span onclick="changeLang('en')" style="font-size: 1.8rem; cursor: pointer;">🇺🇸</span>
        </div>
        <div id="streakBadge" class="streak-badge">🔥 <span id="streakCount">0</span> <span id="txtStreak">Seri</span></div>
        <div style="display: flex; gap:10px;">
            <div class="bell-container" onclick="toggleNotifications()" id="bellIcon" style="display:none;">
                <span>🔔</span><span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown"><div id="notifList"></div></div>
            </div>
            <div class="bell-container" onclick="toggleFriends()" id="friendListBtn" style="display:none;">
                <span>👤</span><div class="notif-dropdown" id="friendsDropdown" style="width:200px;"><div id="friendsListContainer"></div></div>
            </div>
        </div>
    </div>

    <div id="loginView">
        <h1 id="txtL1">BIO-CHEF</h1>
        <div class="role-selector"><div class="role-btn active" onclick="setRole('danisan', this)">DANIŞAN</div><div class="role-btn" onclick="setRole('diyetisyen', this)">DİYETİSYEN</div></div>
        <input type="email" id="lEmail" placeholder="E-posta"><input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-main" id="txtL4" onclick="doLogin()">GİRİŞ YAP</button>
        <button class="btn btn-outline" onclick="toggleView('regView')">Kayıt Ol</button>
    </div>

    <div id="regView" style="display:none;">
        <h1 id="txtR7">KAYIT OL</h1>
        <input type="email" id="rEmail" placeholder="E-posta"><input type="text" id="rUser" placeholder="Kullanıcı Adı"><input type="password" id="rPass" placeholder="Şifre">
        <button class="btn btn-sub" id="txtR8" onclick="doRegister()">HESABI OLUŞTUR</button>
        <button class="btn btn-outline" onclick="toggleView('loginView')">Geri Dön</button>
    </div>

    <div id="mainView" style="display:none;">
        <div style="text-align: center; margin-bottom: 20px;"><div id="clock" style="font-size: 2.2rem; font-weight: 800; color: var(--accent);">00:00:00</div><div id="uMail" style="color:var(--primary); font-weight:bold;"></div></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><input type="number" id="uAge" placeholder="YAŞ" onchange="saveUserData()"><input type="number" id="uWeight" placeholder="KİLO" onchange="saveUserData()"></div>
        <select id="uGoal" onchange="saveUserData()"><option value="Kilo Vermek">Kilo Vermek (-)</option><option value="Kilo Almak">Kilo Almak (+)</option><option value="Kiloyu Korumak">Kiloyu Korumak (=)</option></select>
        <div class="cam-box"><video id="video" autoplay playsinline></video><img id="capturedImage"></div>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="btn btn-main" id="btnAnalyzeText" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        <button class="btn btn-sub" id="btnRetake" style="display:none; background: #64748b;" onclick="resetCamera()">🔄 YENİDEN ÇEK</button>
        <div id="results"></div>
        <button class="btn btn-main" id="btnPdf" style="display:none; background: #ef4444; margin-top:15px;" onclick="downloadPDF()">📄 PDF OLARAK KAYDET</button>
        <button class="btn btn-outline" id="btnHistToggle" onclick="toggleHistory()" style="margin-top:20px;">📚 SON 24 SAAT</button>
        <div id="historyPanel" style="display:none;"><div id="historyList"></div></div>
        <button class="btn btn-outline" style="color:var(--danger)" onclick="togglePartner()">👫 KANKA ARENASI</button>
        <div id="partnerPanel" class="partner-box" style="display:none;"><input type="text" id="partnerUser" placeholder="Kullanıcı Adı"><button class="btn btn-sub" onclick="checkPartner()">🔍 SORGULA</button><div id="partnerResult"></div><div id="partnerHistoryList"></div></div>
        <div class="premium-area"><button class="btn btn-sub" id="txtBtnPlan" style="background: var(--premium); color: black;" onclick="handlePlanClick()">📅 HAFTALIK PLAN</button><div id="premiumLockInfo"><div id="paypal-button-container"></div></div></div>
        <button class="btn btn-outline" onclick="auth.signOut(); location.reload();">ÇIKIŞ</button>
    </div>
</div>

<script>
    let currentLang = 'tr';
    let userRole = 'danisan';
    const langData = {
        tr: { appTitle: "BIO-CHEF", btnLogin: "GİRİŞ YAP", ageHolder: "YAŞ", weightHolder: "KİLO", btnAna: "📸 ANALİZ ET", streakTxt: "Seri", loading: "🔍 İnceleniyor..." },
        en: { appTitle: "BIO-CHEF", btnLogin: "LOGIN", ageHolder: "AGE", weightHolder: "WEIGHT", btnAna: "📸 ANALYZE", streakTxt: "Streak", loading: "🔍 Analyzing..." }
    };

    const firebaseConfig = { apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA", authDomain: "voice2post-9e8ca.firebaseapp.com", projectId: "voice2post-9e8ca", storageBucket: "voice2post-9e8ca.firebasestorage.app", messagingSenderId: "511446656614", appId: "1:511446656614:web:32101ee70299543c716fa7" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let isVip = false;

    function changeLang(l) {
        currentLang = l;
        document.getElementById('txtL1').innerText = langData[l].appTitle;
        document.getElementById('txtL4').innerText = langData[l].btnLogin;
        document.getElementById('uAge').placeholder = langData[l].ageHolder;
        document.getElementById('uWeight').placeholder = langData[l].weightHolder;
        document.getElementById('btnAnalyzeText').innerText = langData[l].btnAna;
        document.getElementById('txtStreak').innerText = langData[l].streakTxt;
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            toggleView('mainView'); loadUserData();
            document.getElementById('uMail').innerText = "@" + (user.displayName || user.email.split('@')[0]);
            isVip = localStorage.getItem('vip_' + user.uid) === 'true';
            document.getElementById('premiumLockInfo').style.display = isVip ? 'none' : 'block';
            if(!isVip) initPayPal();
            document.getElementById('bellIcon').style.display = 'flex';
            document.getElementById('friendListBtn').style.display = 'flex';
            startCamera();
        } else { toggleView('loginView'); }
    });

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
            const vid = document.getElementById('video');
            vid.srcObject = s;
            vid.style.display = 'block';
            document.getElementById('capturedImage').style.display = 'none';
        }).catch(e => console.log("Cam error", e));
    }

    async function runAI(mode) {
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        if(!age || !weight) return alert("Bilgileri girin.");
        
        const vid = document.getElementById('video');
        const canv = document.getElementById('canvas');
        canv.width = vid.videoWidth; canv.height = vid.videoHeight;
        canv.getContext('2d').drawImage(vid, 0, 0);
        const img = canv.toDataURL('image/jpeg', 0.8);
        
        document.getElementById('capturedImage').src = img;
        document.getElementById('capturedImage').style.display = 'block';
        document.getElementById('video').style.display = 'none';
        document.getElementById('btnAnalyzeText').style.display = 'none';
        document.getElementById('btnRetake').style.display = 'block';

        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<p style="text-align:center;">${langData[currentLang].loading}</p>`;
        resDiv.style.display = 'flex';
        resDiv.scrollIntoView();

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş:${age}, Kilo:${weight}, Hedef:${document.getElementById('uGoal').value}`, lang: currentLang })
            });
            const d = await r.json();
            if (d.analysis) {
                resDiv.innerHTML = '';
                const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
                let score = 5;
                sections.forEach((txt, i) => {
                    const card = document.createElement('div'); card.className = 'report-card';
                    let content = txt.trim();
                    if(mode === 'yemek' && i === 0) {
                        const match = content.match(/\[SKOR:\s*(\d+)\]/i);
                        if(match) { score = parseInt(match[1]); content = content.replace(match[0], '').trim(); updateStreak(score); }
                        card.innerHTML = `<div class="report-txt">${content}</div><div class="score-wrapper"><div class="score-bar"><div class="score-marker" style="left:${score*10}%">${score}</div></div></div>`;
                    } else { card.innerHTML = `<div class="report-txt">${content}</div>`; }
                    resDiv.appendChild(card);
                });
                document.getElementById('btnPdf').style.display = 'block';
                if(mode === 'yemek') saveHistory(score, d.analysis);
            }
        } catch(e) { console.log("AI error", e); }
    }

    function saveHistory(score, raw) {
        const historyItem = { score, full: raw, timestamp: Date.now(), date: new Date().toLocaleString() };
        db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).update({ history: firebase.firestore.FieldValue.arrayUnion(historyItem) }).catch(() => {});
        let key = 'history_' + auth.currentUser.uid;
        let arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.unshift(historyItem); localStorage.setItem(key, JSON.stringify(arr));
    }

    function toggleHistory() {
        const p = document.getElementById('historyPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(p.style.display === 'block') {
            const list = document.getElementById('historyList');
            let arr = JSON.parse(localStorage.getItem('history_' + auth.currentUser.uid) || '[]');
            const son24 = arr.filter(h => h.timestamp > Date.now() - 86400000);
            list.innerHTML = son24.length ? son24.map(h => `<div class="history-box" onclick="showDetails('${encodeURIComponent(JSON.stringify(h))}')"><b>${h.date}</b> | Skor: ${h.score}/10</div>`).join('') : "Veri yok.";
        }
    }

    function resetCamera() { document.getElementById('btnRetake').style.display = 'none'; document.getElementById('btnAnalyzeText').style.display = 'block'; document.getElementById('capturedImage').style.display = 'none'; document.getElementById('video').style.display = 'block'; }
    function showDetails(dataStr) { const data = JSON.parse(decodeURIComponent(dataStr)); document.getElementById('modalBody').innerText = data.full; document.getElementById('detailModal').style.display = 'flex'; }
    function saveUserData() { if(!auth.currentUser) return; const data = { age: document.getElementById('uAge').value, weight: document.getElementById('uWeight').value, goal: document.getElementById('uGoal').value }; localStorage.setItem('userData_' + auth.currentUser.uid, JSON.stringify(data)); db.collection('partner_data').doc(auth.currentUser.displayName.toLowerCase()).set(data, {merge:true}); }
    function loadUserData() { const saved = localStorage.getItem('userData_' + auth.currentUser.uid); if(saved) { const data = JSON.parse(saved); document.getElementById('uAge').value = data.age || ''; document.getElementById('uWeight').value = data.weight || ''; document.getElementById('uGoal').value = data.goal || 'Kilo Vermek'; } }
    function toggleView(id) { ['loginView','regView','mainView'].forEach(v => document.getElementById(v).style.display='none'); document.getElementById(id).style.display='block'; }
    function setRole(r, e) { userRole = r; document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active')); e.classList.add('active'); }
    setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    function initPayPal() { paypal.Buttons({ createOrder: (d,a) => a.order.create({purchase_units:[{amount:{value:'0.99'}}]}), onApprove: (d,a) => a.order.capture().then(()=>{localStorage.setItem('vip_'+auth.currentUser.uid,'true');location.reload();}) }).render('#paypal-button-container'); }
    function toggleNotifications() { const d = document.getElementById('notifDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function toggleFriends() { const d = document.getElementById('friendsDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function togglePartner() { const p = document.getElementById('partnerPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    async function doLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } catch(e) { alert(e.message); } }
    async function doRegister() { const u = document.getElementById('rUser').value; const cred = await auth.createUserWithEmailAndPassword(document.getElementById('rEmail').value, document.getElementById('rPass').value); await cred.user.updateProfile({ displayName: u }); location.reload(); }
    function downloadPDF() { html2pdf().from(document.getElementById('results')).save(); }
    function updateStreak(s) { let d = JSON.parse(localStorage.getItem('streak_' + auth.currentUser.uid) || '{"count":0, "last":""}'); let t = new Date().toLocaleDateString(); if(s >= 7) { if(d.last !== t) d.count++; d.last = t; } else { d.count = 0; } localStorage.setItem('streak_' + auth.currentUser.uid, JSON.stringify(d)); showStreak(); }
    function showStreak() { let d = JSON.parse(localStorage.getItem('streak_' + auth.currentUser.uid) || '{"count":0}'); if(d.count > 0) { document.getElementById('streakBadge').style.display = 'block'; document.getElementById('streakCount').innerText = d.count; } }
</script>
</body>
</html>
