<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | Akıllı Besin Tablosu</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --accent: #38bdf8; --text: #f8fafc; --muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .container { width: 100%; max-width: 440px; background: var(--card); border-radius: 28px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .header-main { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        #clock { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 10px; text-align: center; }
        .cam-view { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .btn-green { background: var(--primary); }
        .btn-blue { background: var(--accent); }
        
        /* Tablo ve Kart Yapısı */
        #results { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        .analysis-card { background: #0f172a; padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent); animation: slideUp 0.4s ease; }
        .card-tag { font-size: 0.7rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .card-txt { font-size: 0.9rem; line-height: 1.5; color: #cbd5e1; white-space: pre-line; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="header-main">
        <h1>Bio-Chef</h1>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-green" onclick="doLogin()">Giriş Yap</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="header-main">
            <div id="clock">00:00:00</div>
            <p id="uMail" style="font-size:0.7rem; color:var(--muted)"></p>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="Yaş">
            <input type="number" id="uWeight" placeholder="Kilo">
        </div>
        <select id="uGoal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>

        <div class="cam-view"><video id="video" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <div id="results"></div>

        <button class="btn btn-green" id="bY" onclick="runAI('yemek')">📸 FOTOĞRAF ÇEK VE ANALİZ ET</button>
        <button class="btn btn-blue" onclick="runAI('buzdolabi')">❄️ BUZDOLABINA BAK</button>
        <button onclick="auth.signOut(); location.reload();" style="background:none; border:none; color:red; margin-top:10px; width:100%; cursor:pointer;">ÇIKIŞ YAP</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
      authDomain: "voice2post-9e8ca.firebaseapp.com",
      projectId: "voice2post-9e8ca",
      storageBucket: "voice2post-9e8ca.firebasestorage.app",
      messagingSenderId: "511446656614",
      appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('uMail').innerText = user.email;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
        }
    });

    async function doLogin() {
        try { await auth.signInWithEmailAndPassword(document.getElementById('lEmail').value, document.getElementById('lPass').value); } 
        catch(e) { alert("Hata: " + e.message); }
    }

    async function runAI(mode) {
        const btn = document.getElementById('bY');
        const resDiv = document.getElementById('results');
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        
        if(!age || !weight) return alert("Lütfen yaş ve kilonuzu girin!");
        
        btn.disabled = true; btn.innerText = "Gıda Analiz Ediliyor...";
        
        const vid = document.getElementById('video');
        const canv = document.getElementById('canvas');
        // Algılama Sorununu Çözmek İçin Görsel Boyutu Küçültme (Optimization)
        canv.width = 640; 
        canv.height = 480;
        canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
        const img = canv.toDataURL('image/jpeg', 0.7); // Kaliteyi %70'e çekerek gönderimi hızlandırıyoruz

        const uStr = `${age} yaş, ${weight} kg, Hedef: ${document.getElementById('uGoal').value}`;

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: uStr })
            });
            const d = await r.json();
            
            resDiv.innerHTML = ''; resDiv.style.display = 'flex';
            
            // AI yanıtını bölümlere ayırarak kartlara/tabloya dökme
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
            const headers = ["ÖZET", "BESİN TABLOSU (100g/Porsiyon)", "HEDEF ANALİZİ", "UZMAN TAVSİYESİ"];

            sections.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'analysis-card';
                card.innerHTML = `<div class="card-tag">${headers[i] || 'DETAY'}</div><div class="card-txt">${text.trim()}</div>`;
                resDiv.appendChild(card);
            });

            window.speechSynthesis.speak(new SpeechSynthesisUtterance(d.analysis));
        } catch (e) { 
            alert("Sistem şu an fotoğrafı işleyemedi. Lütfen daha yakından ve net çekin."); 
        } finally { 
            btn.disabled = false; btn.innerText = "📸 FOTOĞRAF ÇEK VE ANALİZ ET"; 
        }
    }
</script>
</body>
</html>
