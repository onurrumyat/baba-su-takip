<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetto.ai | Akıllı Ürün Analizi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8',
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        },
                        accent: '#ff5c00', // Enerjik turuncu
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0c10; color: #e0e7ff; overflow-x: hidden; }
        .bg-gradient-mash {
            background-image: 
                radial-gradient(at 10% 10%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(255, 92, 0, 0.08) 0px, transparent 50%);
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .score-circle-fill { stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gradient-mash font-sans min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 p-2.5 rounded-xl text-white shadow-lg"><i class="fas fa-bolt text-lg"></i></div>
                <h1 class="text-2xl font-800 text-white tracking-tighter">Vetto<span class="text-brand-400">.ai</span></h1>
            </div>
            <div class="flex items-center gap-2.5 glass px-4 py-2 rounded-full border border-white/10">
                <img src="https://api.dicebear.com/8.x/notionists/svg?seed=emir" class="w-9 h-9 rounded-full bg-brand-900">
                <span class="text-sm font-semibold text-brand-100">Emir Y.</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16 flex-grow w-full">
        <div class="text-center mb-16">
            <div class="inline-flex items-center gap-2 bg-brand-500/10 text-brand-300 px-4 py-1.5 rounded-full border border-brand-500/20 mb-6 shadow-inner">
                <i class="fas fa-sparkles text-xs"></i><span class="text-xs font-semibold uppercase tracking-widest">DeepSearch Aktif</span>
            </div>
            <h2 class="text-5xl font-800 text-white mb-8">Ürün Analizine Başla</h2>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="productInput" placeholder="Örn: iPhone 15 Pro, Sony WH-1000XM5..." 
                    class="w-full bg-[#11141a] text-white px-8 py-6 rounded-full border border-white/10 outline-none focus:ring-2 focus:ring-brand-500/50 text-lg">
                <button onclick="analyzeProduct()" id="analyzeBtn" class="absolute right-2.5 top-2.5 bg-brand-600 text-white px-8 py-3.5 rounded-full font-bold hover:bg-brand-500 transition-all flex items-center gap-2">
                    Analiz Et <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="resultCard" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-8 mb-24 opacity-0 transition-opacity duration-700">
            <div class="lg:col-span-2 glass p-10 rounded-4xl flex flex-col items-center text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-accent/10 rounded-full blur-3xl opacity-50"></div>
                <h3 id="resTitle" class="text-3xl font-800 text-white mb-2 z-10">Ürün Adı</h3>
                <span class="text-xs font-medium text-brand-200 bg-brand-500/20 px-3 py-1 rounded-full border border-brand-500/30 mb-8 z-10">AI Analiz Sonucu</span>
                
                <div class="relative w-48 h-48 flex items-center justify-center mb-6 z-10">
                    <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="text-white/5" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5"/>
                        <path id="scoreCircle" class="text-accent score-circle-fill" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <div class="text-center">
                        <span id="resScore" class="text-6xl font-800 text-white">0</span>
                        <span class="block text-xs text-gray-500 mt-1">Vetto Skoru</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass p-8 rounded-3xl space-y-6 flex flex-col justify-center">
                <div>
                    <h5 class="font-bold text-emerald-400 mb-4 text-lg"><i class="fas fa-check-circle mr-2"></i>Öne Çıkan Artılar</h5>
                    <ul id="resPros" class="text-sm text-gray-300 space-y-3"></ul>
                </div>
                <div class="border-t border-white/5 pt-6">
                    <h5 class="font-bold text-red-400 mb-4 text-lg"><i class="fas fa-exclamation-circle mr-2"></i>Dikkat Çeken Eksiler</h5>
                    <ul id="resCons" class="text-sm text-gray-300 space-y-3"></ul>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 border-t border-white/5 text-center text-sm text-gray-600">
        <p>&copy; 2026 Vetto Technologies. Yapay zeka analizleri tamamen tarafsızdır.</p>
    </footer>

    <script>
        async function analyzeProduct() {
            const product = document.getElementById('productInput').value;
            if (!product) return alert("Lütfen bir ürün ismi girin.");

            const btn = document.getElementById('analyzeBtn');
            const card = document.getElementById('resultCard');
            
            btn.innerHTML = 'Analiz Ediliyor <i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                // Vercel Backend'e İstek Atıyoruz
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product: product })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Sunucu hatası oluştu.");
                }

                // UI Güncelleme
                document.getElementById('resTitle').innerText = data.title;
                document.getElementById('resScore').innerText = data.score;
                
                // HTML Listelerini Doldur
                document.getElementById('resPros').innerHTML = data.pros.map(p => `<li><i class="fas fa-caret-right text-emerald-500 mr-2"></i>${p}</li>`).join('');
                document.getElementById('resCons').innerHTML = data.cons.map(c => `<li><i class="fas fa-caret-right text-red-500 mr-2"></i>${c}</li>`).join('');

                // Kartı Görünür Yap ve Animasyonu Başlat
                card.classList.remove('hidden');
                setTimeout(() => {
                    card.style.opacity = "1";
                    const offset = 100 - (data.score * 10);
                    document.getElementById('scoreCircle').style.strokeDashoffset = offset;
                }, 100);

            } catch (error) {
                console.error("Hata:", error);
                alert("Analiz başarısız oldu: " + error.message);
            } finally {
                btn.innerHTML = 'Analiz Et <i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
