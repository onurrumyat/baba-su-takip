<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Chef Pro | Tam Donanımlı Sistem</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --accent: #38bdf8; --text: #f8fafc; --muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        
        .container { width: 100%; max-width: 440px; background: var(--card); border-radius: 32px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Auth Ekranları */
        .auth-box { display: flex; flex-direction: column; gap: 12px; animation: fadeIn 0.4s ease; }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area h1 { font-size: 2.2rem; font-weight: 900; background: linear-gradient(to right, #10b981, #38bdf8); -webkit-background-clip: text; color: transparent; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; color: white; outline: none; text-align: center; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 0.9rem; }
        .btn-green { background: var(--primary); }
        .btn-blue { background: var(--accent); }
        .link-btn { color: var(--accent); cursor: pointer; font-size: 0.8rem; text-align: center; display: block; margin-top: 10px; text-decoration: underline; background: none; border: none; width: 100%; }

        /* Dashboard */
        #dashboard { display: none; flex-direction: column; gap: 15px; }
        .header-main { text-align: center; margin-bottom: 15px; position: relative; }
        #clock { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        #uMailDisplay { font-size: 0.7rem; color: var(--muted); margin-top: 5px; }
        
        .cam-view { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #334155; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Şablon Sonuç Kartları */
        #results { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        .result-card { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); animation: fadeIn 0.5s ease; }
        .card-tag { font-size: 0.7rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .card-txt { font-size: 0.9rem; line-height: 1.5; color: #cbd5e1; white-space: pre-line; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="auth-box">
        <div class="logo-area"><h1>BIO-CHEF</h1><p>Giriş Yap</p></div>
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn btn-green" onclick="doLogin()">Giriş Yap</button>
        <button class="link-btn" onclick="toggleAuth('regScreen')">Hesabın yok mu? Kayıt Ol</button>
        <button class="link-btn" onclick="doReset()">Şifremi Unuttum?</button>
    </div>

    <div id="regScreen" class="auth-box" style="display:none;">
        <div class="logo-area"><h1>Kayıt Ol</h1><p>Yeni profil oluştur</p></div>
        <input type="email" id="rEmail" placeholder="E-posta Adresi">
        <input type="password" id="rPass" placeholder="Şifre Belirleyin">
        <button class="btn btn-blue" onclick="doRegister()">Kayıt Ol</button>
        <button class="link-btn" onclick="toggleAuth('loginScreen')">Zaten hesabım var</button>
    </div>

    <div id="dashboard">
        <div class="header-main">
            <div id="clock">00:00:00</div>
            <p id="uMailDisplay">...</p>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="number" id="uAge" placeholder="YAŞ">
            <input type="number" id="uWeight" placeholder="KİLO">
        </div>
        <select id="uGoal">
            <option value="Kilo Vermek">Kilo Vermek (-)</option>
            <option value="Kilo Almak">Kilo Almak (+)</option>
            <option value="Kiloyu Korumak">Kiloyu Korumak (=)</option>
        </select>

        <div class="cam-view"><video id="video" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <div id="results"></div>

        <button class="btn btn-green" id="bY" onclick="runAI('yemek')">📸 ANALİZ ET</button>
        <button class="btn btn-blue" onclick="runAI('buzdolabi')">❄️ DOLAP ANALİZİ</button>
        <button onclick="handleLogout()" class="link-btn" style="color:red; text-decoration:none;">Oturumu Kapat</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (SİZİN VERDİĞİNİZ) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDaZ3eZsoAKW3ZazFPebAd-b147KaW5wOA",
      authDomain: "voice2post-9e8ca.firebaseapp.com",
      projectId: "voice2post-9e8ca",
      storageBucket: "voice2post-9e8ca.firebasestorage.app",
      messagingSenderId: "511446656614",
      appId: "1:511446656614:web:32101ee70299543c716fa7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Saat
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // Oturum Takibi (Kritik Kısım)
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('regScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('uMailDisplay').innerText = user.email;
            startCamera();
        } else {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }
    });

    function toggleAuth(id) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('regScreen').style.display = 'none';
        document.getElementById(id).style.display = 'flex';
    }

    async function doLogin() {
        const e = document.getElementById('lEmail').value;
        const p = document.getElementById('lPass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Hata: " + err.message); }
    }

    async function doRegister() {
        const e = document.getElementById('rEmail').value;
        const p = document.getElementById('rPass').value;
        try { await auth.createUserWithEmailAndPassword(e, p); alert("Kayıt Başarılı!"); } catch(err) { alert("Hata: " + err.message); }
    }

    async function doReset() {
        const email = document.getElementById('lEmail').value;
        if(!email) return alert("E-posta adresinizi girin.");
        try { await auth.sendPasswordResetEmail(email); alert("Şifre sıfırlama linki gönderildi."); } catch(err) { alert(err.message); }
    }

    function handleLogout() { auth.signOut(); }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => { document.getElementById('video').srcObject = s; })
        .catch(err => console.log("Kamera Hatası"));
    }

    // AI Analiz Motoru
    async function runAI(mode) {
        const btn = document.getElementById('bY');
        const resDiv = document.getElementById('results');
        const age = document.getElementById('uAge').value;
        const weight = document.getElementById('uWeight').value;
        
        if(!age || !weight) return alert("Lütfen Yaş ve Kilo girin.");
        
        btn.disabled = true; btn.innerText = "İŞLENİYOR...";
        
        const vid = document.getElementById('video');
        const canv = document.getElementById('canvas');
        canv.width = 640; canv.height = 480;
        canv.getContext('2d').drawImage(vid, 0, 0, 640, 480);
        const img = canv.toDataURL('image/jpeg', 0.7);

        try {
            const r = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mode, image: img, user_data: `Yaş: ${age}, Kilo: ${weight}, Hedef: ${document.getElementById('uGoal').value}` })
            });
            const d = await r.json();
            
            resDiv.innerHTML = ''; resDiv.style.display = 'flex';
            const sections = d.analysis.split(/\d\./).filter(s => s.trim().length > 5);
            const headers = ["📊 ÖZET", "🧪 BESİN TABLOSU", "🎯 HEDEF ANALİZİ", "💡 TAVSİYE"];

            sections.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `<div class="card-tag">${headers[i] || 'DETAY'}</div><div class="card-txt">${text.trim()}</div>`;
                resDiv.appendChild(card);
            });
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(d.analysis));
        } catch (e) { alert("Sistem Hatası. Lütfen tekrar deneyin."); }
        finally { btn.disabled = false; btn.innerText = "📸 ANALİZ ET"; }
    }
</script>
</body>
</html>
