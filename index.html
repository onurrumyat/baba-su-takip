<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Baba Su Takip Sistemi</title>
    <style>
        :root {
            --water-blue: #0ea5e9;
            --treasure-gold: #f59e0b;
            --bg-color: #f0fdf4;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Hazine (Kasa) Alanı */
        .treasure-box {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid var(--treasure-gold);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.2);
        }

        .treasure-title {
            font-size: 14px;
            color: #b45309;
            font-weight: bold;
            text-transform: uppercase;
        }

        .treasure-amount {
            font-size: 32px;
            font-weight: 900;
            color: #92400e;
            margin: 5px 0;
        }

        /* Su Bardağı */
        .glass-container {
            width: 110px;
            height: 180px;
            border: 4px solid #cbd5e1;
            border-radius: 10px 10px 30px 30px;
            margin: 0 auto 20px auto;
            position: relative;
            overflow: hidden;
            background-color: white;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05);
        }

        .water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 0 25px 25px;
        }

        .status-text {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
        }

        /* Ana Buton */
        .main-btn {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .main-btn.ready {
            background-color: var(--water-blue);
            color: white;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
            animation: pulse 2s infinite;
        }

        .main-btn.waiting {
            background-color: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        .main-btn.done {
            background-color: #10b981;
            color: white;
            cursor: default;
            box-shadow: none;
        }

        .timer-text {
            font-size: 16px;
            font-weight: normal;
            font-family: monospace;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .reset-bank {
            background: none;
            border: none;
            color: #ef4444;
            margin-top: 30px;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="treasure-box">
            <div class="treasure-title">💰 Baba'nın Hazinesi 💰</div>
            <div class="treasure-amount" id="treasureDisplay">0 TL</div>
            <div style="font-size: 12px; color: #b45309;">(Bugün 3x Yarım Litre bitince +10 TL)</div>
        </div>

        <div class="glass-container">
            <div class="water-level" id="waterLevel"></div>
        </div>
        <div class="status-text" id="statusText">0 / 3 Yarım Litre</div>
        <div class="subtitle">Her içişte araya 4 saat girer.</div>

        <button id="actionBtn" class="main-btn ready" onclick="drinkWater()">
            <span id="btnMainText">🚰 Yarım Litre İçtim!</span>
            <span id="btnSubText" class="timer-text"></span>
        </button>

        <button class="reset-bank" onclick="emptyVault()">Ay Sonu: Kasayı Boşalt</button>
    </div>

    <script>
        // 4 Saat = 4 * 60 * 60 * 1000 milisaniye
        const COOLDOWN_MS = 4 * 60 * 60 * 1000; 
        
        // Veritabanı
        let db = JSON.parse(localStorage.getItem('babaSuDataV2')) || {
            date: '',
            intake: 0,
            treasure: 0,
            lastDrinkTime: 0,
            rewardGivenToday: false
        };

        const actionBtn = document.getElementById('actionBtn');
        const btnMainText = document.getElementById('btnMainText');
        const btnSubText = document.getElementById('btnSubText');
        const waterLevel = document.getElementById('waterLevel');
        const statusText = document.getElementById('statusText');
        const treasureDisplay = document.getElementById('treasureDisplay');

        // Sayfa açıldığında ve her saniye çalışan döngü
        function checkStatus() {
            // 1. Yeni gün kontrolü (Gece 12'yi geçince görevler sıfırlanır, para kalır)
            const today = new Date().toLocaleDateString();
            if (db.date !== today) {
                db.date = today;
                db.intake = 0;
                db.lastDrinkTime = 0;
                db.rewardGivenToday = false;
                saveData();
            }

            // Kasa ve bardak seviyesini güncelle
            treasureDisplay.innerText = db.treasure + " TL";
            waterLevel.style.height = (db.intake / 3 * 100) + '%';
            statusText.innerText = db.intake + " / 3 Yarım Litre";

            // Buton Durumunu Ayarla
            if (db.intake >= 3) {
                // Günlük görev bitti
                actionBtn.className = 'main-btn done';
                btnMainText.innerText = "🎉 Bugünlük Görev Tamam!";
                btnSubText.innerText = "Yarın görüşmek üzere baba.";
                actionBtn.disabled = true;
            } else {
                // Görev devam ediyor, süreyi kontrol et
                const timePassed = Date.now() - db.lastDrinkTime;
                const timeLeft = COOLDOWN_MS - timePassed;

                if (timeLeft > 0 && db.lastDrinkTime !== 0) {
                    // Bekleme süresindeyiz (Geri Sayım)
                    actionBtn.className = 'main-btn waiting';
                    btnMainText.innerText = "⏳ Sindirim Bekleniyor...";
                    btnSubText.innerText = "Kalan Süre: " + formatTime(timeLeft);
                    actionBtn.disabled = true;
                } else {
                    // İçmeye hazır
                    actionBtn.className = 'main-btn ready';
                    btnMainText.innerText = "🚰 Yarım Litre İçtim!";
                    btnSubText.innerText = "Üzerine tıkla ve onayla";
                    actionBtn.disabled = false;
                }
            }
        }

        function drinkWater() {
            if (db.intake < 3) {
                db.intake++;
                db.lastDrinkTime = Date.now(); // Tıklanan anın saatini kaydet
                
                // Ödül Kontrolü (3 oldu mu?)
                if (db.intake === 3 && !db.rewardGivenToday) {
                    db.treasure += 10;
                    db.rewardGivenToday = true;
                    setTimeout(() => {
                        alert("🎉 TEBRİKLER BABA! 🎉\n\nBugünkü 3. yarım litreyi de devirdin. Kasana 10 TL eklendi!");
                    }, 500);
                }
                
                saveData();
                checkStatus();
            }
        }

        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;
            return hours.toString().padStart(2, '0') + ":" + 
                   minutes.toString().padStart(2, '0') + ":" + 
                   seconds.toString().padStart(2, '0');
        }

        function emptyVault() {
            if(confirm("Babanıza " + db.treasure + " TL nakit ödemeyi yaptıysanız kasayı sıfırlayabilirsiniz. Onaylıyor musunuz?")) {
                db.treasure = 0;
                saveData();
                checkStatus();
                alert("Kasa başarıyla boşaltıldı.");
            }
        }

        function saveData() {
            localStorage.setItem('babaSuDataV2', JSON.stringify(db));
        }

        // Sistemi başlat ve her 1 saniyede bir sayacı güncelle
        checkStatus();
        setInterval(checkStatus, 1000);
    </script>
</body>
</html>
